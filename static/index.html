<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchBack</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/tailwind.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        .switch-container {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }

        .switch-input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--wb-switch-bg);
            transition: .4s;
            border-radius: 34px;
        }

        .switch-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .switch-input:checked+.switch-slider {
            background-color: var(--wb-accent);
        }

        .switch-input:checked+.switch-slider:before {
            transform: translateX(16px);
        }

        /*
         * Theme system via CSS custom properties.
         * To add a new theme, copy a block below and adjust the values.
         * Then add the theme name as an option in the Appearance config section.
         */

        /* --- Dark theme (default) --- */
        :root,
        html[data-theme="dark"] {
            color-scheme: dark;

            --wb-bg: #111827;
            --wb-surface: #1f2937;
            --wb-surface-alt: #374151;
            --wb-border: #374151;
            --wb-border-light: #4b5563;

            --wb-text: #f3f4f6;
            --wb-text-secondary: #e5e7eb;
            --wb-text-muted: #b0b6bf;
            --wb-text-faint: #9ea4ae;

            --wb-accent: #2563eb;
            --wb-accent-hover: #3b82f6;
            --wb-accent-text: #60a5fa;

            --wb-switch-bg: #4b5563;

            /* Source: Reddit */
            --wb-reddit-bg: rgba(124, 45, 18, 0.5);
            --wb-reddit-text: #fdba74;
            --wb-reddit-hover: rgba(146, 64, 14, 1);
            --wb-reddit-muted: rgba(251, 146, 60, 0.7);
            --wb-reddit-border: rgba(249, 115, 22, 0.3);

            /* Source: Bluesky */
            --wb-bluesky-bg: rgba(30, 58, 138, 0.5);
            --wb-bluesky-text: #93c5fd;
            --wb-bluesky-hover: rgba(30, 64, 175, 1);

            /* Source: Trakt */
            --wb-trakt-bg: #af0e13;
            --wb-trakt-text: #cdd2d5;

            /* Filter pills */
            --wb-filter-inactive-bg: #1f2937;
            --wb-filter-inactive-text: #bec3ca;

            /* Reply nesting */
            --wb-reply-bg: rgba(55, 65, 81, 0.5);

            /* Logo filter */
            --wb-logo-filter: brightness(0) invert(1);
        }

        /* --- Light theme --- */
        html[data-theme="light"] {
            color-scheme: light;

            --wb-bg: #f3f4f6;
            --wb-surface: #ffffff;
            --wb-surface-alt: #e5e7eb;
            --wb-border: #e5e7eb;
            --wb-border-light: #d1d5db;

            --wb-text: #1f2937;
            --wb-text-secondary: #374151;
            --wb-text-muted: #6b7280;
            --wb-text-faint: #9ca3af;

            --wb-accent: #2563eb;
            --wb-accent-hover: #3b82f6;
            --wb-accent-text: #2563eb;

            --wb-switch-bg: #d1d5db;

            --wb-reddit-bg: rgba(255, 237, 213, 0.8);
            --wb-reddit-text: #c2410c;
            --wb-reddit-hover: rgba(255, 228, 196, 1);
            --wb-reddit-muted: rgba(194, 65, 12, 0.7);
            --wb-reddit-border: rgba(251, 146, 60, 0.4);

            --wb-bluesky-bg: rgba(219, 234, 254, 0.8);
            --wb-bluesky-text: #1d4ed8;
            --wb-bluesky-hover: rgba(191, 219, 254, 1);

            --wb-trakt-bg: #e5e7eb;
            --wb-trakt-text: #6b7280;

            --wb-filter-inactive-bg: #ffffff;
            --wb-filter-inactive-text: #9ca3af;

            --wb-reply-bg: rgba(229, 231, 235, 0.5);

            --wb-logo-filter: brightness(1);
        }

        /* Themed overrides for Tailwind utility classes */
        body {
            background-color: var(--wb-bg);
            color: var(--wb-text);
        }

        .wb-surface {
            background-color: var(--wb-surface);
        }

        .wb-surface-alt {
            background-color: var(--wb-surface-alt);
        }

        .wb-border {
            border-color: var(--wb-border);
        }

        .wb-text {
            color: var(--wb-text);
        }

        .wb-text-secondary {
            color: var(--wb-text-secondary);
        }

        .wb-text-muted {
            color: var(--wb-text-muted);
        }

        .wb-text-faint {
            color: var(--wb-text-faint);
        }

        .wb-accent-text {
            color: var(--wb-accent-text);
        }

        /* Source badges */
        .badge-reddit {
            background: var(--wb-reddit-bg);
            color: var(--wb-reddit-text);
        }

        .badge-reddit:hover {
            background: var(--wb-reddit-hover);
        }

        .badge-bluesky {
            background: var(--wb-bluesky-bg);
            color: var(--wb-bluesky-text);
        }

        .badge-bluesky:hover {
            background: var(--wb-bluesky-hover);
        }

        .badge-trakt {
            background: var(--wb-trakt-bg);
            color: var(--wb-trakt-text);
        }

        /* Source filter pills */
        .filter-inactive {
            background: var(--wb-filter-inactive-bg);
            color: var(--wb-filter-inactive-text);
        }

        .filter-trakt {
            background: var(--wb-trakt-bg);
            color: var(--wb-text-secondary);
        }

        .filter-bluesky {
            background: var(--wb-bluesky-bg);
            color: var(--wb-bluesky-text);
        }

        .filter-reddit {
            background: var(--wb-reddit-bg);
            color: var(--wb-reddit-text);
        }

        /* Thread title link */
        .thread-title {
            color: var(--wb-reddit-muted);
        }

        .thread-title:hover {
            color: var(--wb-reddit-text);
        }

        /* Reply nesting */
        .reply-border {
            border-color: var(--wb-reddit-border);
        }

        .reply-bg {
            background: var(--wb-reply-bg);
        }

        /* Reddit search link */
        .reddit-link {
            color: var(--wb-reddit-text);
        }

        /* Logo */
        img.wb-logo {
            filter: var(--wb-logo-filter);
            -webkit-filter: var(--wb-logo-filter);
        }
    </style>
</head>

<body class="antialiased font-sans p-4" x-data="app()">
    <div class="max-w-md mx-auto" x-cloak x-show="true">

        <header class="flex justify-between items-center mb-6 mt-2">
            <div class="flex items-center gap-3">
                <img src="/watchback.png" alt="WatchBack Logo" class="w-10 h-10 object-contain wb-logo">
                <h1 class="text-2xl font-bold wb-accent-text">WatchBack</h1>
            </div>
            <div class="flex gap-2">
                <button @click="showConfig = !showConfig"
                    :class="showConfig ? 'wb-surface-alt wb-text' : 'wb-surface-alt wb-text-muted'"
                    class="px-3 py-2 rounded-lg transition-colors text-lg leading-none"
                    title="Configuration">&#x2699;&#xFE0F;</button>
                <button @click="sync()"
                    class="text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-lg flex items-center gap-2"
                    style="background-color: var(--wb-accent);" :disabled="isLoading">
                    <span x-show="!isLoading">&#x1F504; Sync</span>
                    <span x-show="isLoading" x-cloak>&#x23F3; Syncing...</span>
                </button>
            </div>
        </header>

        <div x-show="showConfig" x-cloak class="wb-surface wb-border rounded-xl mb-6 overflow-hidden border">
            <div class="p-4">
                <!-- ═══════════════════ Integrations ═══════════════════ -->
                <h3 class="text-xs font-semibold wb-text-muted uppercase tracking-wider mb-3">Integrations</h3>

                <div class="space-y-6">
                    <div>
                        <p class="text-xs wb-text-faint mb-2 font-medium uppercase tracking-wide">Jellyfin</p>
                        <div class="space-y-3">
                            <div class="relative group">
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted">Server URL</label>
                                    <button x-show="configData?.jf_url?.source === 'stored'"
                                        @click="resetField('jf_url')"
                                        class="text-[10px] wb-accent-text cursor-pointer">Reset to
                                        ENV</button>
                                </div>
                                <input type="text" x-model="configDraft.jf_url"
                                    :placeholder="configData?.jf_url?.env_value || 'http://jellyfin:8096'"
                                    class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                            </div>
                            <div class="relative">
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted">API Key</label>
                                    <button x-show="configData?.jf_api_key?.source === 'stored'"
                                        @click="resetField('jf_api_key')"
                                        class="text-[10px] wb-accent-text cursor-pointer">Reset to
                                        ENV</button>
                                </div>
                                <input type="password" x-model="configDraft.jf_api_key"
                                    :placeholder="configData?.jf_api_key?.effective_value || 'Required'"
                                    class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                            </div>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs wb-text-faint mb-2 font-medium uppercase tracking-wide">Trakt.tv</p>
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted">Client ID</label>
                                    <button x-show="configData?.trakt_client_id?.source === 'stored'"
                                        @click="resetField('trakt_client_id')"
                                        class="text-[10px] wb-accent-text cursor-pointer">Reset</button>
                                </div>
                                <input type="text" x-model="configDraft.trakt_client_id"
                                    :placeholder="configData?.trakt_client_id?.env_value || 'Optional (for comments)'"
                                    class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                            </div>
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted">Access Token (OAuth)</label>
                                    <button x-show="configData?.trakt_access_token?.source === 'stored'"
                                        @click="resetField('trakt_access_token')"
                                        class="text-[10px] wb-accent-text cursor-pointer">Reset</button>
                                </div>
                                <input type="password" x-model="configDraft.trakt_access_token"
                                    :placeholder="configData?.trakt_access_token?.effective_value || 'Optional (for private profile)'"
                                    class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                            </div>
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted">Username</label>
                                    <button x-show="configData?.trakt_username?.source === 'stored'"
                                        @click="resetField('trakt_username')"
                                        class="text-[10px] wb-accent-text cursor-pointer">Reset</button>
                                </div>
                                <input type="text" x-model="configDraft.trakt_username"
                                    :placeholder="configData?.trakt_username?.env_value || 'Optional (public profile)'"
                                    class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                            </div>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs wb-text-faint mb-2 font-medium uppercase tracking-wide">Bluesky</p>
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted">Handle/Email</label>
                                    <button x-show="configData?.bsky_identifier?.source === 'stored'"
                                        @click="resetField('bsky_identifier')"
                                        class="text-[10px] wb-accent-text cursor-pointer">Reset</button>
                                </div>
                                <input type="text" x-model="configDraft.bsky_identifier"
                                    :placeholder="configData?.bsky_identifier?.env_value || 'you.bsky.social'"
                                    class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                            </div>
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted">App Password</label>
                                    <button x-show="configData?.bsky_app_password?.source === 'stored'"
                                        @click="resetField('bsky_app_password')"
                                        class="text-[10px] wb-accent-text cursor-pointer">Reset</button>
                                </div>
                                <input type="password" x-model="configDraft.bsky_app_password"
                                    :placeholder="configData?.bsky_app_password?.effective_value || 'xxxx-xxxx-xxxx-xxxx'"
                                    class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 flex items-center gap-2">
                    <button @click="clearCache()"
                        class="wb-surface-alt wb-text-muted px-3 py-2 rounded-lg text-sm font-medium cursor-pointer transition-colors">&#x1F5D1;
                        Cache</button>
                    <button @click="restartServer()"
                        class="wb-surface-alt wb-text-muted px-3 py-2 rounded-lg text-sm font-medium cursor-pointer transition-colors">&#x21BA;
                        Restart</button>
                    <button @click="saveConfig()"
                        class="ml-auto text-white px-4 py-2 rounded-lg text-sm font-medium cursor-pointer transition-colors"
                        style="background-color: var(--wb-accent);">Save</button>
                </div>

                <!-- ═══════════════════ Preferences ═══════════════════ -->
                <div class="wb-border border-t mt-5 pt-5">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-xs font-semibold wb-text-muted uppercase tracking-wider">Preferences</h3>
                        <span class="text-[10px] wb-text-faint transition-opacity duration-500"
                            :class="prefSaveStatus ? 'opacity-100' : 'opacity-0'"
                            x-text="prefSaveStatus || 'Saved'"></span>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <p class="text-xs wb-text-faint mb-2 font-medium uppercase tracking-wide">Appearance</p>
                            <div class="flex items-center justify-between">
                                <label class="text-xs font-medium wb-text-muted">Theme</label>
                                <select x-model="configDraft.theme_mode"
                                    @change="applyTheme(configDraft.theme_mode); autoSavePref('theme_mode', configDraft.theme_mode)"
                                    class="wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-1.5 text-sm border cursor-pointer">
                                    <option value="dark">Dark</option>
                                    <option value="light">Light</option>
                                </select>
                            </div>
                        </div>

                        <div class="wb-border border-t"></div>

                        <div>
                            <p class="text-xs wb-text-faint mb-2 font-medium uppercase tracking-wide">Comments</p>
                            <div class="space-y-3">
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <label class="text-xs font-medium wb-text-muted">Time Machine Window
                                            (days)</label>
                                    </div>
                                    <input type="number" min="1" max="365" x-model="configDraft.time_machine_days"
                                        @change="autoSavePref('time_machine_days', configDraft.time_machine_days)"
                                        :placeholder="configData?.time_machine_days?.effective_value || '14'"
                                        class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                                </div>
                            </div>
                        </div>

                        <div class="wb-border border-t"></div>

                        <div>
                            <p class="text-xs wb-text-faint mb-2 font-medium uppercase tracking-wide">Reddit</p>
                            <div class="flex items-center justify-between">
                                <label class="text-xs font-medium wb-text-muted">Auto-open Reddit threads</label>
                                <label class="switch-container">
                                    <input type="checkbox" :checked="configDraft.reddit_auto_open === '1'"
                                        @change="configDraft.reddit_auto_open = $event.target.checked ? '1' : ''; autoSavePref('reddit_auto_open', configDraft.reddit_auto_open)"
                                        class="switch-input">
                                    <span class="switch-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <template x-if="data?.status === 'success'">
            <main>
                <div class="wb-surface p-4 rounded-xl mb-6 shadow-md wb-border border">
                    <h2 class="text-xl font-bold mb-1" x-text="data?.title"></h2>
                    <p class="text-sm wb-text-muted">Aired: <span x-text="formatDate(data?.metadata?.premiere)"></span>
                    </p>
                </div>

                <div class="flex gap-2 mb-6 wb-surface p-1 rounded-lg wb-border border">
                    <button x-show="showTimeMachine" @click="mode = 'time'"
                        :class="mode === 'time' ? 'text-white shadow' : 'wb-text-muted'"
                        :style="mode === 'time' ? 'background-color: var(--wb-accent)' : ''"
                        class="flex-1 py-2 rounded-md text-sm font-medium transition-colors cursor-pointer">Time Machine
                        &#x23F1;&#xFE0F;</button>
                    <button @click="mode = 'all'" :class="mode === 'all' ? 'text-white shadow' : 'wb-text-muted'"
                        :style="mode === 'all' ? 'background-color: var(--wb-accent)' : ''"
                        class="flex-1 py-2 rounded-md text-sm font-medium transition-colors cursor-pointer">All Comments
                        &#x1F4AC;</button>
                    <a :href="data?.reddit_url" target="_blank" rel="noopener noreferrer"
                        class="flex-1 py-2 rounded-md text-sm font-medium text-center reddit-link cursor-pointer">Reddit
                        &#x1F50D;</a>
                </div>

                <div class="flex gap-2 mb-4 justify-center">
                    <button @click="toggleSource('trakt')"
                        :class="sourceActive('trakt') ? 'filter-trakt' : 'filter-inactive'"
                        class="px-3 py-1 rounded-full text-xs font-bold uppercase wb-border border transition-colors cursor-pointer">Trakt</button>
                    <button @click="toggleSource('bluesky')"
                        :class="sourceActive('bluesky') ? 'filter-bluesky' : 'filter-inactive'"
                        class="px-3 py-1 rounded-full text-xs font-bold uppercase wb-border border transition-colors cursor-pointer">BlueSky</button>
                    <button @click="toggleSource('reddit')"
                        :class="sourceActive('reddit') ? 'filter-reddit' : 'filter-inactive'"
                        class="px-3 py-1 rounded-full text-xs font-bold uppercase wb-border border transition-colors cursor-pointer">Reddit</button>
                </div>

                <div x-show="hasThreadGroups" class="flex justify-center mb-4">
                    <button @click="handleThreadToggle()" :class="groupByThread ? 'filter-reddit' : 'filter-inactive'"
                        class="px-5 py-1.5 rounded-full text-xs font-bold uppercase wb-border border transition-colors cursor-pointer flex items-center gap-1.5"
                        title="Click to toggle · Double-tap to set as default">
                        <span
                            x-text="groupByThread ? '&#x1F9F5; Grouped by thread' : '&#x1F9F5; Group by thread'"></span>
                        <span x-show="threadGroupPinned" class="text-[9px] opacity-60">&#x1F4CC;</span>
                    </button>
                </div>

                <div class="space-y-4 pb-8" x-show="!groupByThread">
                    <template x-for="comment in activeComments" :key="comment.id">
                        <div class="wb-surface p-4 rounded-xl shadow wb-border border relative group">
                            <div class="flex justify-between items-start mb-2">
                                <template x-if="comment.thread_title">
                                    <a :href="comment.thread_url" target="_blank" rel="noopener noreferrer"
                                        class="text-[11px] thread-title truncate leading-tight"
                                        x-text="comment.thread_title"></a>
                                </template>

                                <div class="flex gap-1 shrink-0">
                                    <a x-show="comment.source === 'bluesky'" :href="comment.url" target="_blank"
                                        rel="noopener noreferrer"
                                        class="text-[10px] badge-bluesky px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                        title="View original post">BlueSky &#x1F517;</a>
                                    <a x-show="comment.source === 'reddit'" :href="comment.url" target="_blank"
                                        rel="noopener noreferrer"
                                        class="text-[10px] badge-reddit px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                        title="View on Reddit">Reddit &#x1F517;</a>
                                    <span x-show="!comment.source"
                                        class="text-[10px] badge-trakt px-1.5 py-0.5 rounded font-bold uppercase">Trakt</span>
                                </div>
                            </div>

                            <p class="wb-text-secondary text-sm leading-relaxed mb-3 whitespace-pre-wrap"
                                x-text="comment.comment"></p>

                            <template x-if="comment.images && comment.images.length > 0">
                                <div class="grid gap-2 mb-3"
                                    :class="comment.images.length > 1 ? 'grid-cols-2' : 'grid-cols-1'">
                                    <template x-for="img in comment.images" :key="img">
                                        <div @click="lightboxImg = img"
                                            class="block overflow-hidden rounded-lg wb-border border cursor-pointer"
                                            style="background-color: var(--wb-bg);">
                                            <img :src="img"
                                                class="w-full h-auto object-cover hover:scale-110 transition-transform duration-300"
                                                loading="lazy">
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <div class="flex justify-between items-center text-xs wb-text-faint">
                                <span class="font-medium wb-text-muted" x-text="'@' + comment.user.username"></span>
                                <div class="flex items-center gap-3">
                                    <span x-show="comment.score != null && comment.score !== 0" class="wb-text-faint"
                                        x-text="'&#9650; ' + formatScore(comment.score)"></span>
                                    <span x-text="formatDate(comment.created_at)"></span>
                                </div>
                            </div>

                            <!-- Level 1 replies -->
                            <template x-if="comment.replies && comment.replies.length > 0">
                                <div class="mt-3 border-l-2 reply-border pl-3 space-y-3">
                                    <template x-for="reply in comment.replies" :key="reply.id">
                                        <div>
                                            <div class="reply-bg p-3 rounded-lg">
                                                <p class="wb-text-secondary text-sm leading-relaxed mb-2 whitespace-pre-wrap"
                                                    x-text="reply.comment"></p>
                                                <div class="flex justify-between items-center text-xs wb-text-faint">

                    <template x-if="activeComments.length === 0">

                        </div>
                    </template>
                </div>

                <!-- Grouped-by-thread view -->
                <div class="space-y-6 pb-8" x-show="groupByThread" x-cloak>
                    <template x-for="(group, gi) in groupedComments" :key="gi">
                        <div>
                            <template x-if="group.title">
                                <a :href="group.url" target="_blank" rel="noopener noreferrer"
                                    class="block text-xs thread-title mb-2 truncate leading-tight font-semibold"
                                    x-text="group.title"></a>
                            </template>
                            <div class="space-y-3" :class="group.title ? 'ml-2 border-l-2 reply-border pl-3' : ''">
                                <template x-for="comment in group.comments" :key="comment.id">
                                    <div class="wb-surface p-4 rounded-xl shadow wb-border border relative group">
                                        <div class="absolute top-2 right-2 flex gap-1">
                                            <a x-show="comment.source === 'bluesky'" :href="comment.url" target="_blank"
                                                rel="noopener noreferrer"
                                                class="text-[10px] badge-bluesky px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                                title="View original post">BlueSky &#x1F517;</a>
                                            <a x-show="comment.source === 'reddit'" :href="comment.url" target="_blank"
                                                rel="noopener noreferrer"
                                                class="text-[10px] badge-reddit px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                                title="View on Reddit">Reddit &#x1F517;</a>
                                            <span x-show="!comment.source"
                                                class="text-[10px] badge-trakt px-1.5 py-0.5 rounded font-bold uppercase">Trakt</span>
                                        </div>

                                        <p class="wb-text-secondary text-sm leading-relaxed mb-3 whitespace-pre-wrap"
                                            x-text="comment.comment"></p>

                                        <template x-if="comment.images && comment.images.length > 0">
                                            <div class="grid gap-2 mb-3"
                                                :class="comment.images.length > 1 ? 'grid-cols-2' : 'grid-cols-1'">
                                                <template x-for="img in comment.images" :key="img">
                                                    <div @click="lightboxImg = img"
                                                        class="block overflow-hidden rounded-lg wb-border border cursor-pointer"
                                                        style="background-color: var(--wb-bg);">
                                                        <img :src="img"
                                                            class="w-full h-auto object-cover hover:scale-110 transition-transform duration-300"
                                                            loading="lazy">
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <div class="flex justify-between items-center text-xs wb-text-faint">
                                            <span class="font-medium wb-text-muted"
                                                x-text="'@' + comment.user.username"></span>
                                            <div class="flex items-center gap-3">
                                                <span x-show="comment.score != null && comment.score !== 0"
                                                    class="wb-text-faint"
                                                    x-text="'&#9650; ' + formatScore(comment.score)"></span>
                                                <span x-text="formatDate(comment.created_at)"></span>
                                            </div>
                                        </div>

                                        <!-- Level 1 replies -->
                                        <template x-if="comment.replies && comment.replies.length > 0">
                                            <div class="mt-3 border-l-2 reply-border pl-3 space-y-3">
                                                <template x-for="reply in comment.replies" :key="reply.id">
                                                    <div>
                                                        <div class="reply-bg p-3 rounded-lg">
                                                            <p class="wb-text-secondary text-sm leading-relaxed mb-2 whitespace-pre-wrap"
                                                                x-text="reply.comment"></p>
                                                            <div
                                                                class="flex justify-between items-center text-xs wb-text-faint">
                                                                <span class="font-medium wb-text-muted"
                                                                    x-text="'@' + reply.user.username"></span>
                                                                <div class="flex items-center gap-3">
                                                                    <span
                                                                        x-show="reply.score != null && reply.score !== 0"
                                                                        class="wb-text-faint"
                                                                        x-text="'&#9650; ' + formatScore(reply.score)"></span>
                                                                    <span x-text="formatDate(reply.created_at)"></span>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <!-- Level 2 replies -->
                                                        <template x-if="reply.replies && reply.replies.length > 0">
                                                            <div
                                                                class="mt-2 ml-3 border-l-2 reply-border pl-3 space-y-2">
                                                                <template x-for="subreply in reply.replies"
                                                                    :key="subreply.id">
                                                                    <div>
                                                                        <div class="reply-bg p-3 rounded-lg">
                                                                            <p class="wb-text-secondary text-sm leading-relaxed mb-2 whitespace-pre-wrap"
                                                                                x-text="subreply.comment"></p>
                                                                            <div
                                                                                class="flex justify-between items-center text-xs wb-text-faint">
                                                                                <span class="font-medium wb-text-muted"
                                                                                    x-text="'@' + subreply.user.username"></span>
                                                                                <div class="flex items-center gap-3">
                                                                                    <span
                                                                                        x-show="subreply.score != null && subreply.score !== 0"
                                                                                        class="wb-text-faint"
                                                                                        x-text="'&#9650; ' + formatScore(subreply.score)"></span>
                                                                                    <span
                                                                                        x-text="formatDate(subreply.created_at)"></span>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                        <template
                                                                            x-if="subreply.replies && subreply.replies.length > 0">
                                                                            <a :href="subreply.url" target="_blank"
                                                                                rel="noopener noreferrer"
                                                                                class="block mt-1 ml-3 text-xs wb-text-faint hover:wb-text-muted transition-colors"
                                                                                x-text="'&#8627; ' + countAllReplies(subreply) + ' more ' + (countAllReplies(subreply) === 1 ? 'reply' : 'replies') + ' in thread'"></a>
                                                                        </template>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template x-if="activeComments.length === 0">
                        <div class="py-12 text-center">
                            <p class="wb-text-faint">No comments found for this view.</p>
                        </div>
                    </template>
                </div>
            </main>
        </template>

        <template x-if="data?.status === 'idle' || data?.status === 'setup_required'">
            <div class="text-center py-20 px-6">
                <p class="wb-text-muted text-lg mb-2" x-text="data?.message || 'Nothing playing.'"></p>
                <p class="text-xs wb-text-faint">The dashboard will update automatically when you start playback.</p>
            </div>
        </template>
        <!-- Image lightbox overlay -->
        <div x-show="lightboxImg" x-transition.opacity.duration.200ms @click="lightboxImg = null"
            @keydown.escape.window="lightboxImg = null"
            class="fixed inset-0 z-50 flex items-center justify-center p-4 cursor-pointer"
            style="background-color: rgba(0,0,0,0.85);" x-cloak>
            <img :src="lightboxImg" @click.stop
                class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl cursor-default">
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('app', () => ({
                data: null, error: null, isLoading: false, mode: 'all', sourceFilter: new Set(),
                status: null, showConfig: false, configData: null, configDraft: {}, lightboxImg: null,
                groupByThread: localStorage.getItem('wb_groupByThread') === 'true',
                threadGroupPinned: localStorage.getItem('wb_groupByThread') === 'true',
                _threadTapTimer: null,
                prefSaveStatus: '',
                _prefSaveTimer: null,
                async init() {
                    console.log("[WatchBack] Initializing application");
                    try {
                        const [sRes, cRes] = await Promise.all([fetch('/api/status'), fetch('/api/config')]);
                        this.status = await sRes.json();
                        this.configData = await cRes.json();
                        this.configDraft = this.buildDraft();
                        this.applyTheme();
                        console.debug("[WatchBack] Configuration loaded", { jellyfin: this.status.jellyfin_configured, trakt: this.status.trakt_configured });
                    } catch (e) {
                        console.error("[WatchBack] Failed to initialize:", e);
                    }
                    this.sync();
                    this.setupSSE();
                },
                setupSSE() {
                    const es = new EventSource('/api/stream');
                    es.onmessage = (e) => {
                        if (e.data === 'refresh') this.sync();
                    };
                    es.onerror = () => {
                        es.close();
                        setTimeout(() => this.setupSSE(), 5000);
                    };
                },
                applyTheme(mode) {
                    const themeMode = mode || this.configData?.theme_mode?.effective_value || 'dark';
                    document.documentElement.setAttribute('data-theme', themeMode);
                },
                buildDraft() {
                    const draft = {};
                    if (!this.configData) return {};
                    // Fields that use <select> need a value (not empty string) to display correctly
                    const selectFields = new Set(['theme_mode']);
                    Object.entries(this.configData).forEach(([key, meta]) => {
                        if (meta.is_secret) {
                            draft[key] = '';
                        } else if (selectFields.has(key)) {
                            draft[key] = meta.effective_value || meta.stored_value || '';
                        } else {
                            draft[key] = meta.source === 'stored' ? meta.stored_value : '';
                        }
                    });
                    return draft;
                },
                async resetField(key) {
                    console.debug(`[WatchBack] Resetting field: ${key}`);
                    try {
                        const payload = {};
                        payload[key] = ''; // Sending empty string triggers removal of override in backend
                        await fetch('/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        const cRes = await fetch('/api/config');
                        this.configData = await cRes.json();
                        this.configDraft = this.buildDraft();
                        console.info(`[WatchBack] Field reset: ${key}`);
                        this.sync();
                    } catch (e) {
                        console.error(`[WatchBack] Failed to reset field ${key}:`, e);
                    }
                },
                handleThreadToggle() {
                    if (this._threadTapTimer) {
                        clearTimeout(this._threadTapTimer);
                        this._threadTapTimer = null;
                        // Double-click/tap: toggle + save as default
                        this.groupByThread = !this.groupByThread;
                        this.threadGroupPinned = this.groupByThread;
                        if (this.groupByThread) {
                            localStorage.setItem('wb_groupByThread', 'true');
                        } else {
                            localStorage.removeItem('wb_groupByThread');
                        }
                    } else {
                        this._threadTapTimer = setTimeout(() => {
                            this._threadTapTimer = null;
                            this.groupByThread = !this.groupByThread;
                        }, 250);
                    }
                },
                toggleSource(src) {
                    if (this.sourceFilter.has(src)) {
                        this.sourceFilter.delete(src);
                    } else {
                        this.sourceFilter.add(src);
                    }
                    // Force Alpine reactivity by replacing the Set
                    this.sourceFilter = new Set(this.sourceFilter);
                },
                sourceActive(src) {
                    return this.sourceFilter.size === 0 || this.sourceFilter.has(src);
                },
                get showTimeMachine() {
                    if (!this.data) return false;
                    const tm = this.data.time_machine || [];
                    if (tm.length === 0) return false;
                    // Hide if the premiere window is still open — the filter has no meaning yet
                    const premiere = this.data.metadata?.premiere;
                    if (premiere) {
                        const cutoff = new Date(premiere);
                        cutoff.setDate(cutoff.getDate() + (this.data.time_machine_days || 14));
                        if (cutoff >= new Date()) return false;
                    }
                    return true;
                },
                get activeComments() {
                    if (!this.data) return [];
                    const list = this.mode === 'time' ? this.data.time_machine : this.data.all_comments;
                    if (this.sourceFilter.size === 0) return list;
                    return list.filter(c => this.sourceFilter.has(c.source || 'trakt'));
                },
                get hasThreadGroups() {
                    return this.activeComments.some(c => c.thread_title);
                },
                get groupedComments() {
                    const comments = this.activeComments;
                    const groups = [];
                    const map = new Map();
                    for (const c of comments) {
                        const key = c.thread_title || '';
                        if (!map.has(key)) {
                            const g = { title: c.thread_title || null, url: c.thread_url || null, comments: [] };
                            map.set(key, g);
                            groups.push(g);
                        }
                        map.get(key).comments.push(c);
                    }
                    return groups;
                },
                async sync() {
                    console.debug("[WatchBack] Syncing data...");
                    this.isLoading = true;
                    try {
                        const res = await fetch('/api/sync?t=' + Date.now());
                        const newData = await res.json();

                        if (newData?.status === 'success') {
                            console.info(`[WatchBack] Synced: ${newData.title}`, { timeMachine: newData.time_machine?.length || 0, allComments: newData.all_comments?.length || 0 });
                        } else if (newData?.status === 'idle') {
                            console.debug("[WatchBack] No active session");
                        } else {
                            console.warn(`[WatchBack] Sync status: ${newData?.status}`);
                        }

                        this.data = newData;
                        // Default to time machine when it has a meaningful subset, otherwise all
                        if (this.data?.status === 'success') {
                            this.mode = this.showTimeMachine ? 'time' : 'all';
                        }
                    } catch (e) {
                        console.error("[WatchBack] Sync failed:", e);
                        this.error = "Connection failed";
                    }
                    finally { this.isLoading = false; }
                },
                async saveConfig() {
                    console.log("[WatchBack] Saving configuration...");
                    try {
                        // Only send fields with non-empty values to avoid clearing untouched fields
                        const payload = {};
                        Object.entries(this.configDraft).forEach(([key, value]) => {
                            if (value) payload[key] = value;
                        });
                        const saveRes = await fetch('/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        if (!saveRes.ok) throw new Error(`HTTP ${saveRes.status}`);
                        const cRes = await fetch('/api/config');
                        this.configData = await cRes.json();
                        this.configDraft = this.buildDraft();
                        this.applyTheme();
                        console.info("[WatchBack] Configuration saved successfully");
                        this.sync(); // Immediate refresh after saving
                    } catch (e) {
                        console.error("[WatchBack] Failed to save configuration:", e);
                    }
                },
                async clearCache() {
                    console.warn("[WatchBack] Clearing cache...");
                    try {
                        const res = await fetch('/api/cache/clear', { method: 'POST' });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        console.info("[WatchBack] Cache cleared");
                        this.sync();
                    } catch (e) {
                        console.error("[WatchBack] Cache clear failed:", e);
                    }
                },
                async restartServer() {
                    console.warn("[WatchBack] Restarting server...");
                    try {
                        const res = await fetch('/api/restart', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ confirm: true }) });
                        const result = await res.json();
                        if (result.status === 'restarting') {
                            console.info("[WatchBack] Server restart initiated");
                        } else {
                            console.error("[WatchBack] Restart failed:", result);
                        }
                    } catch (e) {
                        console.error("[WatchBack] Server restart request failed:", e);
                    }
                },
                formatDate(iso) { return iso ? new Date(iso).toLocaleDateString() : ''; },
                countAllReplies(c) {
                    if (!c.replies || !Array.isArray(c.replies)) return 0;
                    return c.replies.reduce((n, r) => n + 1 + this.countAllReplies(r), 0);
                },
                formatScore(n) {
                    if (n == null) return '';
                    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
                    return String(n);
                }
            }))
        })
    </script>
