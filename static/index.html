<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchALongAgo</title>
    <link rel="stylesheet" href="/tailwind.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 antialiased font-sans p-4" x-data="app()">
    <div class="max-w-md mx-auto" x-cloak x-show="true">

        <header class="flex justify-between items-center mb-6 mt-2">
            <h1 class="text-2xl font-bold text-blue-400">WatchALongAgo</h1>
            <div class="flex gap-2">
                <button @click="showConfig = !showConfig"
                    :class="showConfig ? 'bg-gray-600 text-white' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'"
                    class="px-3 py-2 rounded-lg transition-colors text-lg leading-none"
                    title="Configuration">⚙️</button>
                <button @click="sync()"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-lg flex items-center gap-2"
                    :disabled="isLoading">
                    <span x-show="!isLoading">🔄 Sync</span>
                    <span x-show="isLoading" x-cloak>⏳ Syncing...</span>
                </button>
            </div>
        </header>

        <div x-show="showConfig" x-cloak class="bg-gray-800 border border-gray-700 rounded-xl mb-6 overflow-hidden">
            <div class="p-4">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Configuration</h3>

                <div class="space-y-6">
                    <div>
                        <p class="text-xs text-gray-500 mb-2 font-medium uppercase tracking-wide">Jellyfin</p>
                        <div class="space-y-3">
                            <div class="relative group">
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium text-gray-300">Server URL</label>
                                    <button x-show="configData?.jf_url?.source === 'stored'"
                                        @click="resetField('jf_url')"
                                        class="text-[10px] text-blue-400 hover:text-blue-300 cursor-pointer">Reset to
                                        ENV</button>
                                </div>
                                <input type="text" x-model="configDraft.jf_url"
                                    :placeholder="configData?.jf_url?.env_value || 'http://jellyfin:8096'"
                                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 transition-colors"
                                    :class="configData?.jf_url?.source === 'stored' ? 'border-blue-500 ring-1 ring-blue-500/20' : 'focus:border-blue-500'">
                            </div>
                            <div class="relative">
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium text-gray-300">API Key</label>
                                    <button x-show="configData?.jf_api_key?.source === 'stored'"
                                        @click="resetField('jf_api_key')"
                                        class="text-[10px] text-blue-400 hover:text-blue-300 cursor-pointer">Reset to
                                        ENV</button>
                                </div>
                                <input type="password" x-model="configDraft.jf_api_key"
                                    :placeholder="configData?.jf_api_key?.effective_value || 'Required'"
                                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 transition-colors"
                                    :class="configData?.jf_api_key?.source === 'stored' ? 'border-blue-500 ring-1 ring-blue-500/20' : ''">
                            </div>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500 mb-2 font-medium uppercase tracking-wide">Trakt</p>
                        <div class="grid grid-cols-2 gap-3">
                            <div
                                x-show="!configDraft.trakt_client_id && !configData?.trakt_client_id?.is_env_set && !configData?.trakt_client_id?.is_stored_set">
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium text-gray-300">Username</label>
                                    <button x-show="configData?.trakt_username?.source === 'stored'"
                                        @click="resetField('trakt_username')"
                                        class="text-[10px] text-blue-400 hover:text-blue-300 cursor-pointer">Reset</button>
                                </div>
                                <input type="text" x-model="configDraft.trakt_username"
                                    :placeholder="configData?.trakt_username?.env_value || 'Optional'"
                                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 transition-colors"
                                    :class="configData?.trakt_username?.source === 'stored' ? 'border-blue-500 ring-1 ring-blue-500/20' : ''">
                            </div>
                            <div
                                :class="(!configDraft.trakt_client_id && !configData?.trakt_client_id?.is_env_set && !configData?.trakt_client_id?.is_stored_set) ? '' : 'col-span-2'">
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium text-gray-300">Client ID</label>
                                    <button x-show="configData?.trakt_client_id?.source === 'stored'"
                                        @click="resetField('trakt_client_id')"
                                        class="text-[10px] text-blue-400 hover:text-blue-300 cursor-pointer">Reset</button>
                                </div>
                                <input type="text" x-model="configDraft.trakt_client_id"
                                    :placeholder="configData?.trakt_client_id?.env_value || 'Optional'"
                                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 transition-colors"
                                    :class="configData?.trakt_client_id?.source === 'stored' ? 'border-blue-500 ring-1 ring-blue-500/20' : ''">
                            </div>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs text-gray-500 mb-2 font-medium uppercase tracking-wide">Bluesky</p>
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium text-gray-300">Handle/Email</label>
                                    <button x-show="configData?.bsky_identifier?.source === 'stored'"
                                        @click="resetField('bsky_identifier')"
                                        class="text-[10px] text-blue-400 hover:text-blue-300 cursor-pointer">Reset</button>
                                </div>
                                <input type="text" x-model="configDraft.bsky_identifier"
                                    :placeholder="configData?.bsky_identifier?.env_value || 'you.bsky.social'"
                                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 transition-colors"
                                    :class="configData?.bsky_identifier?.source === 'stored' ? 'border-blue-500 ring-1 ring-blue-500/20' : ''">
                            </div>
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium text-gray-300">App Password</label>
                                    <button x-show="configData?.bsky_app_password?.source === 'stored'"
                                        @click="resetField('bsky_app_password')"
                                        class="text-[10px] text-blue-400 hover:text-blue-300 cursor-pointer">Reset</button>
                                </div>
                                <input type="password" x-model="configDraft.bsky_app_password"
                                    :placeholder="configData?.bsky_app_password?.effective_value || 'xxxx-xxxx-xxxx-xxxx'"
                                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-200 transition-colors"
                                    :class="configData?.bsky_app_password?.source === 'stored' ? 'border-blue-500 ring-1 ring-blue-500/20' : ''">
                            </div>
                        </div>
                    </div>

                    <div class="border-t border-gray-700"></div>

                    <div>
                        <p class="text-xs text-gray-500 mb-2 font-medium uppercase tracking-wide">Reddit</p>
                        <div class="flex items-center justify-between">
                            <label class="text-xs font-medium text-gray-300">Auto-open Reddit threads</label>
                            <input type="checkbox" :checked="configDraft.reddit_auto_open === '1'"
                                @change="configDraft.reddit_auto_open = $event.target.checked ? '1' : ''"
                                class="w-4 h-4 rounded accent-blue-500">
                        </div>
                    </div>
                </div>

                <div class="mt-5 flex items-center gap-2">
                    <button @click="clearCache()"
                        class="bg-gray-700 text-gray-300 px-3 py-2 rounded-lg text-sm font-medium cursor-pointer hover:bg-gray-600 transition-colors">🗑
                        Cache</button>
                    <button @click="restartServer()"
                        class="bg-gray-700 text-gray-300 px-3 py-2 rounded-lg text-sm font-medium cursor-pointer hover:bg-gray-600 transition-colors">↺
                        Restart</button>
                    <button @click="saveConfig()"
                        class="ml-auto bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium cursor-pointer hover:bg-blue-500 transition-colors">Save</button>
                </div>
            </div>
        </div>

        <template x-if="data?.status === 'success'">
            <main>
                <div class="bg-gray-800 p-4 rounded-xl mb-6 shadow-md border border-gray-700">
                    <h2 class="text-xl font-bold mb-1" x-text="data?.title"></h2>
                    <p class="text-sm text-gray-400">Aired: <span x-text="formatDate(data?.metadata?.premiere)"></span>
                    </p>
                </div>

                <div class="flex gap-2 mb-6 bg-gray-800 p-1 rounded-lg border border-gray-700">
                    <button @click="mode = 'time'"
                        :class="mode === 'time' ? 'bg-blue-600 text-white shadow' : 'text-gray-400'"
                        class="flex-1 py-2 rounded-md text-sm font-medium transition-colors cursor-pointer">Time Machine
                        ⏱️</button>
                    <button @click="mode = 'all'"
                        :class="mode === 'all' ? 'bg-blue-600 text-white shadow' : 'text-gray-400'"
                        class="flex-1 py-2 rounded-md text-sm font-medium transition-colors cursor-pointer">All Comments
                        💬</button>
                    <a :href="data?.reddit_url" target="_blank"
                        class="flex-1 py-2 rounded-md text-sm font-medium text-center text-orange-400 cursor-pointer">Reddit
                        🔍</a>
                </div>

                <div class="space-y-4 pb-8">
                    <template x-for="comment in activeComments" :key="comment.id || Math.random()">
                        <div class="bg-gray-800 p-4 rounded-xl shadow border border-gray-700 relative group">
                            <div class="absolute top-2 right-2 flex gap-1">
                                <a x-show="comment.source === 'bluesky'" :href="comment.url" target="_blank"
                                    class="text-[10px] bg-blue-900/50 hover:bg-blue-800 text-blue-300 px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                    title="View original post">BlueSky 🔗</a>
                                <span x-show="!comment.source"
                                    class="text-[10px] bg-gray-700 text-gray-400 px-1.5 py-0.5 rounded font-bold uppercase">Trakt</span>
                            </div>
                            <p class="text-gray-200 text-sm leading-relaxed mb-3 whitespace-pre-wrap"
                                x-text="comment.comment"></p>

                            <template x-if="comment.images && comment.images.length > 0">
                                <div class="grid gap-2 mb-3"
                                    :class="comment.images.length > 1 ? 'grid-cols-2' : 'grid-cols-1'">
                                    <template x-for="img in comment.images" :key="img">
                                        <a :href="comment.url" target="_blank"
                                            class="block overflow-hidden rounded-lg bg-gray-900 border border-gray-700">
                                            <img :src="img"
                                                class="w-full h-auto object-cover hover:scale-105 transition-transform duration-300"
                                                loading="lazy">
                                        </a>
                                    </template>
                                </div>
                            </template>

                            <div class="flex justify-between items-center text-xs text-gray-500">
                                <span class="font-medium text-gray-400" x-text="'@' + comment.user.username"></span>
                                <span x-text="formatDate(comment.created_at)"></span>
                            </div>
                        </div>
                    </template>

                    <template x-if="activeComments.length === 0">
                        <div class="py-12 text-center">
                            <p class="text-gray-500">No comments found for this view.</p>
                        </div>
                    </template>
                </div>
            </main>
        </template>

        <template x-if="data?.status === 'idle' || data?.status === 'setup_required'">
            <div class="text-center py-20 px-6">
                <p class="text-gray-400 text-lg mb-2" x-text="data?.message || 'Nothing playing.'"></p>
                <p class="text-xs text-gray-600">The dashboard will update automatically when you start playback.</p>
            </div>
        </template>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('app', () => ({
                data: null, error: null, isLoading: false, mode: 'time',
                status: null, showConfig: false, configData: null, configDraft: {},
                async init() {
                    try {
                        const [sRes, cRes] = await Promise.all([fetch('/api/status'), fetch('/api/config')]);
                        this.status = await sRes.json();
                        this.configData = await cRes.json();
                        this.configDraft = this.buildDraft();
                    } catch (e) { }
                    this.sync();
                    this.setupSSE();
                },
                setupSSE() {
                    const es = new EventSource('/api/stream');
                    es.onmessage = (e) => {
                        if (e.data === 'refresh') this.sync();
                    };
                    es.onerror = () => {
                        es.close();
                        setTimeout(() => this.setupSSE(), 5000);
                    };
                },
                buildDraft() {
                    const draft = {};
                    if (!this.configData) return {};
                    Object.entries(this.configData).forEach(([key, meta]) => {
                        // If it's a secret, we keep the draft empty so they can type a NEW one if desired.
                        // Placeholder handles showing the masked ENV/previous value.
                        if (meta.is_secret) {
                            draft[key] = '';
                        } else {
                            // Only put it in the draft if it's a manual override.
                            // If it's from ENV, we let the placeholder show it.
                            draft[key] = meta.source === 'stored' ? meta.stored_value : '';
                        }
                    });
                    return draft;
                },
                async resetField(key) {
                    const payload = {};
                    payload[key] = ''; // Sending empty string triggers removal of override in backend
                    await fetch('/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const cRes = await fetch('/api/config');
                    this.configData = await cRes.json();
                    this.configDraft = this.buildDraft();
                    this.sync();
                },
                get activeComments() {
                    if (!this.data) return [];
                    return this.mode === 'time' ? this.data.time_machine : this.data.all_comments;
                },
                async sync() {
                    this.isLoading = true;
                    try {
                        const res = await fetch('/api/sync?t=' + Date.now());
                        const newData = await res.json();

                        // Auto-switch to 'all' if 'time' is empty but we have general results
                        if (newData?.status === 'success') {
                            if ((!newData.time_machine || newData.time_machine.length === 0) &&
                                (newData.all_comments && newData.all_comments.length > 0)) {
                                this.mode = 'all';
                            }
                        }

                        this.data = newData;
                    } catch (e) { this.error = "Connection failed"; }
                    finally { this.isLoading = false; }
                },
                async saveConfig() {
                    await fetch('/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.configDraft) });
                    const cRes = await fetch('/api/config');
                    this.configData = await cRes.json();
                    this.configDraft = this.buildDraft();
                    this.sync(); // Immediate refresh after saving
                },
                async clearCache() {
                    await fetch('/api/cache/clear', { method: 'POST' });
                    this.sync();
                },
                async restartServer() {
                    await fetch('/api/restart', { method: 'POST' });
                },
                formatDate(iso) { return iso ? new Date(iso).toLocaleDateString() : ''; }
            }))
        })
    </script>
</body>

</html>
