version: '3.8'

services:
  watchback:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchback-api
    ports:
      - "5000:5000"
    volumes:
      # Persist SQLite database
      - watchback-data:/app/data
      # Mount configuration (optional - for environment-based config)
      - ./config:/app/config:ro
    environment:
      # Provider configurations - override via environment variables
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000

      # Jellyfin configuration
      Jellyfin__BaseUrl: ${JELLYFIN_BASE_URL:-http://jellyfin:8096}
      Jellyfin__ApiKey: ${JELLYFIN_API_KEY:-}
      Jellyfin__CacheTtlSeconds: 10

      # Trakt configuration
      Trakt__ClientId: ${TRAKT_CLIENT_ID:-}
      Trakt__AccessToken: ${TRAKT_ACCESS_TOKEN:-}
      Trakt__Username: ${TRAKT_USERNAME:-}
      Trakt__CacheTtlSeconds: 30

      # Bluesky configuration
      Bluesky__Handle: ${BLUESKY_HANDLE:-}
      Bluesky__AppPassword: ${BLUESKY_APP_PASSWORD:-}
      Bluesky__TokenCacheTtlSeconds: 5400

      # Reddit configuration
      Reddit__MaxThreads: 3
      Reddit__MaxComments: 250
      Reddit__CacheTtlSeconds: 86400

      # WatchBack configuration
      WatchBack__TimeMachineDays: ${WATCHBACK_TIME_MACHINE_DAYS:-14}
      WatchBack__WatchProvider: ${WATCHBACK_PROVIDER:-jellyfin}

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/sync"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Optional: depends_on Jellyfin if running in same compose
    # depends_on:
    #   jellyfin:
    #     condition: service_healthy

volumes:
  watchback-data:
    driver: local

