                    <p class="wb-text-faint leading-snug">
                        <ion-icon aria-hidden="true" class="align-middle" name="radio-outline"></ion-icon>
                        <span x-text="t('Dashboard_ProviderPlaying', data.suppressedProvider, data.suppressedTitle)"></span>
                    </p>
                </template>
            </div>
        </template>

        <!-- Search input -->
        <form @submit.prevent="searchMedia()" class="flex gap-2">
            <input :aria-label="t('Dashboard_SearchMoviesTVShows')" :placeholder="t('Dashboard_SearchPlaceholder')"
                   autocomplete="off"
                   autocorrect="off"
                   class="flex-1 wb-surface wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border focus:outline-none"
                   spellcheck="false"
                   type="search"
                   x-model="searchQuery">
            <button :disabled="searchLoading || !searchQuery.trim()" class="px-4 py-2 rounded-lg text-sm font-medium wb-surface wb-border border wb-text-secondary
                           cursor-pointer disabled:opacity-40 wb-btn flex items-center gap-1.5
                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                    type="submit">
                <ion-icon :name="searchLoading ? 'hourglass-outline' : 'search-sharp'" aria-hidden="true"></ion-icon>
                <span class="hide-on-mobile"
                      x-text="searchLoading ? t('Dashboard_Searching') : t('Dashboard_Search')"></span>
            </button>
        </form>

        <!-- Search error -->
        <p class="text-xs wb-error-text mt-2 px-1" x-show="searchError" x-text="searchError"></p>

        <!-- Search results -->
        <template x-if="searchResults.length > 0 && !searchDrilldown">
            <div class="mt-3 space-y-2">
                <template :key="result.imdbId" x-for="result in searchResults">
                    <button @click="selectSearchResult(result)"
                            class="w-full flex gap-3 items-start p-3 rounded-lg wb-surface wb-border border text-left cursor-pointer hover:wb-surface-alt wb-btn transition-colors"
                            type="button">
                        <img :alt="result.title + ' poster'" :src="result.posterUrl"
                             class="w-12 h-16 object-cover rounded shrink-0 bg-gray-800"
                             loading="lazy" x-show="result.posterUrl">
                        <div class="w-12 h-16 rounded shrink-0 flex items-center justify-center wb-surface-alt wb-border border"
                             x-show="!result.posterUrl">
                            <ion-icon aria-hidden="true" class="wb-text-faint" name="film-outline"></ion-icon>
                        </div>
                        <div class="min-w-0">
                            <p class="text-sm font-semibold wb-text-secondary leading-snug" x-text="result.title"></p>
                            <p class="text-xs wb-text-muted mt-0.5">
                                <span x-text="result.year"></span>
                                <span class="mx-1">·</span>
                                <span class="capitalize" x-text="result.type"></span>
                            </p>
                            <p class="text-xs wb-text-faint mt-1" x-show="result.type === 'series'"
                               x-text="t('Dashboard_BrowseSeasons')"></p>
                        </div>
                    </button>
                </template>
            </div>
        </template>

        <!-- Series drill-down: seasons -->
        <template x-if="searchDrilldown && !drilldownSeason">
            <div class="mt-3">
                <div class="flex items-center gap-2 mb-3">
                    <button @click="searchDrilldown = null; drilldownSeason = null; drilldownEpisodes = []"
                            class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer wb-btn"
                            type="button"
                            x-text="t('Dashboard_Back')">
                    </button>
                    <p class="text-sm font-semibold wb-text-secondary" x-text="searchDrilldown.title"></p>
                </div>
                <p class="text-xs wb-text-muted mb-2" x-show="!drilldownLoading"
                   x-text="t('Dashboard_SelectSeason')"></p>
                <p class="text-xs wb-text-faint" x-show="drilldownLoading" x-text="t('Dashboard_LoadingSeasons')"></p>
                <div class="flex flex-wrap gap-2">
                    <template :key="season.seasonNumber" x-for="season in searchDrilldown.seasons">
                        <button @click="selectSeason(season)"
                                class="px-4 py-2 rounded-lg text-sm wb-surface wb-border border wb-text-secondary cursor-pointer hover:wb-surface-alt wb-btn transition-colors"
                                type="button">
                            <span x-text="t('Dashboard_Season')"></span> <span x-text="season.seasonNumber"></span>
                        </button>
                    </template>
                </div>
            </div>
        </template>

        <!-- Series drill-down: episodes -->
        <template x-if="searchDrilldown && drilldownSeason">
            <div class="mt-3">
                <div class="flex items-center gap-2 mb-3">
                    <button @click="drilldownSeason = null; drilldownEpisodes = []"
                            class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer wb-btn"
                            type="button"
                            x-text="t('Dashboard_SeasonsBack')">
                    </button>
                    <p class="text-sm font-semibold wb-text-secondary"
                       x-text="t('Dashboard_SeasonTitle', searchDrilldown.title, drilldownSeason.seasonNumber)">
                    </p>
                </div>
                <p class="text-xs wb-text-faint" x-show="drilldownLoading" x-text="t('Dashboard_LoadingEpisodes')"></p>
                <div class="space-y-1" x-show="!drilldownLoading">
                    <template :key="ep.episodeNumber" x-for="ep in drilldownEpisodes">
                        <button @click="selectEpisode(ep)"
                                class="w-full flex items-center gap-3 px-3 py-2 rounded-lg wb-surface wb-border border text-left cursor-pointer hover:wb-surface-alt wb-btn transition-colors"
                                type="button">
                        <span class="text-xs wb-text-faint shrink-0 w-8 text-right"
                              x-text="t('Dashboard_EpisodeNumber', String(ep.episodeNumber).padStart(2, '0'))">
                        </span>
                            <span class="text-sm wb-text-secondary truncate" x-text="ep.title"></span>
                            <span class="text-xs wb-text-faint shrink-0 ml-auto" x-show="ep.airDate"
                                  x-text="formatDate(ep.airDate)">
                        </span>
                        </button>
                    </template>
                </div>
            </div>
        </template>

    </div>

    <!-- Main content: always present so the page always has a main landmark -->
    <main>

        <!-- Success state: show comments -->

        <template x-if="data?.status === 'Watching'">
            <div>
                <div class="wb-surface p-4 rounded-xl mb-6 shadow-md wb-border border comment-card">
                    <h2 class="text-xl font-bold mb-1"
                        x-text="data?.metadata?.episodeTitle ? data.title + ' - ' + data.metadata.episodeTitle : data?.title">
                    </h2>
                    <p class="text-sm wb-text-muted">
                        <span x-text="t('Dashboard_Aired')"></span>
                        <span
                                x-text="formatDate(data?.metadata?.releaseDate)">
        </span>
                    </p>
                    <template x-if="(data?.ratings || []).length > 0">
                        <div class="flex gap-2 flex-wrap mt-3">
                            <template :key="r.source" x-for="r in data.ratings">
                <span :style="r.brandColor ? `border-color: color-mix(in srgb, ${r.brandColor} 38%, transparent)` : 'border-color: var(--wb-border)'"
                      class="inline-flex items-center gap-2 text-sm font-medium px-3 py-1.5 rounded-lg wb-surface-alt border wb-text-muted">
                    <template x-if="r.logoSvg">
                        <span :style="`color: ${r.brandColor}; fill: ${r.brandColor}`"
                              class="inline-flex items-center w-5 h-5 shrink-0"
                              x-html="r.logoSvg">
                        </span>
                    </template>
                    <span x-text="`${r.source}: ${r.value}`"></span>
                </span>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Mode toggle & source filters (only when there are thoughts) -->
                <template x-if="(data?.allThoughts || []).length > 0">
                    <div class="flex gap-2 mb-6 wb-surface p-1 rounded-lg wb-border border comment-card"
                         style="animation-delay:0.05s">
                        <button :aria-pressed="mode === 'time'"
                                :class="mode === 'time' ? 'wb-on-accent wb-bg-accent shadow' : 'wb-text-muted'"
                                @click="mode = 'time'"
                                class="flex gap-1.5 items-center justify-center flex-1 py-2 rounded-md text-sm font-medium cursor-pointer wb-btn"
                                x-show="showTimeMachine">
                            <span class="flex hide-on-mobile" x-text="t('Dashboard_TimeMachine')"></span>
                            <ion-icon aria-hidden="true" class="show-on-mobile" name="hourglass-sharp"></ion-icon>
                            <span class="text-xs font-normal" x-text="'(' + timeMachineCount + ')'"></span>
                        </button>
                        <button :aria-pressed="mode === 'all'"
                                :class="mode === 'all' ? 'wb-on-accent wb-bg-accent shadow' : 'wb-text-muted'"
                                @click="mode = 'all'"
                                class="flex gap-1.5 items-center justify-center flex-1 py-2 rounded-md text-sm font-medium cursor-pointer wb-btn">
                            <span class="flex hide-on-mobile" x-text="t('Dashboard_AllComments')"></span>
                            <ion-icon aria-hidden="true" class="show-on-mobile" name="chatbubbles-sharp"></ion-icon>
                            <span class="text-xs font-normal" x-text="'(' + allThoughtsCount + ')'"></span>
                        </button>
                    </div>
                </template>

                <!-- Reddit search — always visible when watching an episode -->
                <div :style="`--thread-brand: ${(availableSources.find(s => s.name === 'Reddit') || {}).brandColor || '#FF4500'}`"
                     class="mb-4 comment-card"
                     style="animation-delay:0.05s"
                     x-show="data?.metadata?.seasonNumber != null">
                    <a :aria-label="t('Comments_ViewOn', 'Reddit')"
                       :href="redditSearchUrl(data.title, data.metadata.seasonNumber, data.metadata.episodeNumber)"
                       class="w-full py-2 rounded-md text-sm font-medium text-center source-link cursor-pointer wb-btn flex items-center justify-center gap-1.5"
                       rel="noopener noreferrer"
                       target="_blank">
                        <ion-icon aria-hidden="true" name="logo-reddit"></ion-icon>
                        Reddit
                        <ion-icon aria-hidden="true" name="search-sharp"></ion-icon>
                    </a>
                </div>

                <!-- No discussions found -->
                <template x-if="(data?.allThoughts || []).length === 0">
                    <div class="py-16 text-center comment-card" style="animation-delay:0.1s">
                        <p class="wb-text-muted text-base mb-2" x-text="t('Dashboard_NoDiscussions')"></p>
                        <p class="text-xs wb-text-faint" x-text="t('Dashboard_NoDiscussionsDetail')"></p>
                    </div>
                </template>

                <!-- Source filter pills (only when thoughts exist) -->
                <div class="flex gap-2 mb-4 justify-center comment-card" style="animation-delay:0.1s"
                     x-show="availableSources.length > 1">
                    <template :key="src.name" x-for="src in availableSources">
                        <button :aria-label="src.name + ' (' + sourceCount(src.name) + ' comments)'"
                                :aria-pressed="sourceActive(src.name)"
                                :class="sourceActive(src.name) ? 'filter-source' : 'filter-inactive'"
                                :style="sourceActive(src.name) ? `--brand: ${src.brandColor}` : ''"
                                @click="toggleSource(src.name)"
                                class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold uppercase
                                   wb-border border cursor-pointer wb-btn
                                   hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                x-show="sourceCount(src.name) > 0">
                            <span x-text="src.name"></span>
                            <span class="text-xs font-semibold opacity-70 tabular-nums"
                                  x-text="sourceCount(src.name)">
            </span>
                        </button>
                    </template>
                </div>

                <!-- Thread grouping toggle -->
                <div class="flex justify-center mb-4" x-show="hasThreadGroups">
                    <button :aria-pressed="groupByThread"
                            :class="groupByThread ? 'filter-source' : 'filter-inactive'"
                            :style="groupByThread ? `--brand: ${(availableSources.find(s => s.name === 'Reddit') || {}).brandColor || ''}` : ''"
                            @click="handleThreadToggle()"
                            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold uppercase
                               wb-border border cursor-pointer wb-btn
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu">
                        <ion-icon aria-hidden="true" name="albums-sharp"></ion-icon>
                        <span x-text="groupByThread ? t('Dashboard_GroupedByThread') : t('Dashboard_GroupByThread')"></span>
                        <span class="text-xs font-semibold opacity-70 tabular-nums"
                              x-text="threadCount">
        </span>
                    </button>
                </div>

                <!-- Comments list -->
                <div class="pb-8">
                    <ul :aria-label="t('Aria_Comments')" :class="groupByThread ? 'space-y-6' : 'space-y-4'"
                        class="list-none">
                        <template :key="gi" x-for="(group, gi) in renderGroups">
                            <li :class="groupByThread && group.title ? 'thread-group' : ''"
                                :style="(groupByThread ? 'animation-delay:' + Math.min(gi * 0.08, 0.6) + 's;' : '') + (group.brandColor ? `--thread-brand:${group.brandColor}` : '')">
                                <template x-if="groupByThread && group.title">
                                    <div>
                                        <a :href="group.url"
                                           class="block text-xs thread-title mb-1 truncate leading-tight font-semibold"
                                           rel="noopener noreferrer"
                                           target="_blank"
                                           x-text="group.title">
                                        </a>
                                        <div class="text-xs wb-text-muted leading-relaxed mb-2 wb-md"
                                             x-html="renderMarkdown(group.body || '')"
                                             x-show="group.body">
                                        </div>
                                    </div>
                                </template>
                                <ul :class="groupByThread && group.title ? 'ml-2 border-l-2 reply-border pl-3 space-y-3' : (groupByThread ? 'space-y-3' : '')"
                                    class="list-none">
                                    <template :key="thought.id" x-for="(thought, ci) in group.thoughts">
                                        <li x-data="{ collapsed: false }">
                                            <article
                                                    :style="'animation-delay:' + Math.min((groupByThread ? ci : gi) * 0.04, 0.6) + 's' + (thought.brandColor ? `;--thread-brand:${thought.brandColor}` : '')"
                                                    class="wb-surface p-4 rounded-xl shadow wb-border border relative group comment-card">
                                                <div class="flex items-start mb-2 gap-2">
                                                    <div class="flex-1 min-w-0"
                                                         x-show="!groupByThread && thought.postTitle">
                                                        <a :href="thought.postUrl"
                                                           class="text-[11px] thread-title truncate leading-tight block"
                                                           rel="noopener noreferrer"
                                                           target="_blank"
                                                           x-text="thought.postTitle">
                                                        </a>
                                                    </div>
                                                    <div :class="groupByThread || !thought.postTitle ? 'ml-auto' : 'shrink-0'"
                                                         class="flex gap-1 items-center">
                                                        <template x-if="thought.replies && thought.replies.length > 0">
                                                            <button :aria-expanded="!collapsed"
                                                                    :aria-label="collapsed ? t('Comments_ExpandReplies') : t('Comments_CollapseReplies')"
                                                                    @click.stop="collapsed = !collapsed"
                                                                    class="p-0.5 rounded wb-text-faint hover:wb-text-muted transition-colors"
                                                                    type="button">
                                                                <ion-icon :class="{ '-rotate-90': collapsed }"
                                                                          aria-hidden="true"
                                                                          class="text-sm transition-transform block"
                                                                          name="chevron-down"></ion-icon>
                                                            </button>
                                                        </template>
                                                        <template x-if="thought.brandLogoSvg && thought.url">
                                                            <a :aria-label="t('Comments_ViewOn', thought.source)"
                                                               :href="thought.url"
                                                               :style="`--brand: ${thought.brandColor}`"
                                                               class="text-xs badge-source px-1.5 py-0.5 rounded font-bold uppercase inline-flex items-center gap-1"
                                                               rel="noopener noreferrer"
                                                               target="_blank"
                                                               x-html="sanitizeSvg(thought.brandLogoSvg)">
                                                            </a>
                                                        </template>
                                                        <template x-if="thought.brandLogoSvg && !thought.url">
                                            <span :style="`--brand: ${thought.brandColor}`"
                                                  class="text-xs badge-source px-1.5 py-0.5 rounded font-bold uppercase inline-flex items-center"
                                                  x-html="sanitizeSvg(thought.brandLogoSvg)">
                                            </span>
                                                        </template>
                                                    </div>
                                                </div>

                                                <div class="wb-text-secondary text-sm leading-relaxed mb-3 wb-md"
                                                     x-html="renderMarkdown(thought.content)">
                                                </div>

                                                <template x-if="thought.images && thought.images.length > 0">
                                                    <div :class="thought.images.length > 1 ? 'grid-cols-2' : 'grid-cols-1'"
                                                         class="grid gap-2 mb-3">
                                                        <template :key="img.url" x-for="img in thought.images">
                                                            <div :aria-label="t('Comments_ClickToEnlarge', img.alt || t('Comments_ImageFromPost'))"
                                                                 @click="lightboxImg = img.url"
                                                                 @keydown.enter="lightboxImg = img.url"
                                                                 class="block overflow-hidden rounded-lg wb-border border cursor-pointer"
                                                                 role="button"
                                                                 style="background-color: var(--wb-bg);"
                                                                 tabindex="0">
                                                                <img :alt="img.alt || t('Comments_ImageFromPost')"
                                                                     :src="img.url" alt=""
                                                                     class="w-full h-auto object-cover hover:scale-110 transition-transform duration-300"
                                                                     loading="lazy"
                                                                     src="">
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>

                                                <div class="flex justify-between items-center text-xs wb-text-faint">
                                    <span class="font-medium wb-text-muted">
                                        <span class="sr-only" x-text="t('Comments_By') + ' '"></span>
                                        <span x-text="'@' + thought.author"></span>
                                    </span>
                                                    <div class="flex items-center gap-3">
                                        <span :aria-label="t('Comments_Score', formatScore(thought.score))"
                                              class="wb-text-faint"
                                              x-show="thought.score != null && thought.score !== 0">
                                            <span aria-hidden="true"
                                                  x-text="'&#9650; ' + formatScore(thought.score)"></span>
                                        </span>
                                                        <span x-text="formatDate(thought.createdAt)"></span>
                                                    </div>
                                                </div>

                                                <!-- Level 1 replies -->
                                                <template x-if="thought.replies && thought.replies.length > 0">
                                                    <ul class="mt-3 border-l-2 reply-border pl-3 space-y-3 list-none"
                                                        x-show="!collapsed"
                                                        x-transition>
                                                        <template :key="reply.id" x-for="reply in thought.replies">
                                                            <li x-data="{ collapsed: false }">
                                                                <article class="reply-bg p-3 rounded-lg">
                                                                    <div class="wb-text-secondary text-sm leading-relaxed mb-2 wb-md"
                                                                         x-html="renderMarkdown(reply.content)">
                                                                    </div>
                                                                    <div
                                                                            class="flex justify-between items-center text-xs wb-text-faint">
                                                        <span class="font-medium wb-text-muted">
                                                            <span class="sr-only"
                                                                  x-text="t('Comments_By') + ' '"></span>
                                                            <span x-text="'@' + reply.author"></span>
                                                        </span>
                                                                        <div class="flex items-center gap-3">
                                                            <span
                                                                    :aria-label="t('Comments_Score', formatScore(reply.score))"
                                                                    class="wb-text-faint"
                                                                    x-show="reply.score != null && reply.score !== 0">
                                                                <span aria-hidden="true"
                                                                      x-text="'&#9650; ' + formatScore(reply.score)"></span>
                                                            </span>
                                                                            <span
                                                                                    x-text="formatDate(reply.createdAt)">
                                                            </span>
                                                                            <template x-if="reply.replies && reply.replies.length > 0">
                                                                                <button :aria-expanded="!collapsed"
                                                                                        :aria-label="collapsed ? t('Comments_ExpandReplies') : t('Comments_CollapseReplies')"
                                                                                        @click.stop="collapsed = !collapsed"
                                                                                        class="p-0.5 rounded wb-text-faint hover:wb-text-muted transition-colors"
                                                                                        type="button">
                                                                                    <ion-icon :class="{ '-rotate-90': collapsed }"
                                                                                              aria-hidden="true"
                                                                                              class="text-sm transition-transform block"
                                                                                              name="chevron-down"></ion-icon>
                                                                                </button>
                                                                            </template>
                                                                        </div>
                                                                    </div>
                                                                </article>

                                                                <!-- Level 2 replies -->
                                                                <template
                                                                        x-if="reply.replies && reply.replies.length > 0">
                                                                    <ul
                                                                            class="mt-2 ml-3 border-l-2 reply-border pl-3 space-y-2 list-none"
                                                                            x-show="!collapsed"
                                                                            x-transition>
                                                                        <template :key="subreply.id"
                                                                                  x-for="subreply in reply.replies">
                                                                            <li>
                                                                                <article
                                                                                        class="reply-bg p-3 rounded-lg">
                                                                                    <div class="wb-text-secondary text-sm leading-relaxed mb-2 wb-md"
                                                                                         x-html="renderMarkdown(subreply.content)">
                                                                                    </div>
                                                                                    <div
                                                                                            class="flex justify-between items-center text-xs wb-text-faint">
                                                                        <span class="font-medium wb-text-muted">
                                                                            <span class="sr-only"
                                                                                  x-text="t('Comments_By') + ' '"></span>
                                                                            <span x-text="'@' + subreply.author"></span>
                                                                        </span>
                                                                                        <div class="flex items-center gap-3">
                                                                            <span
                                                                                    :aria-label="t('Comments_Score', formatScore(subreply.score))"
                                                                                    class="wb-text-faint"
                                                                                    x-show="subreply.score != null && subreply.score !== 0">
                                                                                <span aria-hidden="true"
                                                                                      x-text="'&#9650; ' + formatScore(subreply.score)"></span>
                                                                            </span>
                                                                                            <span
                                                                                                    x-text="formatDate(subreply.createdAt)">
                                                                            </span>
                                                                                        </div>
                                                                                    </div>
                                                                                </article>
                                                                                <template
                                                                                        x-if="subreply.replies && subreply.replies.length > 0">
                                                                                    <a :href="subreply.url"
                                                                                       class="block mt-1 ml-3 text-xs wb-text-faint hover:wb-text-muted transition-colors"
                                                                                       rel="noopener noreferrer"
                                                                                       target="_blank">
                                                                                        <ion-icon aria-hidden="true"
                                                                                                  class="rotate-180"
                                                                                                  name="arrow-redo-sharp"></ion-icon>
                                                                                        <span x-text="countAllReplies(subreply) === 1 ? t('Comments_MoreReplyInThread', countAllReplies(subreply)) : t('Comments_MoreRepliesInThread', countAllReplies(subreply))"></span>
                                                                                    </a>
                                                                                </template>
                                                                            </li>
                                                                        </template>
                                                                    </ul>
                                                                </template>
                                                            </li>
                                                        </template>
                                                    </ul>
                                                </template>
                                            </article>
                                        </li>
                                    </template>
                                </ul>
                            </li>
                        </template>
                    </ul>

                    <!-- Per-filter empty state (thoughts exist but filter hides all) -->
                    <template x-if="(data?.allThoughts || []).length > 0 && activeThoughts.length === 0">
                        <div class="py-12 text-center">
                            <p class="wb-text-faint" x-text="t('Dashboard_NoCommentsMatchFilter')"></p>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Error state -->
        <template x-if="data?.status === 'Error'">
            <div class="text-center py-20 px-6">
                <ion-icon aria-hidden="true" class="text-4xl wb-error-text mb-3" name="warning-outline"></ion-icon>
                <p class="wb-error-text text-lg mb-2" x-text="t('Dashboard_ErrorOccurred')"></p>
                <p class="text-xs wb-text-faint" x-text="t('Dashboard_ErrorDetail')"></p>
            </div>
        </template>

        <!-- Idle state -->
        <template x-if="data?.status === 'Idle'">
            <div class="text-center py-20 px-6">
                <ion-icon aria-hidden="true" class="text-4xl wb-text-faint mb-3" name="tv-outline"></ion-icon>
                <p class="wb-text-muted text-lg mb-2" x-text="t('Dashboard_NothingPlaying')"></p>
                <p class="text-xs wb-text-faint" x-text="t('Dashboard_NothingPlayingDetail')"></p>
            </div>
        </template>

    </main><!-- /main content -->

    <!-- Floating setup checklist -->
    <div :aria-label="t('Checklist_Title')" :class="{ 'checklist-complete': checklistAutoComplete }"
         class="checklist-float wb-surface wb-border border rounded-xl shadow-lg overflow-hidden" role="status"
         x-cloak
         x-show="showChecklist"
         x-transition:enter="checklist-in" x-transition:leave="checklist-out">
        <div class="flex items-center justify-between px-4 pt-3 pb-2">
            <span class="text-xs font-semibold wb-text-secondary"
                  x-text="checklistAutoComplete ? t('Checklist_AllDone') : t('Checklist_Title')"></span>
            <button :aria-label="t('Common_Close')" @click="dismissChecklist()"
                    class="wb-text-faint hover:wb-text-secondary cursor-pointer p-1 -mr-1">
                <ion-icon aria-hidden="true" name="close-sharp"></ion-icon>
            </button>
        </div>
        <ul class="px-3 pb-3 space-y-0.5">
            <li @click="openConfigForItem('watchState')" class="checklist-item">
            <span :class="hasWatchProvider ? 'wb-success-text' : 'wb-text-faint'" class="text-sm"
                  x-text="hasWatchProvider ? '&#10003;' : '&#10007;'">
            </span>
                <span :class="hasWatchProvider ? 'wb-text-secondary' : 'wb-text-faint'" class="text-xs"
                      x-text="t('Checklist_WatchProvider')">
            </span>
            </li>
            <li @click="openConfigForItem('thought')" class="checklist-item">
            <span :class="hasCommentSource ? 'wb-success-text' : 'wb-text-faint'" class="text-sm"
                  x-text="hasCommentSource ? '&#10003;' : '&#10007;'">
            </span>
                <span :class="hasCommentSource ? 'wb-text-secondary' : 'wb-text-faint'" class="text-xs"
                      x-text="t('Checklist_CommentSource')">
            </span>
            </li>
            <li @click="if (hasWatchProvider || hasCommentSource) void sync()" class="checklist-item">
            <span :class="hasCompletedSync ? 'wb-success-text' : 'wb-text-faint'" class="text-sm"
                  x-text="hasCompletedSync ? '&#10003;' : '&#10007;'">
            </span>
                <span :class="hasCompletedSync ? 'wb-text-secondary' : 'wb-text-faint'" class="text-xs"
                      x-text="t('Checklist_FirstSync')">
            </span>
            </li>
        </ul>
    </div>

    <!-- Image lightbox overlay -->
    <div :aria-label="t('Aria_ImageViewer')" @click="lightboxImg = null" @keydown.escape.window="lightboxImg = null"
         aria-modal="true" class="fixed inset-0 z-50 flex items-center justify-center p-4 cursor-pointer" role="dialog"
         style="background-color: rgba(0,0,0,0.85);"
         x-cloak
         x-show="lightboxImg" x-transition.opacity.duration.200ms>
        <img :alt="t('Aria_EnlargedImage')" :src="lightboxImg" @click.stop
             class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl cursor-default"
             src="">
    </div>
</div>

<script defer src="/js/app.js"></script>
<script src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js" type="module"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
