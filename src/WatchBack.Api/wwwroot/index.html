<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchBack</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/app.bundle.css">
    <script src="/js/reconnecting-eventsource.min.js"></script>
</head>

<!-- suppress HtmlUnknownTag, JSUnresolvedVariable, JSUnresolvedFunction, JSUnusedLocalSymbols, JSIgnoredPromiseFromCall, JSCommaOperator, JSUnreachableCode, SpellCheckingInspection, HtmlFormInputWithoutLabel, RequiredAttributes -->
<body class="antialiased font-sans p-4" x-data="app()">

<!-- Loading state (full-screen, shown during initial load) -->
<div x-show="!initialized && authState === 'checking'" class="wb-overlay"
     style="background-color:var(--wb-bg,#1a1a2e);z-index:100;">
    <div class="wb-spinner" role="status"></div>
</div>

<!-- SSE sync progress bar -->
<div x-show="showSyncBar && syncProgress && syncProgress.total > 0" x-cloak
     x-transition:enter="transition-opacity duration-150"
     x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
     x-transition:leave="transition-opacity duration-300"
     x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
     class="fixed top-0 left-0 right-0 z-[150]" style="height:5px"
     :style="configData?.preferences?.segmentedProgressBar ? 'height:5px' : 'height:5px;background:color-mix(in srgb, var(--wb-accent) 20%, transparent)'"
     role="progressbar" aria-valuemin="0" :aria-label="t('Aria_SyncProgress')"
     :aria-valuenow="syncProgress?.completed" :aria-valuemax="syncProgress?.total"
     aria-live="polite" aria-atomic="true">
    <!-- Plain bar (default) -->
    <template x-if="!configData?.preferences?.segmentedProgressBar">
        <div class="wb-segment wb-segments-glow h-full"
             :style="`width:${syncProgress && syncProgress.total > 0 ? Math.round(syncProgress.completed / syncProgress.total * 100) : 0}%;background:var(--wb-accent);filter:drop-shadow(0 3px 10px var(--wb-accent))`">
        </div>
    </template>
    <!-- Segmented bar: one colored slice per provider, sqrt-weighted so small providers stay visible -->
    <template x-if="configData?.preferences?.segmentedProgressBar && syncSegments.length > 0">
        <div class="h-full flex wb-segments-glow"
             :style="`filter: drop-shadow(0 3px 10px ${syncSegments[syncSegments.length - 1].color})`">
            <template x-for="seg in syncSegments" :key="seg.name">
                <div class="wb-segment h-full flex-none"
                     :style="`width:${seg.total > 0 ? (seg.completed / Math.sqrt(seg.total)) / syncSegments.reduce((s, t) => s + Math.sqrt(t.total), 0) * 100 : 0}%;background:${seg.color}`">
                </div>
            </template>
        </div>
    </template>
</div>

<!-- Login -->
<div x-show="authState === 'login'" x-cloak
     class="fixed inset-0 z-[200] flex items-center justify-center p-4"
     style="background-color: var(--wb-bg);">
    <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
        <div class="flex items-center justify-center gap-3 mb-8">
            <img src="/watchback.png" alt="WatchBack Logo" class="w-10 h-10 object-contain wb-logo">
            <h1 class="text-2xl font-bold wb-accent-text">WatchBack</h1>
        </div>
        <form @submit.prevent="void login()">
            <div class="space-y-4">
                <div>
                    <label for="login-username" class="text-xs font-medium wb-text-muted block mb-1" x-text="t('Auth_Username')"></label>
                    <input id="login-username" type="text" x-model="loginUsername"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           autocomplete="username" :placeholder="needsOnboarding ? 'watchback' : ''">
                </div>
                <div>
                    <label for="login-password" class="text-xs font-medium wb-text-muted block mb-1" x-text="t('Auth_Password')"></label>
                    <input id="login-password" type="password" x-model="loginPassword"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           autocomplete="current-password">
                </div>
                <div x-show="loginError" class="text-xs text-center py-1" style="color:var(--wb-error-text)"
                     x-text="loginError"></div>
                <button type="submit" :disabled="loginLoading"
                        class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer
                               wb-btn disabled:opacity-50
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                        style="background-color:var(--wb-accent);"
                        x-text="loginLoading ? t('Auth_SigningIn') : t('Auth_SignIn')"></button>
            </div>
        </form>
        <div x-show="needsOnboarding" class="mt-6 space-y-4">
            <!-- Theme picker -->
            <div>
                <label class="text-xs font-medium wb-text-faint block mb-1" x-text="t('Auth_Theme')"></label>
                <div class="wb-select-wrap">
                    <select x-model="theme" @change="applyTheme(theme); localStorage.setItem('wb_theme', theme)"
                            :aria-label="t('Auth_Theme')"
                            class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-1.5 text-xs border">
                        <template x-for="t in themes" :key="t.id">
                            <option :value="t.id" x-text="t.label"></option>
                        </template>
                    </select>
                </div>
            </div>
            <!-- Docker log hint -->
            <div class="text-xs wb-text-faint space-y-1.5">
                <p x-text="t('Auth_InitialCredentials')"></p>
                <code class="block wb-surface-alt wb-border border rounded px-2.5 py-2 wb-text-muted font-mono text-[11px] select-all">docker
                    logs &lt;container-name&gt;</code>
            </div>
        </div>
    </div>
</div>

<!-- Onboarding -->
<div x-show="authState === 'onboarding'" x-cloak
     class="fixed inset-0 z-[200] flex items-center justify-center p-4"
     style="background-color: var(--wb-bg);">
    <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
        <div class="flex items-center justify-center gap-3 mb-4">
            <img src="/watchback.png" alt="WatchBack Logo" class="w-8 h-8 object-contain wb-logo">
            <h1 class="text-xl font-bold wb-accent-text" x-text="t('Setup_Title')"></h1>
        </div>
        <p class="text-xs wb-text-muted text-center mb-6" x-text="t('Setup_Subtitle')"></p>
        <form @submit.prevent="void setupAccount()">
            <div class="space-y-4">
                <div>
                    <label for="setup-username" class="text-xs font-medium wb-text-muted block mb-1" x-text="t('Setup_NewUsername')"></label>
                    <input id="setup-username" type="text" x-model="setupUsername"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           autocomplete="username" :placeholder="t('Setup_ChooseUsername')">
                </div>
                <div>
                    <label for="setup-password" class="text-xs font-medium wb-text-muted block mb-1" x-text="t('Setup_NewPassword')"></label>
                    <input id="setup-password" type="password" x-model="setupPassword"
                           @input="evaluatePasswordStrength(setupPassword)"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           autocomplete="new-password" :placeholder="t('Setup_ChoosePassword')">
                    <!-- Password strength meter -->
                    <div x-show="passwordStrength" x-cloak class="mt-2">
                        <div class="h-1.5 rounded-full overflow-hidden" style="background-color:var(--wb-border)">
                            <div class="h-full rounded-full transition-all duration-300"
                                 :style="`width:${passwordStrength?.width};background-color:${passwordStrength?.color}`"></div>
                        </div>
                        <div class="flex justify-between items-start mt-1">
                            <span class="text-[11px] font-medium" :style="`color:${passwordStrength?.color}`"
                                  x-text="passwordStrength?.label"></span>
                        </div>
                        <p x-show="passwordStrength?.warning" class="text-[11px] wb-text-muted mt-0.5"
                           x-text="passwordStrength?.warning"></p>
                        <p x-show="passwordStrength?.suggestions?.length" class="text-[11px] wb-text-faint mt-0.5"
                           x-text="passwordStrength?.suggestions?.[0]"></p>
                    </div>
                </div>
                <div x-show="setupError" class="text-xs text-center py-1" style="color:var(--wb-error-text)"
                     x-text="setupError"></div>
                <button type="submit" :disabled="setupLoading"
                        class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer
                               wb-btn disabled:opacity-50
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                        style="background-color:var(--wb-accent);"
                        x-text="setupLoading ? t('Common_Saving') : t('Setup_Complete')"></button>
            </div>
        </form>
    </div>
</div>

<!-- Password change (hash upgrade) -->
<div x-show="authState === 'changePassword'" x-cloak
     class="fixed inset-0 z-[200] flex items-center justify-center p-4"
     style="background-color: var(--wb-bg);">
    <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
        <div class="flex items-center justify-center gap-3 mb-4">
            <img src="/watchback.png" alt="WatchBack Logo" class="w-8 h-8 object-contain wb-logo">
            <h1 class="text-xl font-bold wb-accent-text" x-text="t('PasswordUpdate_Title')"></h1>
        </div>
        <p class="text-xs wb-text-muted text-center mb-6" x-text="t('PasswordUpdate_Message')"></p>
        <form @submit.prevent="void changePassword()">
            <div class="space-y-4">
                <div>
                    <label for="chpw-new" class="text-xs font-medium wb-text-muted block mb-1" x-text="t('Setup_NewPassword')"></label>
                    <input id="chpw-new" type="password" x-model="changePwNew"
                           @input="evaluatePasswordStrength(changePwNew)"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           autocomplete="new-password" :placeholder="t('Setup_ChoosePassword')">
                    <!-- Password strength meter -->
                    <div x-show="passwordStrength" x-cloak class="mt-2">
                        <div class="h-1.5 rounded-full overflow-hidden" style="background-color:var(--wb-border)">
                            <div class="h-full rounded-full transition-all duration-300"
                                 :style="`width:${passwordStrength?.width};background-color:${passwordStrength?.color}`"></div>
                        </div>
                        <div class="flex justify-between items-start mt-1">
                            <span class="text-[11px] font-medium" :style="`color:${passwordStrength?.color}`"
                                  x-text="passwordStrength?.label"></span>
                        </div>
                        <p x-show="passwordStrength?.warning" class="text-[11px] wb-text-muted mt-0.5"
                           x-text="passwordStrength?.warning"></p>
                        <p x-show="passwordStrength?.suggestions?.length" class="text-[11px] wb-text-faint mt-0.5"
                           x-text="passwordStrength?.suggestions?.[0]"></p>
                    </div>
                </div>
                <div>
                    <label for="chpw-confirm" class="text-xs font-medium wb-text-muted block mb-1" x-text="t('PasswordUpdate_ConfirmPassword')"></label>
                    <input id="chpw-confirm" type="password" x-model="changePwConfirm"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           autocomplete="new-password" :placeholder="t('PasswordUpdate_ReEnter')">
                </div>
                <div x-show="changePwError" class="text-xs text-center py-1" style="color:var(--wb-error-text)"
                     x-text="changePwError"></div>
                <button type="submit" :disabled="changePwLoading"
                        class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer
                               wb-btn disabled:opacity-50
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                        style="background-color:var(--wb-accent);"
                        x-text="changePwLoading ? t('Common_Saving') : t('PasswordUpdate_Update')"></button>
            </div>
        </form>
    </div>
</div>

<!-- Main app -->
<div x-show="initialized" x-cloak class="wb-app mx-auto overflow-x-hidden pb-8">

    <header class="flex justify-between items-center mb-6 mt-2">
        <div class="flex items-center gap-3">
            <img src="/watchback.png" alt="WatchBack Logo" class="w-10 h-10 object-contain wb-logo">
            <h1 class="text-2xl font-bold wb-accent-text hide-on-mobile">WatchBack</h1>
        </div>
        <div class="flex gap-2">
            <button x-show="currentUser && currentUser.authMethod !== 'forwardAuth'" x-cloak
                    @click="void logout()"
                    class="px-3 py-2 rounded-lg text-lg leading-none cursor-pointer wb-btn wb-surface-alt
                           wb-text-muted wb-border border
                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                    :title="t('Auth_SignOut')">
                <ion-icon name="log-out-sharp" aria-hidden="true"></ion-icon>
            </button>
            <button @click="showConfig = !showConfig"
                    :class="showConfig ? 'wb-surface-alt wb-text' : 'wb-surface-alt wb-text-muted'"
                    class="px-3 py-2 rounded-lg text-lg leading-none cursor-pointer wb-btn wb-border border
                           hover:scale-[1.01] active:scale-95 transition-all"
                    :title="t('Nav_Configuration')">
                <ion-icon name="settings-sharp" aria-hidden="true"></ion-icon>
            </button>
            <button @click="void sync()"
                    class="wb-on-accent px-4 py-2 rounded-lg font-medium flex items-center justify-center
                           gap-2 min-w-[7rem] cursor-pointer wb-btn wb-border border
                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                    style="background-color: var(--wb-accent);" :disabled="showSyncBar">
                    <span x-show="!showSyncBar" class="flex items-center gap-2">
                        <ion-icon name="sync-sharp" aria-hidden="true"></ion-icon> <span x-text="t('Nav_Sync')"></span>
                    </span>
                <span x-show="showSyncBar" x-cloak
                      class="inline-block w-5 h-5 border-2 border-transparent border-t-current rounded-full animate-spin"
                      aria-hidden="true"></span>
                <span x-show="showSyncBar" class="sr-only" x-text="t('Dashboard_Syncing')"></span>
            </button>
        </div>
    </header>

    <!-- Error banner -->
    <div x-show="error" x-cloak x-transition:enter="config-enter" x-transition:leave="config-leave"
         class="mb-4 p-3 rounded-lg text-sm flex items-center justify-between"
         style="background: var(--wb-error-bg); color: var(--wb-error-text); border: 1px solid var(--wb-error-border);"
         role="alert">
        <span x-text="error"></span>
        <button @click="error = null; clearTimeout(errorTimer)"
                class="ml-2 shrink-0 cursor-pointer opacity-70 hover:opacity-100
                       flex items-center justify-center
                       hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                style="min-width:2.75rem;min-height:2.75rem"
                :aria-label="t('Common_Dismiss')">
            <ion-icon name="close-sharp" aria-hidden="true"></ion-icon>
        </button>
    </div>

    <!-- Config panel -->
    <aside x-show="showConfig" x-cloak role="region" :aria-label="t('Nav_Configuration')" @keydown.escape="showConfig = false"
         x-transition:enter="config-enter" x-transition:leave="config-leave"
         class="wb-surface wb-border rounded-xl mb-6 overflow-hidden border">
        <div class="p-4">
            <!-- ─── Tab navigation ─── -->
            <div class="flex items-center mb-5 border-b wb-border">
            <nav role="tablist" :aria-label="t('Aria_ConfigSections')" class="flex gap-0">
                <button type="button" role="tab"
                        :aria-selected="configTab === 'settings'"
                        @click="configTab = 'settings'; closeLogStream()"
                        class="px-4 py-2 text-sm font-medium cursor-pointer border-b-2 -mb-px transition-colors"
                        :class="configTab === 'settings'
                            ? 'wb-text-secondary border-current' : 'wb-text-faint border-transparent hover:wb-text-muted'"
                        style="border-color: configTab === 'settings' ? 'var(--wb-accent)' : undefined"
                        :style="configTab === 'settings' ? 'border-color:var(--wb-accent)' : 'border-color:transparent'"
                        x-text="t('Nav_Settings')">
                </button>
                <button type="button" role="tab"
                        :aria-selected="configTab === 'diagnostics'"
                        @click="switchConfigTab('diagnostics')"
                        class="px-4 py-2 text-sm font-medium cursor-pointer border-b-2 -mb-px transition-colors"
                        :class="configTab === 'diagnostics'
                            ? 'wb-text-secondary' : 'wb-text-faint hover:wb-text-muted'"
                        :style="configTab === 'diagnostics' ? 'border-color:var(--wb-accent)' : 'border-color:transparent'"
                        x-text="t('Nav_Diagnostics')">
                </button>
            </nav>
                <button type="button"
                        @click="showConfig = false"
                        :aria-label="t('Aria_CloseConfigPanel')"
                        class="ml-auto -mb-px px-4 py-2 flex items-center justify-center cursor-pointer
                               text-md font-medium transition-all duration-300 ease-out
                               transform-gpu
                               hover:wb-surface-alt hover:scale-110
                               active:scale-95">
                    <ion-icon name="close-sharp" class="block pointer-events-none" aria-hidden="true"></ion-icon>
                </button>
            </div>

            <!-- ─── Settings tab ─── -->
            <div role="tabpanel" :aria-label="t('Nav_Settings')" x-show="configTab === 'settings'">

                <!-- ═══════════════════ Integrations ═══════════════════ -->
                <h2 class="text-sm font-semibold wb-text-secondary mb-3" x-text="t('Config_Integrations')"></h2>

                <div class="space-y-3">
                    <template x-for="[key, integration] in Object.entries(configData?.integrations || {})" :key="key">
                        <div class="integration-card rounded-xl overflow-hidden"
                             :style="'--card-accent: ' + integration.brandColor">
                            <!-- Card header: logo + service name + collapse toggle -->
                            <button type="button"
                                    @click="toggleSection(key)"
                                    :aria-expanded="!collapsedSections[key]"
                                    class="w-full flex items-center justify-between gap-2 p-4 cursor-pointer text-left"
                                    :class="collapsedSections[key] ? '' : 'pb-3'">
                                <span class="flex items-center gap-2">
                                    <span class="integration-logo"
                                          :style="'color: ' + integration.brandColor"
                                          x-html="sanitizeSvg(integration.logoSvg)"></span>
                                    <span class="text-sm font-semibold wb-text-secondary"
                                          x-text="integration.name"></span>
                                </span>
                                <ion-icon
                                        :name="collapsedSections[key] ? 'chevron-forward-sharp' : 'chevron-down-sharp'"
                                        class="wb-text-faint shrink-0" aria-hidden="true"></ion-icon>
                            </button>
                            <!-- Collapsible body: fields + test button -->
                            <div x-show="!collapsedSections[key]"
                                 x-transition:enter="transition ease-out duration-150"
                                 x-transition:enter-start="opacity-0"
                                 x-transition:enter-end="opacity-100"
                                 x-transition:leave="transition ease-in duration-100"
                                 x-transition:leave-start="opacity-100"
                                 x-transition:leave-end="opacity-0"
                                 class="px-4 pb-4 space-y-3">
                                <template x-for="field in integration.fields" :key="field.key">
                                    <div x-data="{ showSecret: false }">
                                        <div class="flex justify-between mb-1">
                                            <label :for="'field-' + field.key"
                                                   class="text-xs font-medium wb-text-muted"
                                                   x-text="field.label"></label>
                                            <span class="flex items-center gap-2">
                                                <span x-show="field.type === 'password' && field.hasValue && !configEdits[field.key]"
                                                      class="text-xs wb-text-faint" x-text="t('Config_Set')"></span>
                                                <button x-show="field.isOverridden" type="button"
                                                        @click="void resetConfigKeys([field.key])"
                                                        :title="field.envValue ? t('Config_ResetTo', field.envValue) : t('Config_ClearOverride')"
                                                        class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer leading-none">↺</button>
                                            </span>
                                        </div>
                                        <!--suppress HtmlFormInputWithoutLabel -->
                                        <div class="relative">
                                            <input :id="'field-' + field.key"
                                                   :type="field.type"
                                                   :placeholder="field.type === 'password' && field.hasValue ? t('Config_Unchanged') : field.placeholder"
                                                   x-model="configEdits[field.key]"
                                                   x-ref="inp"
                                                   autocomplete="off"
                                                   :class="field.type === 'password' ? 'pr-9' : ''"
                                                   class="w-full wb-surface wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                                            <button x-show="field.type === 'password'"
                                                    type="button"
                                                    @click="showSecret = !showSecret; $refs.inp.type = showSecret ? 'text' : 'password'; if (showSecret && !configEdits[field.key] && field.hasValue) fetch('/api/config/reveal/' + field.key, {method:'POST'}).then(r => r.ok ? r.json() : null).then(d => { if (d?.value) configEdits[field.key] = d.value; })"
                                                    :aria-label="showSecret ? t('Aria_HideValue') : t('Aria_ShowValue')"
                                                    :aria-pressed="showSecret"
                                                    class="wb-eye-btn">
                                                <ion-icon :name="showSecret ? 'eye-off-sharp' : 'eye-sharp'"
                                                          aria-hidden="true"></ion-icon>
                                            </button>
                                        </div>
                                    </div>
                                </template>
                                <!-- Test button -->
                                <button @click="void testService(key)"
                                        :disabled="testResults[key]?.status === 'testing' || (!integration.configured && !integration.fields.some(f => configEdits[f.key]))"
                                        aria-live="polite"
                                        class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface
                                               wb-text-muted cursor-pointer disabled:opacity-50 wb-btn
                                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                        :class="testResults[key]?.status === 'ok' ? 'test-ok' : testResults[key]?.status === 'error' ? 'test-error' : ''"
                                        x-text="testResults[key]?.status === 'testing' ? t('Common_Testing') : testResults[key]?.message || t('Config_TestConnection')">
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Save + feature summary -->
                <div class="wb-border border-t mt-8 pt-5 space-y-3">
                    <button @click="void saveAllConfig()"
                            :disabled="saveAllStatus === 'saving'"
                            aria-live="polite"
                            class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                   cursor-pointer disabled:opacity-50 wb-btn
                                   hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                            :class="saveAllStatus === 'saved' ? 'test-ok' : saveAllStatus === 'error' ? 'test-error' : 'wb-text-muted'"
                            x-text="saveAllStatus === 'saving' ? t('Common_Saving') : saveAllStatus === 'saved' ? t('Common_Saved') : saveAllStatus === 'error' ? t('Common_Error') : t('Common_Save')">
                    </button>

                                        <template x-if="integration.configured">

                                            </span>
                                        </template>
                                        <template x-if="!integration.configured">
                                            <span class="wb-text-faint" x-text="t('Config_NotConfigured', integration.name)">
                                            </span>
                                        </template>
                                    </span>
                                </li>
                            </template>
                            <li class="flex items-start gap-2">
                                <span :class="testIcon('reddit').cls" class="mt-0.5"
                                      :aria-label="'Reddit: ' + testIcon('reddit').label" role="img"
                                      x-text="testIcon('reddit').icon"></span>
                                <span x-text="t('Config_CommentsFrom', 'Reddit')"></span>
                            </li>
                            <li class="pt-1">
                                <button @click="void testAll()"
                                        :disabled="testAllStatus === 'testing'"
                                        aria-live="polite"
                                        class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                               wb-text-muted cursor-pointer disabled:opacity-50 wb-btn
                                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                        :class="testAllStatus === 'ok' ? 'test-ok' : testAllStatus === 'error' ? 'test-error' : testAllStatus === 'warn' ? 'test-warn' : ''"
                                        x-text="testAllStatus === 'testing' ? t('Common_Testing') : testAllStatus === 'ok' ? t('Config_AllConnected') : testAllStatus === 'error' ? t('Config_AllFailed') : testAllStatus === 'warn' ? t('Config_SomeFailed') : t('Config_TestAll')">
                                </button>
                            </li>
                        </ul>
                    </template>
                </div>

                <!-- ═══════════════════ Preferences ═══════════════════ -->
                <div class="wb-border border-t mt-5 pt-5">

                            :aria-expanded="!collapsedSections.preferences"
                            class="w-full flex items-center justify-between gap-2 mb-3 cursor-pointer">
                        <h2 class="text-sm font-semibold wb-text-secondary" x-text="t('Preferences_Title')"></h2>
                        <ion-icon :name="collapsedSections.preferences ? 'chevron-forward-sharp' : 'chevron-down-sharp'"
                                  class="wb-text-faint shrink-0" aria-hidden="true"></ion-icon>
                    </button>

                    <div x-show="!collapsedSections.preferences"
                         x-transition:enter="transition ease-out duration-150"
                         x-transition:enter-start="opacity-0"
                         x-transition:enter-end="opacity-100"
                         x-transition:leave="transition ease-in duration-100"
                         x-transition:leave-start="opacity-100"
                         x-transition:leave-end="opacity-0"
                         class="space-y-4">
                        <div>
                            <label class="text-xs font-medium wb-text-muted block mb-1" x-text="t('Auth_Theme')"></label>
                            <div class="wb-select-wrap">
                                <select x-model="theme"
                                        @change="applyTheme(theme); localStorage.setItem('wb_theme', theme)"
                                        :aria-label="t('Auth_Theme')"
                                        class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                    <template x-for="t in themes" :key="t.id">
                                        <option :value="t.id" x-text="t.label"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <template x-if="supportedLocales.length > 1">
                            <div>
                                <label class="text-xs font-medium wb-text-muted block mb-1" x-text="t('Preferences_Language')"></label>
                                <div class="wb-select-wrap">
                                    <select x-model="locale"
                                            :aria-label="t('Preferences_Language')"
                                            class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                        <template x-for="loc in supportedLocales" :key="loc">
                                            <option :value="loc" x-text="(window._allStrings[loc] || {})['Locale_NativeName'] || loc.toUpperCase()"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <template x-if="(configData?.preferences?.watchProviders || []).length > 0">
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="text-xs font-medium wb-text-muted" x-text="t('Preferences_WatchProvider')"></label>
                                    <button x-show="configData?.preferences?.overrides?.['WatchBack__WatchProvider']"
                                            type="button"
                                            @click="void resetConfigKeys(['WatchBack__WatchProvider'])"
                                            :title="configData?.preferences?.envValues?.['WatchBack__WatchProvider'] ? t('Config_ResetTo', configData.preferences.envValues['WatchBack__WatchProvider']) : t('Config_ClearOverride')"
                                            class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer leading-none">
                                        ↺
                                    </button>
                                </div>
                                <div class="wb-select-wrap">
                                    <select x-model="prefEdits.watchProvider" :aria-label="t('Preferences_WatchProvider')"
                                            class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                        <template x-for="wp in configData.preferences.watchProviders" :key="wp.value">
                                            <option :value="wp.value" x-text="wp.label"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <div>
                            <div class="flex justify-between mb-1">
                                <label for="time-machine-days" class="text-xs font-medium wb-text-muted" x-text="t('Preferences_TimeMachineWindow')"></label>
                                <button x-show="configData?.preferences?.overrides?.['WatchBack__TimeMachineDays']"
                                        type="button"
                                        @click="void resetConfigKeys(['WatchBack__TimeMachineDays'])"
                                        :title="configData?.preferences?.envValues?.['WatchBack__TimeMachineDays'] ? t('Config_ResetTo', configData.preferences.envValues['WatchBack__TimeMachineDays']) : t('Config_ClearOverride')"
                                        class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer leading-none">↺
                                </button>
                            </div>
                            <input type="number" min="1" max="365" id="time-machine-days"
                                   x-model.number="prefEdits.timeMachineDays"
                                   class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                        </div>

                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-xs font-medium wb-text-muted" x-text="t('Preferences_RedditSearchEngine')"></label>
                                <button x-show="configData?.preferences?.overrides?.['WatchBack__SearchEngine']"
                                        type="button"
                                        @click="void resetConfigKeys(['WatchBack__SearchEngine', 'WatchBack__CustomSearchUrl'])"
                                        :title="configData?.preferences?.envValues?.['WatchBack__SearchEngine'] ? t('Config_ResetTo', configData.preferences.envValues['WatchBack__SearchEngine']) : t('Config_ClearOverride')"
                                        class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer leading-none">↺
                                </button>
                            </div>
                            <div class="wb-select-wrap">
                                <select x-model="prefEdits.searchEngine" :aria-label="t('Preferences_RedditSearchEngine')"
                                        class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                    <option value="google">Google</option>
                                    <option value="duckduckgo">DuckDuckGo</option>
                                    <option value="bing">Bing</option>
                                    <option value="custom" x-text="t('Preferences_CustomOption')"></option>
                                </select>
                            </div>
                            <div x-show="prefEdits.searchEngine === 'custom'" class="mt-2">
                                <input type="url" id="custom-search-url" placeholder="https://example.com/search?q="
                                       x-model="prefEdits.customSearchUrl"
                                       class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border"
                                       :aria-label="t('Preferences_CustomSearchUrlHelp')">
                                <p class="text-xs wb-text-faint mt-1" x-text="t('Preferences_CustomSearchUrlHelp')"></p>
                            </div>
                        </div>

                        <!-- Segmented progress bar toggle -->
                        <div class="flex items-center justify-between py-1">
                            <label for="segmented-bar-toggle" class="text-xs font-medium wb-text-muted cursor-pointer" x-text="t('Preferences_SegmentedProgressBar')"></label>
                            <label class="switch-container">
                                <input id="segmented-bar-toggle" type="checkbox" class="switch-input"
                                       :aria-label="t('Preferences_SegmentedProgressBar')"

                                       @change="prefEdits.segmentedProgressBar = $event.target.checked">
                                <span class="switch-slider"></span>
                            </label>
                        </div>

                                <input id="always-show-search-toggle" type="checkbox" class="switch-input"
