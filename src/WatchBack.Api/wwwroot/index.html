                                       @change="toggleAlwaysShowSearch()">
                                <span class="switch-slider"></span>
                            </label>
                        </div>

                        <button @click="void savePreferences()"
                                :disabled="prefSaveStatus === 'saving'"
                                aria-live="polite"
                                class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                       cursor-pointer disabled:opacity-50 wb-btn
                                       hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                :class="prefSaveStatus === 'saved' ? 'test-ok' : prefSaveStatus === 'error' ? 'test-error' : 'wb-text-muted'"
                                x-text="prefSaveStatus === 'saving' ? t('Common_Saving') : prefSaveStatus === 'saved' ? t('Common_Saved') : prefSaveStatus === 'error' ? t('Common_Error') : t('Preferences_SavePreferences')">
                        </button>
                    </div>
                </div>

                <!-- ═══════════════════ Danger zone ═══════════════════ -->
                <div class="mt-5 rounded-xl overflow-hidden" style="border:1px solid var(--wb-error-border)">
                    <button type="button" @click="toggleSection('dangerZone')"
                            :aria-expanded="!collapsedSections.dangerZone"
                            class="w-full flex items-center justify-between gap-2 px-4 py-2.5 cursor-pointer"
                            style="background:var(--wb-error-bg)"
                            :style="collapsedSections.dangerZone ? '' : 'border-bottom:1px solid var(--wb-error-border)'">
                        <h2 class="text-xs font-semibold" style="color:var(--wb-error-text)" x-text="t('DangerZone_Title')"></h2>
                        <ion-icon :name="collapsedSections.dangerZone ? 'chevron-forward-sharp' : 'chevron-down-sharp'"
                                  style="color:var(--wb-error-text)" class="shrink-0" aria-hidden="true"></ion-icon>
                    </button>
                    <div x-show="!collapsedSections.dangerZone"
                         x-transition:enter="transition ease-out duration-150"
                         x-transition:enter-start="opacity-0"
                         x-transition:enter-end="opacity-100"
                         x-transition:leave="transition ease-in duration-100"
                         x-transition:leave-start="opacity-100"
                         x-transition:leave-end="opacity-0"
                         class="p-3 grid grid-cols-2 gap-3">

                        <!-- Reset password card (hidden for forward auth users) -->
                        <template x-if="currentUser?.authMethod !== 'forwardAuth'">
                            <div class="rounded-lg p-3 flex flex-col gap-3 wb-border border">
                                <div>
                                    <p class="text-xs font-semibold wb-text-secondary" x-text="t('DangerZone_ResetPasswordTitle')"></p>
                                    <p class="text-xs wb-text-faint mt-1 leading-relaxed" x-text="t('DangerZone_ResetPasswordHelp')"></p>
                                </div>
                                <button @click="void resetPassword()"
                                        :disabled="resetPasswordStatus === 'loading'"
                                        aria-live="polite"
                                        class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer
                                               disabled:opacity-50 wb-btn
                                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                        style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                        :class="resetPasswordStatus === 'ok' ? 'test-ok' : resetPasswordStatus === 'error' ? 'test-error' : ''"
                                        x-text="resetPasswordStatus === 'loading' ? t('Common_Resetting') : resetPasswordStatus === 'ok' ? t('DangerZone_ResetPasswordDone') : resetPasswordStatus === 'error' ? t('Common_Error') : t('DangerZone_ResetPassword')">
                                </button>
                            </div>
                        </template>

                        <!-- Clear cache card -->
                        <div class="rounded-lg p-3 flex flex-col gap-3 wb-border border">
                            <div>
                                <p class="text-xs font-semibold wb-text-secondary" x-text="t('DangerZone_ClearCacheTitle')"></p>
                                <p class="text-xs wb-text-faint mt-1 leading-relaxed" x-text="t('DangerZone_ClearCacheHelp')"></p>
                            </div>
                            <button @click="void clearCache()"
                                    :disabled="clearCacheStatus === 'loading'"
                                    aria-live="polite"
                                    class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer
                                           disabled:opacity-50 wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                    :class="clearCacheStatus === 'ok' ? 'test-ok' : clearCacheStatus === 'error' ? 'test-error' : ''"
                                    x-text="clearCacheStatus === 'loading' ? t('Common_Clearing') : clearCacheStatus === 'ok' ? t('Common_Cleared') : clearCacheStatus === 'error' ? t('Common_Error') : t('DangerZone_ClearCache')">
                            </button>
                        </div>

                        <!-- Restart card -->
                        <div class="rounded-lg p-3 flex flex-col gap-3 wb-border border">
                            <div>
                                <p class="text-xs font-semibold wb-text-secondary" x-text="t('DangerZone_Restart')"></p>
                                <p class="text-xs wb-text-faint mt-1 leading-relaxed" x-text="t('DangerZone_RestartHelp')"></p>
                            </div>
                            <button @click="void restart()"
                                    aria-live="polite"
                                    class="mt-auto w-full py-2 rounded-lg text-xs
                                           font-medium cursor-pointer wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                    x-text="t('DangerZone_Restart')">
                            </button>
                        </div>

                        <!-- Forward auth card -->
                        <div class="rounded-lg p-3 flex flex-col gap-3 wb-border border">
                            <div>
                                <p class="text-xs font-semibold wb-text-secondary" x-text="t('DangerZone_ForwardAuth')"></p>
                                <p class="text-xs wb-text-faint mt-1 leading-relaxed" x-text="t('DangerZone_ForwardAuthHelp')"></p>
                            </div>
                            <label class="switch-container">
                                <input id="forward-auth-toggle" type="checkbox" class="switch-input"
                                       :aria-label="t('DangerZone_EnableForwardAuth')"
                                       :checked="forwardAuthEnabled"
                                       @change="forwardAuthEnabled = $event.target.checked">
                                <span class="switch-slider"></span>
                            </label>
                            <template x-if="forwardAuthEnabled">
                                <div class="space-y-2">
                                    <div>
                                        <label for="forward-auth-header"
                                               class="text-xs font-medium wb-text-muted block mb-1" x-text="t('DangerZone_HeaderName')"></label>
                                        <input id="forward-auth-header" type="text" x-model="forwardAuthHeaderEdit"
                                               placeholder="X-Remote-User"
                                               class="w-full wb-surface wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                    </div>
                                    <div class="rounded-lg px-3 py-2 text-xs leading-relaxed"
                                         style="background:var(--wb-error-bg);color:var(--wb-error-text);border:1px solid var(--wb-error-border)">
                                        <span x-text="t('DangerZone_ForwardAuthWarning')"></span>
                                    </div>
                                </div>
                            </template>
                            <button @click="void saveForwardAuth()"
                                    :disabled="forwardAuthSaveStatus === 'saving'"
                                    aria-live="polite"
                                    class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer
                                           disabled:opacity-50 wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                    :class="forwardAuthSaveStatus === 'saved' ? 'test-ok' : forwardAuthSaveStatus === 'error' ? 'test-error' : ''"
                                    x-text="forwardAuthSaveStatus === 'saving' ? t('Common_Saving') : forwardAuthSaveStatus === 'saved' ? t('Common_Saved') : forwardAuthSaveStatus === 'error' ? t('Common_Error') : t('Common_Save')">
                            </button>
                        </div>

                    </div>
                </div>

            </div><!-- /settings tab -->

            <!-- ─── Diagnostics tab ─── -->
            <div role="tabpanel" :aria-label="t('Nav_Diagnostics')" x-show="configTab === 'diagnostics'">

                <!-- Last sync status -->
                <div class="mb-5">
                    <h2 class="text-sm font-semibold wb-text-secondary mb-3" x-text="t('Diagnostics_LastSync')"></h2>
                    <template x-if="syncHistory">
                        <div class="wb-surface rounded-xl p-3 wb-border border space-y-2">
                            <div class="flex items-center justify-between">
                                <span class="text-xs wb-text-muted"
                                      x-text="formatRelativeTime(syncHistory.timestamp)"></span>
                                <!-- Decorative dot (aria-hidden) + accessible status text -->
                                <span class="flex items-center gap-1.5 text-xs wb-text-secondary font-medium">
                                        <span class="inline-block w-1.5 h-1.5 rounded-full shrink-0" aria-hidden="true"
                                              :style="syncHistory.status === 'Watching' ? 'background:var(--wb-success-text)' : syncHistory.status === 'Error' ? 'background:var(--wb-error-text)' : 'background:var(--wb-text-faint)'"></span>
                                        <span x-text="syncHistory.status"></span>
                                    </span>
                            </div>
                            <p x-show="syncHistory.title" class="text-sm wb-text-secondary font-medium"
                               x-text="syncHistory.title"></p>
                            <template x-if="(syncHistory.sources || []).length > 0">
                                <div class="space-y-1 pt-1">
                                    <template x-for="src in syncHistory.sources" :key="src.source">
                                        <div class="flex items-center justify-between text-xs">
                                            <span class="wb-text-muted" x-text="src.source"></span>
                                            <span class="wb-text-muted" x-text="t('Diagnostics_Found', src.thoughtCount)"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="!syncHistory">
                        <p class="text-xs wb-text-muted" x-text="t('Diagnostics_NoSyncData')"></p>
                    </template>
                </div>

                <!-- App version -->
                <p x-show="appVersion" class="text-xs wb-text-muted mb-5">
                    <span x-text="t('Diagnostics_Version')"></span> <span x-text="appVersion" class="font-mono"></span>
                </p>

                <!-- Log viewer -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-sm font-semibold wb-text-secondary" x-text="t('Diagnostics_ApplicationLogs')"></h2>
                        <div class="flex items-center gap-3">
                            <div class="wb-select-wrap">
                                <select x-model="logLevel" :aria-label="t('Aria_MinimumLogLevel')"
                                        class="wb-select wb-surface-alt wb-border wb-text-secondary rounded-lg px-2 py-1 text-xs border">
                                    <option value="All" x-text="t('Diagnostics_All')"></option>
                                    <option value="Debug" x-text="t('Diagnostics_DebugPlus')"></option>
                                    <option value="Information" x-text="t('Diagnostics_InfoPlus')"></option>
                                    <option value="Warning" x-text="t('Diagnostics_WarningPlus')"></option>
                                    <option value="Error" x-text="t('Diagnostics_ErrorPlus')"></option>
                                </select>
                            </div>
                            <button type="button" @click="void copyLogs()"
                                    aria-live="polite"
                                    class="px-3 py-1.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                           wb-text-muted cursor-pointer wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    x-text="copyLogsStatus === 'copied' ? t('Common_Copied') : copyLogsStatus === 'error' ? t('Common_Error') : t('Common_Copy')">
                            </button>
                            <button type="button" @click="void clearLogs()"
                                    class="px-3 py-1.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                           wb-text-muted cursor-pointer wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    x-text="t('Common_Clear')">
                            </button>
                        </div>
                    </div>

                    <div id="log-container"
                         class="wb-surface wb-border border rounded-xl font-mono overflow-y-auto"
                         style="height:20rem;font-size:11px;line-height:1.5;">
                        <template x-if="filteredLogs.length === 0">
                            <p class="p-3 wb-text-muted text-xs" x-text="t('Diagnostics_NoLogs')"></p>
                        </template>
                        <template x-for="(entry, i) in filteredLogs" :key="i">
                            <div class="px-3 py-1 flex gap-2 items-start"
                                 :class="i < filteredLogs.length - 1 ? 'border-b wb-border' : ''">
                                <span class="wb-text-muted shrink-0 tabular-nums"
                                      x-text="formatLogTime(entry.timestamp)"></span>
                                <span class="shrink-0 font-bold w-8 text-center" :class="logLevelClass(entry.level)"
                                      x-text="logLevelAbbr(entry.level)"></span>
                                <div class="flex-1 min-w-0 break-words">
                                    <span class="wb-text-muted">[<span x-text="entry.category"></span>]</span>
                                    <span class="wb-text-secondary" x-text="' ' + entry.message"></span>
                                    <div x-show="entry.exceptionText"
                                         class="wb-text-muted mt-0.5 break-words"
                                         x-text="entry.exceptionText"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

            </div><!-- /diagnostics tab -->

        </div>
    </aside>

    <!-- ════════════════ Manual media search ════════════════ -->
    <div x-show="showSearchBox" class="mb-6" role="search" :aria-label="t('Dashboard_MediaSearch')">

        <!-- Manual override active indicator -->
        <template x-if="data?.watchProvider === 'Manual'">
            <div class="mb-3 px-3 py-2.5 rounded-xl wb-surface wb-border border text-xs space-y-2">
                <div class="flex items-center justify-between gap-3">
                        <span class="wb-text-muted leading-snug">
                            <span x-text="t('Dashboard_ManualOverride')"></span> <strong class="wb-text-secondary" x-text="data.title"></strong>
                        </span>
                    <button type="button" @click="clearManualWatchState()"
                            class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium
                                   wb-surface-alt wb-border border wb-text-muted hover:wb-error-text cursor-pointer
                                   wb-btn transition-colors
                                   hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                            :title="t('Dashboard_ClearManualState')">
                        <ion-icon name="close-circle-outline" class="text-base" aria-hidden="true"></ion-icon>
                        <span x-text="t('Common_Clear')"></span>
                    </button>
                </div>
                <template x-if="data?.suppressedProvider && data?.suppressedTitle">
                    <p class="wb-text-faint leading-snug">
                        <ion-icon name="radio-outline" class="align-middle" aria-hidden="true"></ion-icon>
                        <span x-text="t('Dashboard_ProviderPlaying', data.suppressedProvider, data.suppressedTitle)"></span>
                    </p>
                </template>
            </div>
        </template>

        <!-- Search input -->
        <form @submit.prevent="searchMedia()" class="flex gap-2">
            <input type="search" x-model="searchQuery" :placeholder="t('Dashboard_SearchPlaceholder')"
                   autocomplete="off" autocorrect="off" spellcheck="false"
                   class="flex-1 wb-surface wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border focus:outline-none"
                   :aria-label="t('Dashboard_SearchMoviesTVShows')">
            <button type="submit" :disabled="searchLoading || !searchQuery.trim()"
                    class="px-4 py-2 rounded-lg text-sm font-medium wb-surface wb-border border wb-text-secondary
                           cursor-pointer disabled:opacity-40 wb-btn flex items-center gap-1.5
                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu">
                <ion-icon :name="searchLoading ? 'hourglass-outline' : 'search-sharp'" aria-hidden="true"></ion-icon>
                <span class="hide-on-mobile" x-text="searchLoading ? t('Dashboard_Searching') : t('Dashboard_Search')"></span>
            </button>
        </form>

        <!-- Search error -->
        <p x-show="searchError" x-text="searchError" class="text-xs wb-error-text mt-2 px-1"></p>

        <!-- Search results -->
        <template x-if="searchResults.length > 0 && !searchDrilldown">
            <div class="mt-3 space-y-2">
                <template x-for="result in searchResults" :key="result.imdbId">
                    <button type="button" @click="selectSearchResult(result)"
                            class="w-full flex gap-3 items-start p-3 rounded-lg wb-surface wb-border border text-left cursor-pointer hover:wb-surface-alt wb-btn transition-colors">
                        <img x-show="result.posterUrl" :src="result.posterUrl" :alt="result.title + ' poster'"
                             class="w-12 h-16 object-cover rounded shrink-0 bg-gray-800" loading="lazy">
                        <div x-show="!result.posterUrl"
                             class="w-12 h-16 rounded shrink-0 flex items-center justify-center wb-surface-alt wb-border border">
                            <ion-icon name="film-outline" class="wb-text-faint" aria-hidden="true"></ion-icon>
                        </div>
                        <div class="min-w-0">
                            <p class="text-sm font-semibold wb-text-secondary leading-snug" x-text="result.title"></p>
                            <p class="text-xs wb-text-muted mt-0.5">
                                <span x-text="result.year"></span>
                                <span class="mx-1">·</span>
                                <span class="capitalize" x-text="result.type"></span>
                            </p>
                            <p x-show="result.type === 'series'" class="text-xs wb-text-faint mt-1" x-text="t('Dashboard_BrowseSeasons')"></p>
                        </div>
                    </button>
                </template>
            </div>
        </template>

        <!-- Series drill-down: seasons -->
        <template x-if="searchDrilldown && !drilldownSeason">
            <div class="mt-3">
                <div class="flex items-center gap-2 mb-3">
                    <button type="button"
                            @click="searchDrilldown = null; drilldownSeason = null; drilldownEpisodes = []"
                            class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer wb-btn" x-text="t('Dashboard_Back')">
                    </button>
                    <p class="text-sm font-semibold wb-text-secondary" x-text="searchDrilldown.title"></p>
                </div>
                <p class="text-xs wb-text-muted mb-2" x-show="!drilldownLoading" x-text="t('Dashboard_SelectSeason')"></p>
                <p class="text-xs wb-text-faint" x-show="drilldownLoading" x-text="t('Dashboard_LoadingSeasons')"></p>
                <div class="flex flex-wrap gap-2">
                    <template x-for="season in searchDrilldown.seasons" :key="season.seasonNumber">
                        <button type="button" @click="selectSeason(season)"
                                class="px-4 py-2 rounded-lg text-sm wb-surface wb-border border wb-text-secondary cursor-pointer hover:wb-surface-alt wb-btn transition-colors">
                            <span x-text="t('Dashboard_Season')"></span> <span x-text="season.seasonNumber"></span>
                        </button>
                    </template>
                </div>
            </div>
        </template>

        <!-- Series drill-down: episodes -->
        <template x-if="searchDrilldown && drilldownSeason">
            <div class="mt-3">
                <div class="flex items-center gap-2 mb-3">
                    <button type="button" @click="drilldownSeason = null; drilldownEpisodes = []"
                            class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer wb-btn" x-text="t('Dashboard_SeasonsBack')">
                    </button>
                    <p class="text-sm font-semibold wb-text-secondary"
                       x-text="t('Dashboard_SeasonTitle', searchDrilldown.title, drilldownSeason.seasonNumber)"></p>
                </div>
                <p class="text-xs wb-text-faint" x-show="drilldownLoading" x-text="t('Dashboard_LoadingEpisodes')"></p>
                <div class="space-y-1" x-show="!drilldownLoading">
                    <template x-for="ep in drilldownEpisodes" :key="ep.episodeNumber">
                        <button type="button" @click="selectEpisode(ep)"
                                class="w-full flex items-center gap-3 px-3 py-2 rounded-lg wb-surface wb-border border text-left cursor-pointer hover:wb-surface-alt wb-btn transition-colors">
                                <span class="text-xs wb-text-faint shrink-0 w-8 text-right"
                                      x-text="'E' + String(ep.episodeNumber).padStart(2, '0')"></span>
                            <span class="text-sm wb-text-secondary truncate" x-text="ep.title"></span>
                            <span x-show="ep.airDate" class="text-xs wb-text-faint shrink-0 ml-auto"
                                  x-text="formatDate(ep.airDate)"></span>
                        </button>
                    </template>
                </div>
            </div>
        </template>

    </div>

    <!-- Main content: always present so the page always has a main landmark -->
    <main>

    <!-- Success state: show comments -->

    <template x-if="data?.status === 'Watching'">
        <div>
            <div class="wb-surface p-4 rounded-xl mb-6 shadow-md wb-border border comment-card">
                <h2 class="text-xl font-bold mb-1"
                    x-text="data?.metadata?.episodeTitle ? data.title + ' - ' + data.metadata.episodeTitle : data?.title"></h2>
                <p class="text-sm wb-text-muted"><span x-text="t('Dashboard_Aired')"></span> <span
                        x-text="formatDate(data?.metadata?.releaseDate)"></span>
                </p>
                <template x-if="(data?.ratings || []).length > 0">
                    <div class="flex gap-2 flex-wrap mt-3">
                        <template x-for="r in data.ratings" :key="r.source">
                                <span class="inline-flex items-center gap-2 text-sm font-medium px-3 py-1.5 rounded-lg wb-surface-alt border wb-text-muted"
                                      :style="r.brandColor ? `border-color: ${r.brandColor}60` : 'border-color: var(--wb-border)'">
                                    <template x-if="r.logoSvg">
                                        <span class="inline-flex items-center w-5 h-5 shrink-0"
                                              :style="`color: ${r.brandColor}; fill: ${r.brandColor}`"
                                              x-html="r.logoSvg"></span>
                                    </template>
                                    <span x-text="`${r.source}: ${r.value}`"></span>
                                </span>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Mode toggle & source filters (only when there are thoughts) -->
            <template x-if="(data?.allThoughts || []).length > 0">
                <div class="flex gap-2 mb-6 wb-surface p-1 rounded-lg wb-border border comment-card"
                     style="animation-delay:0.05s">
                    <button x-show="showTimeMachine" @click="mode = 'time'"
                            :aria-pressed="mode === 'time'"
                            :class="mode === 'time' ? 'wb-on-accent shadow' : 'wb-text-muted'"
                            :style="mode === 'time' ? 'background-color: var(--wb-accent)' : ''"
                            class="flex gap-1.5 items-center justify-center flex-1 py-2 rounded-md text-sm font-medium cursor-pointer wb-btn">
                        <span class="flex hide-on-mobile" x-text="t('Dashboard_TimeMachine')"></span>
                        <ion-icon class="show-on-mobile" name="hourglass-sharp" aria-hidden="true"></ion-icon>
                        <span x-text="'(' + timeMachineCount + ')'" class="text-xs font-normal"></span>
                    </button>
                    <button @click="mode = 'all'" :aria-pressed="mode === 'all'"
                            :class="mode === 'all' ? 'wb-on-accent shadow' : 'wb-text-muted'"
                            :style="mode === 'all' ? 'background-color: var(--wb-accent)' : ''"
                            class="flex gap-1.5 items-center justify-center flex-1 py-2 rounded-md text-sm font-medium cursor-pointer wb-btn">
                        <span class="flex hide-on-mobile" x-text="t('Dashboard_AllComments')"></span>
                        <ion-icon class="show-on-mobile" name="chatbubbles-sharp" aria-hidden="true"></ion-icon>
                        <span x-text="'(' + allThoughtsCount + ')'" class="text-xs font-normal"></span>
                    </button>
                </div>
            </template>

            <!-- Reddit search — always visible when watching an episode -->
            <div x-show="data?.metadata?.seasonNumber != null" class="mb-4 comment-card" style="animation-delay:0.05s">
                <a :href="redditSearchUrl(data.title, data.metadata.seasonNumber, data.metadata.episodeNumber)"
                   target="_blank" rel="noopener noreferrer"
                   class="w-full py-2 rounded-md text-sm font-medium text-center reddit-link cursor-pointer wb-btn flex items-center justify-center gap-1.5">
                    <ion-icon
                            name="logo-reddit" aria-hidden="true"></ion-icon>
                    Reddit
                    <ion-icon name="search-sharp"
                              aria-hidden="true"></ion-icon>
                </a>
            </div>

            <!-- No discussions found -->
            <template x-if="(data?.allThoughts || []).length === 0">
                <div class="py-16 text-center comment-card" style="animation-delay:0.1s">
                    <p class="wb-text-muted text-base mb-2" x-text="t('Dashboard_NoDiscussions')"></p>
                    <p class="text-xs wb-text-faint" x-text="t('Dashboard_NoDiscussionsDetail')"></p>
                </div>
            </template>

            <!-- Source filter pills (only when thoughts exist) -->
            <div x-show="availableSources.length > 1" class="flex gap-2 mb-4 justify-center comment-card"
                 style="animation-delay:0.1s">
                <template x-for="src in availableSources" :key="src">
                    <button x-show="sourceCount(src) > 0" @click="toggleSource(src)"
                            :aria-pressed="sourceActive(src)"
                            :aria-label="src + ' (' + sourceCount(src) + ' comments)'"
                            :class="sourceActive(src) ? 'filter-' + src.toLowerCase() : 'filter-inactive'"
                            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold uppercase
                                   wb-border border cursor-pointer wb-btn
                                   hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu">
                        <span x-text="src"></span>
                        <span x-text="sourceCount(src)"
                              class="text-xs font-semibold opacity-70 tabular-nums"></span>
                    </button>
                </template>
            </div>

            <!-- Thread grouping toggle -->
            <div x-show="hasThreadGroups" class="flex justify-center mb-4">
                <button @click="handleThreadToggle()"
                        :aria-pressed="groupByThread"
                        :class="groupByThread ? 'filter-reddit' : 'filter-inactive'"
                        class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold uppercase
                               wb-border border cursor-pointer wb-btn
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu">
                    <span x-text="groupByThread ? '📁 ' + t('Dashboard_GroupedByThread') : '📁 ' + t('Dashboard_GroupByThread')"></span>
                    <span x-text="threadCount"
                          class="text-xs font-semibold opacity-70 tabular-nums"></span>
                </button>
            </div>

            <!-- Comments list -->
            <div class="pb-8">
                <ul class="list-none" :class="groupByThread ? 'space-y-6' : 'space-y-4'"
                    :aria-label="t('Aria_Comments')">
                    <template x-for="(group, gi) in renderGroups" :key="gi">
                        <li :class="groupByThread && group.title ? 'thread-group' : ''"
                            :style="groupByThread ? 'animation-delay:' + Math.min(gi * 0.08, 0.6) + 's' : ''">
                            <template x-if="groupByThread && group.title">
                                <div>
                                    <a :href="group.url" target="_blank" rel="noopener noreferrer"
                                       class="block text-xs thread-title mb-1 truncate leading-tight font-semibold"
                                       x-text="group.title"></a>
                                    <div x-show="group.body"
                                         class="text-xs wb-text-muted leading-relaxed mb-2 wb-md"
                                         x-html="renderMarkdown(group.body || '')"></div>
                                </div>
                            </template>
                            <ul class="list-none"
                                :class="groupByThread && group.title ? 'ml-2 border-l-2 reply-border pl-3 space-y-3' : (groupByThread ? 'space-y-3' : '')">
                                <template x-for="(thought, ci) in group.thoughts" :key="thought.id">
                                    <li>
                                        <article class="wb-surface p-4 rounded-xl shadow wb-border border relative group comment-card"
                                                 :style="'animation-delay:' + Math.min((groupByThread ? ci : gi) * 0.04, 0.6) + 's'">
                                            <div class="flex items-start mb-2 gap-2">
                                                <div class="flex-1 min-w-0"
                                                     x-show="!groupByThread && thought.postTitle">
                                                    <a :href="thought.postUrl" target="_blank"
                                                       rel="noopener noreferrer"
                                                       class="text-[11px] thread-title truncate leading-tight block"
                                                       x-text="thought.postTitle"></a>
                                                </div>
                                                <div class="flex gap-1"
                                                     :class="groupByThread || !thought.postTitle ? 'ml-auto' : 'shrink-0'">
                                                    <a x-show="thought.source === 'Bluesky'" :href="thought.url"
                                                       target="_blank" rel="noopener noreferrer"
                                                       class="text-[10px] badge-bluesky px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                                       :aria-label="t('Comments_ViewOn', 'Bluesky')">
                                                        <svg xmlns="http://www.w3.org/2000/svg"
                                                             viewBox="0 0 360 320"
                                                             class="inline-block w-[1em] h-[1em] align-[-0.1em]"
                                                             aria-hidden="true" fill="currentColor">
                                                            <path
                                                                    d="M180 142c-16.3-34.8-60.2-99.7-101.5-127.8C50.8-9.5 23.8.4 12.5 7.2-6.8 18.5 5.4 56.7 22 74c22 23 45.8 32.8 79.3 33.5-31.4 5.8-62.1 22.7-79.8 41.7C6.2 166.6 0 177.5 0 188.6c0 28 39.5 58.1 72.5 48.1C133 218 163.5 159.5 180 130c16.5 29.5 47 88 107.5 106.7 33 10 72.5-20.1 72.5-48.1 0-11.1-6.2-22-21.5-39.4-17.7-19-48.4-35.9-79.8-41.7 33.5-.7 57.3-10.5 79.3-33.5 16.6-17.3 28.8-55.5 9.5-66.8C336.2.4 309.2-9.5 281.5 14.2 240.2 42.3 196.3 107.2 180 142z"/>
                                                        </svg>
                                                        <span aria-hidden="true">BlueSky</span>
                                                        <ion-icon name="open-sharp"
                                                                  aria-hidden="true"></ion-icon>
                                                    </a>
                                                    <a x-show="thought.source === 'Reddit'" :href="thought.url"
                                                       target="_blank" rel="noopener noreferrer"
                                                       class="text-[10px] badge-reddit px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                                       :aria-label="t('Comments_ViewOn', 'Reddit')">
                                                        <ion-icon name="logo-reddit"
                                                                  aria-hidden="true"></ion-icon>
                                                        <span aria-hidden="true">Reddit</span>
                                                        <ion-icon
                                                                name="open-sharp" aria-hidden="true"></ion-icon>
                                                    </a>
                                                    <span x-show="thought.source === 'Trakt'"
                                                          class="text-[10px] badge-trakt px-1.5 py-0.5 rounded font-bold uppercase">Trakt</span>
                                                </div>
                                            </div>

                                            <div class="wb-text-secondary text-sm leading-relaxed mb-3 wb-md"
                                                 x-html="renderMarkdown(thought.content)"></div>

                                            <template x-if="thought.images && thought.images.length > 0">
                                                <div class="grid gap-2 mb-3"
                                                     :class="thought.images.length > 1 ? 'grid-cols-2' : 'grid-cols-1'">
                                                    <template x-for="img in thought.images" :key="img.url">
                                                        <div @click="lightboxImg = img.url"
                                                             @keydown.enter="lightboxImg = img.url" tabindex="0"
                                                             role="button"
                                                             :aria-label="t('Comments_ClickToEnlarge', img.alt || t('Comments_ImageFromPost'))"
                                                             class="block overflow-hidden rounded-lg wb-border border cursor-pointer"
                                                             style="background-color: var(--wb-bg);">
                                                            <img src="" :src="img.url" alt=""
                                                                 :alt="img.alt || t('Comments_ImageFromPost')"
                                                                 class="w-full h-auto object-cover hover:scale-110 transition-transform duration-300"
                                                                 loading="lazy">
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                            <div class="flex justify-between items-center text-xs wb-text-faint">
                                                <span class="font-medium wb-text-muted">
                                                    <span class="sr-only" x-text="t('Comments_By') + ' '"></span>
                                                    <span x-text="'@' + thought.author"></span>
                                                </span>
                                                <div class="flex items-center gap-3">
                                                    <span x-show="thought.score != null && thought.score !== 0"
                                                          class="wb-text-faint"
                                                          :aria-label="t('Comments_Score', formatScore(thought.score))">
                                                        <span aria-hidden="true" x-text="'&#9650; ' + formatScore(thought.score)"></span>
                                                    </span>
                                                    <span x-text="formatDate(thought.createdAt)"></span>
                                                </div>
                                            </div>

                                            <!-- Level 1 replies -->
                                            <template x-if="thought.replies && thought.replies.length > 0">
                                                <ul class="mt-3 border-l-2 reply-border pl-3 space-y-3 list-none">
                                                    <template x-for="reply in thought.replies" :key="reply.id">
                                                        <li>
                                                            <article class="reply-bg p-3 rounded-lg">
                                                                <div class="wb-text-secondary text-sm leading-relaxed mb-2 wb-md"
                                                                     x-html="renderMarkdown(reply.content)"></div>
                                                                <div
                                                                        class="flex justify-between items-center text-xs wb-text-faint">
                                                                    <span class="font-medium wb-text-muted">
                                                                        <span class="sr-only" x-text="t('Comments_By') + ' '"></span>
                                                                        <span x-text="'@' + reply.author"></span>
                                                                    </span>
                                                                    <div class="flex items-center gap-3">
                                                                        <span
                                                                                x-show="reply.score != null && reply.score !== 0"
                                                                                class="wb-text-faint"
                                                                                :aria-label="t('Comments_Score', formatScore(reply.score))">
                                                                            <span aria-hidden="true" x-text="'&#9650; ' + formatScore(reply.score)"></span>
                                                                        </span>
                                                                        <span
                                                                                x-text="formatDate(reply.createdAt)"></span>
                                                                    </div>
                                                                </div>
                                                            </article>

                                                            <!-- Level 2 replies -->
                                                            <template x-if="reply.replies && reply.replies.length > 0">
                                                                <ul
                                                                        class="mt-2 ml-3 border-l-2 reply-border pl-3 space-y-2 list-none">
                                                                    <template x-for="subreply in reply.replies"
                                                                              :key="subreply.id">
                                                                        <li>
                                                                            <article class="reply-bg p-3 rounded-lg">
                                                                                <div class="wb-text-secondary text-sm leading-relaxed mb-2 wb-md"
                                                                                     x-html="renderMarkdown(subreply.content)">
                                                                                </div>
                                                                                <div
                                                                                        class="flex justify-between items-center text-xs wb-text-faint">
                                                                                    <span class="font-medium wb-text-muted">
                                                                                        <span class="sr-only" x-text="t('Comments_By') + ' '"></span>
                                                                                        <span x-text="'@' + subreply.author"></span>
                                                                                    </span>
                                                                                    <div class="flex items-center gap-3">
                                                                                        <span
                                                                                                x-show="subreply.score != null && subreply.score !== 0"
                                                                                                class="wb-text-faint"
                                                                                                :aria-label="t('Comments_Score', formatScore(subreply.score))">
                                                                                            <span aria-hidden="true" x-text="'&#9650; ' + formatScore(subreply.score)"></span>
                                                                                        </span>
                                                                                        <span
                                                                                                x-text="formatDate(subreply.createdAt)"></span>
                                                                                    </div>
                                                                                </div>
                                                                            </article>
                                                                            <template
                                                                                    x-if="subreply.replies && subreply.replies.length > 0">
                                                                                <a :href="subreply.url" target="_blank"
                                                                                   rel="noopener noreferrer"
                                                                                   class="block mt-1 ml-3 text-xs wb-text-faint hover:wb-text-muted transition-colors">
                                                                                    <ion-icon class="rotate-180" aria-hidden="true" name="arrow-redo-sharp"></ion-icon>
                                                                                    <span x-text="countAllReplies(subreply) === 1 ? t('Comments_MoreReplyInThread', countAllReplies(subreply)) : t('Comments_MoreRepliesInThread', countAllReplies(subreply))"></span>
                                                                                </a>
                                                                            </template>
                                                                        </li>
                                                                    </template>
                                                                </ul>
                                                            </template>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </template>
                                        </article>
                                    </li>
                                </template>
                            </ul>
                        </li>
                    </template>
                </ul>

                <!-- Per-filter empty state (thoughts exist but filter hides all) -->
                <template x-if="(data?.allThoughts || []).length > 0 && activeThoughts.length === 0">
                    <div class="py-12 text-center">
                        <p class="wb-text-faint" x-text="t('Dashboard_NoCommentsMatchFilter')"></p>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- Error state -->
    <template x-if="data?.status === 'Error'">
        <div class="text-center py-20 px-6">
            <p class="wb-error-text text-lg mb-2" x-text="t('Dashboard_ErrorOccurred')"></p>
            <p class="text-xs wb-text-faint" x-text="t('Dashboard_ErrorDetail')"></p>
        </div>
    </template>

    <!-- Idle state -->
    <template x-if="data?.status === 'Idle'">
        <div class="text-center py-20 px-6">
            <p class="wb-text-muted text-lg mb-2" x-text="t('Dashboard_NothingPlaying')"></p>
            <p class="text-xs wb-text-faint" x-text="t('Dashboard_NothingPlayingDetail')"></p>
        </div>
    </template>

    </main><!-- /main content -->

    <!-- Image lightbox overlay -->
    <div x-show="lightboxImg" x-transition.opacity.duration.200ms @click="lightboxImg = null"
         @keydown.escape.window="lightboxImg = null" role="dialog" :aria-label="t('Aria_ImageViewer')" aria-modal="true"
         class="fixed inset-0 z-50 flex items-center justify-center p-4 cursor-pointer"
         style="background-color: rgba(0,0,0,0.85);" x-cloak>
        <img src="" :src="lightboxImg" @click.stop :alt="t('Aria_EnlargedImage')"
