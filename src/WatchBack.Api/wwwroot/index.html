<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchBack</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tailwind.css">
    <script src="/js/reconnecting-eventsource.min.js"></script>
    <script defer src="/js/alpine.min.js"></script>
    <link rel="stylesheet" href="/css/app.css">
</head>

<!-- suppress HtmlUnknownTag, JSUnresolvedVariable, JSUnresolvedFunction, JSUnusedLocalSymbols, JSIgnoredPromiseFromCall, JSCommaOperator, JSUnreachableCode, SpellCheckingInspection, HtmlFormInputWithoutLabel, RequiredAttributes -->
<body class="antialiased font-sans p-4" x-data="app()">

    <!-- Loading state (full-screen, shown during initial load) -->
    <div x-show="!initialized && authState === 'checking'" class="wb-overlay"
        style="background-color:var(--wb-bg,#1a1a2e);z-index:100;">
        <div class="wb-spinner" role="status"></div>
    </div>

    <!-- Sync loading overlay -->
    <div x-show="isLoading" x-cloak x-transition.opacity.duration.200ms class="wb-overlay"
        style="background-color:rgba(0,0,0,0.45);z-index:50;"
        aria-live="polite" aria-label="Loading">
        <div class="wb-spinner" role="status"></div>
    </div>

    <!-- Login -->
    <div x-show="authState === 'login'" x-cloak
        class="fixed inset-0 z-[200] flex items-center justify-center p-4"
        style="background-color: var(--wb-bg);">
        <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
            <div class="flex items-center justify-center gap-3 mb-8">
                <img src="/watchback.png" alt="WatchBack Logo" class="w-10 h-10 object-contain wb-logo">
                <h1 class="text-2xl font-bold wb-accent-text">WatchBack</h1>
            </div>
            <form @submit.prevent="void login()">
                <div class="space-y-4">
                    <div>
                        <label for="login-username" class="text-xs font-medium wb-text-muted block mb-1">Username</label>
                        <input id="login-username" type="text" x-model="loginUsername"
                            class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                            autocomplete="username" :placeholder="onboardingComplete ? '' : 'watchback'">
                    </div>
                    <div>
                        <label for="login-password" class="text-xs font-medium wb-text-muted block mb-1">Password</label>
                        <input id="login-password" type="password" x-model="loginPassword"
                            class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                            autocomplete="current-password">
                    </div>
                    <div x-show="loginError" class="text-xs text-center py-1" style="color:var(--wb-error-text)" x-text="loginError"></div>
                    <button type="submit" :disabled="loginLoading"
                        class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer wb-btn disabled:opacity-50"
                        style="background-color:var(--wb-accent);"
                        x-text="loginLoading ? 'Signing in\u2026' : 'Sign In'"></button>
                </div>
            </form>
            <div x-show="!onboardingComplete" class="mt-6 space-y-4">
                <!-- Theme picker -->
                <div>
                    <label class="text-xs font-medium wb-text-faint block mb-1">Theme</label>
                    <div class="wb-select-wrap">
                        <select x-model="theme" @change="applyTheme(theme); localStorage.setItem('wb_theme', theme)"
                            aria-label="Theme"
                            class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-1.5 text-xs border">
                            <template x-for="t in themes" :key="t.id">
                                <option :value="t.id" x-text="t.label"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <!-- Docker log hint -->
                <div class="text-xs wb-text-faint space-y-1.5">
                    <p>Initial credentials are in the server logs:</p>
                    <code class="block wb-surface-alt wb-border border rounded px-2.5 py-2 wb-text-muted font-mono text-[11px] select-all">docker logs &lt;container-name&gt;</code>
                </div>
            </div>
        </div>
    </div>

    <!-- Onboarding -->
    <div x-show="authState === 'onboarding'" x-cloak
        class="fixed inset-0 z-[200] flex items-center justify-center p-4"
        style="background-color: var(--wb-bg);">
        <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
            <div class="flex items-center justify-center gap-3 mb-4">
                <img src="/watchback.png" alt="WatchBack Logo" class="w-8 h-8 object-contain wb-logo">
                <h1 class="text-xl font-bold wb-accent-text">Set Up Account</h1>
            </div>
            <p class="text-xs wb-text-muted text-center mb-6">Choose a permanent username and password to continue.</p>
            <form @submit.prevent="void setupAccount()">
                <div class="space-y-4">
                    <div>
                        <label for="setup-username" class="text-xs font-medium wb-text-muted block mb-1">New Username</label>
                        <input id="setup-username" type="text" x-model="setupUsername"
                            class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                            autocomplete="username" placeholder="Choose a username">
                    </div>
                    <div>
                        <label for="setup-password" class="text-xs font-medium wb-text-muted block mb-1">New Password</label>
                        <input id="setup-password" type="password" x-model="setupPassword"
                            class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                            autocomplete="new-password" placeholder="Choose a strong password">
                    </div>
                    <div x-show="setupError" class="text-xs text-center py-1" style="color:var(--wb-error-text)" x-text="setupError"></div>
                    <button type="submit" :disabled="setupLoading"
                        class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer wb-btn disabled:opacity-50"
                        style="background-color:var(--wb-accent);"
                        x-text="setupLoading ? 'Saving\u2026' : 'Complete Setup'"></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main app -->
    <div x-show="initialized" x-cloak class="wb-app mx-auto overflow-x-hidden pb-8">

        <header class="flex justify-between items-center mb-6 mt-2">
            <div class="flex items-center gap-3">
                <img src="/watchback.png" alt="WatchBack Logo" class="w-10 h-10 object-contain wb-logo">
                <h1 class="text-2xl font-bold wb-accent-text hide-on-mobile">WatchBack</h1>
            </div>
            <div class="flex gap-2">
                <button x-show="currentUser && currentUser.authMethod !== 'forwardAuth'" x-cloak
                    @click="void logout()"
                    class="px-3 py-2 rounded-lg text-lg leading-none cursor-pointer wb-btn wb-surface-alt wb-text-muted wb-border border"
                    title="Sign out">
                    <ion-icon name="log-out-sharp" aria-hidden="true"></ion-icon>
                </button>
                <button @click="showConfig = !showConfig"
                    :class="showConfig ? 'wb-surface-alt wb-text' : 'wb-surface-alt wb-text-muted'"
                    class="px-3 py-2 rounded-lg text-lg leading-none cursor-pointer wb-btn wb-border border"
                    title="Configuration">
                    <ion-icon name="settings-sharp" aria-hidden="true"></ion-icon>
                </button>
                <button @click="void sync()"
                    class="wb-on-accent px-4 py-2 rounded-lg font-medium flex items-center justify-center gap-2 min-w-[7rem] cursor-pointer wb-btn wb-border border"
                    style="background-color: var(--wb-accent);" :disabled="isLoading">
                    <span x-show="!isLoading" class="flex items-center gap-2">
                        <ion-icon name="sync-sharp" aria-hidden="true"></ion-icon> Sync
                    </span>
                    <span x-show="isLoading" x-cloak
                        class="inline-block w-5 h-5 border-2 border-transparent border-t-current rounded-full animate-spin"
                        aria-hidden="true"></span>
                    <span x-show="isLoading" class="sr-only">Syncing</span>
                </button>
            </div>
        </header>

        <!-- Error banner -->
        <div x-show="error" x-cloak x-transition:enter="config-enter" x-transition:leave="config-leave"
            class="mb-4 p-3 rounded-lg text-sm flex items-center justify-between"
            style="background: var(--wb-error-bg); color: var(--wb-error-text); border: 1px solid var(--wb-error-border);"
            role="alert">
            <span x-text="error"></span>
            <button @click="error = null; clearTimeout(errorTimer)"
                class="ml-2 shrink-0 cursor-pointer opacity-70 hover:opacity-100 flex items-center justify-center"
                style="min-width:2.75rem;min-height:2.75rem"
                aria-label="Dismiss">
                <ion-icon name="close-sharp" aria-hidden="true"></ion-icon>
            </button>
        </div>

        <!-- Config panel -->
        <div x-show="showConfig" x-cloak role="region" aria-label="Configuration" @keydown.escape="showConfig = false"
            x-transition:enter="config-enter" x-transition:leave="config-leave"
            class="wb-surface wb-border rounded-xl mb-6 overflow-hidden border">
            <div class="p-4">
                <!-- ═══════════════════ Integrations ═══════════════════ -->
                <h2 class="text-sm font-semibold wb-text-secondary mb-3">Integrations</h2>

                <div class="space-y-3">
                    <template x-for="[key, integration] in Object.entries(configData?.integrations || {})" :key="key">
                        <div class="integration-card rounded-xl p-4 space-y-3"
                            :style="'--card-accent: ' + integration.brandColor">
                            <!-- Card header: logo + service name -->
                            <div class="flex items-center gap-2 mb-3">
                                <span class="integration-logo"
                                    :style="'color: ' + integration.brandColor"
                                    x-html="integration.logoSvg"></span>
                                <span class="text-sm font-semibold wb-text-secondary"
                                    x-text="integration.name"></span>
                            </div>
                            <!-- Fields -->
                            <template x-for="field in integration.fields" :key="field.key">
                                <div x-data="{ showSecret: false }">
                                    <div class="flex justify-between mb-1">
                                        <label :for="'field-' + field.key"
                                            class="text-xs font-medium wb-text-muted"
                                            x-text="field.label"></label>
                                        <span x-show="field.type === 'password' && field.hasValue && !configEdits[field.key]"
                                            class="text-xs wb-text-faint">set</span>
                                    </div>
                                    <!--suppress HtmlFormInputWithoutLabel -->
                                    <div class="relative">
                                        <input :id="'field-' + field.key"
                                            :type="field.type"
                                            :placeholder="field.type === 'password' && field.hasValue ? '(unchanged)' : field.placeholder"
                                            x-model="configEdits[field.key]"
                                            x-ref="inp"
                                            autocomplete="off"
                                            :class="field.type === 'password' ? 'pr-9' : ''"
                                            class="w-full wb-surface wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm transition-colors border">
                                        <button x-show="field.type === 'password'"
                                            type="button"
                                            @click="showSecret = !showSecret; $refs.inp.type = showSecret ? 'text' : 'password'; if (showSecret && !configEdits[field.key] && field.hasValue) fetch('/api/config/reveal/' + field.key, {method:'POST'}).then(r => r.ok ? r.json() : null).then(d => { if (d?.value) configEdits[field.key] = d.value; })"
                                            :aria-label="showSecret ? 'Hide value' : 'Show value'"
                                            :aria-pressed="showSecret"
                                            class="wb-eye-btn">
                                            <ion-icon :name="showSecret ? 'eye-off-sharp' : 'eye-sharp'" aria-hidden="true"></ion-icon>
                                        </button>
                                    </div>
                                </div>
                            </template>
                            <!-- Test button -->
                            <button @click="void testService(key)"
                                :disabled="testResults[key]?.status === 'testing' || !integration.configured"
                                aria-live="polite"
                                class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface wb-text-muted cursor-pointer disabled:opacity-50 wb-btn"
                                :class="testResults[key]?.status === 'ok' ? 'test-ok' : testResults[key]?.status === 'error' ? 'test-error' : ''"
                                x-text="testResults[key]?.status === 'testing' ? 'Testing\u2026' : testResults[key]?.message || 'Test Connection'">
                            </button>
                        </div>
                    </template>
                </div>

                <!-- Save + feature summary -->
                <div class="wb-border border-t mt-8 pt-5 space-y-3">
                    <button @click="void saveAllConfig()"
                        :disabled="saveAllStatus === 'saving'"
                        aria-live="polite"
                        class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt cursor-pointer disabled:opacity-50 wb-btn"
                        :class="saveAllStatus === 'saved' ? 'test-ok' : saveAllStatus === 'error' ? 'test-error' : 'wb-text-muted'"
                        x-text="saveAllStatus === 'saving' ? 'Saving\u2026' : saveAllStatus === 'saved' ? 'Saved \u2713' : saveAllStatus === 'error' ? 'Error \u2717' : 'Save'">
                    </button>

                    <!-- Feature summary -->
                    <template x-if="configData">
                        <ul class="space-y-1.5 text-sm wb-text-muted" role="list">
                            <template
                                x-for="[key, integration] in Object.entries(configData?.integrations || {})"
                                :key="'feat-' + key">
                                <li class="flex items-start gap-2">
                                    <span :class="testIcon(key).cls" class="mt-0.5"
                                        :aria-label="integration.name + ': ' + testIcon(key).label" role="img"
                                        x-text="testIcon(key).icon"></span>
                                    <span>
                                        <template x-if="integration.configured">
                                            <span>
                                                <span x-text="key === 'jellyfin' || key === 'trakt' ? 'Watch data' : 'Posts'"></span>
                                                from <strong class="wb-text-secondary"
                                                    x-text="integration.name"></strong>
                                            </span>
                                        </template>
                                        <template x-if="!integration.configured">
                                            <span class="wb-text-faint">
                                                <strong x-text="integration.name"></strong> not configured
                                            </span>
                                        </template>
                                    </span>
                                </li>
                            </template>
                            <li class="flex items-start gap-2">
                                <span :class="testIcon('reddit').cls" class="mt-0.5"
                                    :aria-label="'Reddit: ' + testIcon('reddit').label" role="img"
                                    x-text="testIcon('reddit').icon"></span>
                                <span>Comments from <strong class="wb-text-secondary">Reddit</strong></span>
                            </li>
                            <li class="pt-1">
                                <button @click="void testAll()"
                                    :disabled="testAllStatus === 'testing'"
                                    aria-live="polite"
                                    class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt wb-text-muted cursor-pointer disabled:opacity-50 wb-btn"
                                    :class="testAllStatus === 'ok' ? 'test-ok' : testAllStatus === 'error' ? 'test-error' : testAllStatus === 'warn' ? 'test-warn' : ''"
                                    x-text="testAllStatus === 'testing' ? 'Testing\u2026' : testAllStatus === 'ok' ? 'All Connected \u2713' : testAllStatus === 'error' ? 'All Failed \u2717' : testAllStatus === 'warn' ? 'Some Failed' : 'Test All Connections'">
                                </button>
                            </li>
                        </ul>
                    </template>
                </div>

                <!-- ═══════════════════ Preferences ═══════════════════ -->
                <div class="wb-border border-t mt-5 pt-5">
                    <h2 class="text-sm font-semibold wb-text-secondary mb-3">Preferences</h2>

                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-medium wb-text-muted block mb-1">Theme</label>
                            <div class="wb-select-wrap">
                                <select x-model="theme" @change="applyTheme(theme); localStorage.setItem('wb_theme', theme)"
                                    aria-label="Theme"
                                    class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                    <template x-for="t in themes" :key="t.id">
                                        <option :value="t.id" x-text="t.label"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <template x-if="(configData?.preferences?.watchProviders || []).length > 0">
                            <div>
                                <label class="text-xs font-medium wb-text-muted block mb-1">Watch Provider</label>
                                <div class="wb-select-wrap">
                                    <select x-model="prefEdits.watchProvider" aria-label="Watch provider"
                                        class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                        <template x-for="wp in configData.preferences.watchProviders" :key="wp.value">
                                            <option :value="wp.value" x-text="wp.label"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <div>
                            <label for="time-machine-days" class="text-xs font-medium wb-text-muted block mb-1">Time Machine Window</label>
                            <input type="number" min="1" max="365" id="time-machine-days"
                                x-model.number="prefEdits.timeMachineDays"
                                class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                        </div>

                        <button @click="void savePreferences()"
                            :disabled="prefSaveStatus === 'saving'"
                            aria-live="polite"
                            class="w-full py-2.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt cursor-pointer disabled:opacity-50 wb-btn"
                            :class="prefSaveStatus === 'saved' ? 'test-ok' : prefSaveStatus === 'error' ? 'test-error' : 'wb-text-muted'"
                            x-text="prefSaveStatus === 'saving' ? 'Saving\u2026' : prefSaveStatus === 'saved' ? 'Saved \u2713' : prefSaveStatus === 'error' ? 'Error \u2717' : 'Save Preferences'">
                        </button>
                    </div>
                </div>

                <!-- ═══════════════════ Danger zone ═══════════════════ -->
                <div class="mt-5 rounded-xl overflow-hidden" style="border:1px solid var(--wb-error-border)">
                    <div class="px-4 py-2.5" style="background:var(--wb-error-bg);border-bottom:1px solid var(--wb-error-border)">
                        <h2 class="text-xs font-semibold" style="color:var(--wb-error-text)">Danger zone</h2>
                    </div>
                    <div class="p-3 flex gap-3">

                        <!-- Reset password card (hidden for forward auth users) -->
                        <template x-if="currentUser?.authMethod !== 'forwardAuth'">
                            <div class="flex-1 rounded-lg p-3 flex flex-col gap-3 wb-border border">
                                <div>
                                    <p class="text-xs font-semibold wb-text-secondary">Reset password</p>
                                    <p class="text-xs wb-text-faint mt-1 leading-relaxed">Generate a new random password and print it to the server logs.</p>
                                </div>
                                <button @click="void resetPassword()"
                                    :disabled="resetPasswordStatus === 'loading'"
                                    aria-live="polite"
                                    class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer disabled:opacity-50 wb-btn"
                                    style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                    :class="resetPasswordStatus === 'ok' ? 'test-ok' : resetPasswordStatus === 'error' ? 'test-error' : ''"
                                    x-text="resetPasswordStatus === 'loading' ? 'Resetting\u2026' : resetPasswordStatus === 'ok' ? 'Done \u2014 check logs \u2713' : resetPasswordStatus === 'error' ? 'Error \u2717' : 'Reset Password'">
                                </button>
                            </div>
                        </template>

                        <!-- Forward auth card -->
                        <div class="flex-1 rounded-lg p-3 flex flex-col gap-3 wb-border border">
                            <div>
                                <p class="text-xs font-semibold wb-text-secondary">Forward auth</p>
                                <p class="text-xs wb-text-faint mt-1 leading-relaxed">Trust a header set by your reverse proxy instead of requiring a password.</p>
                            </div>
                            <label class="switch-container">
                                <input id="forward-auth-toggle" type="checkbox" class="switch-input"
                                    :checked="forwardAuthEnabled"
                                    @change="forwardAuthEnabled = $event.target.checked">
                                <span class="switch-slider"></span>
                            </label>
                            <template x-if="forwardAuthEnabled">
                                <div class="space-y-2">
                                    <div>
                                        <label for="forward-auth-header" class="text-xs font-medium wb-text-muted block mb-1">Header name</label>
                                        <input id="forward-auth-header" type="text" x-model="forwardAuthHeaderEdit"
                                            placeholder="X-Remote-User"
                                            class="w-full wb-surface wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border">
                                    </div>
                                    <div class="rounded-lg px-3 py-2 text-xs leading-relaxed"
                                        style="background:var(--wb-error-bg);color:var(--wb-error-text);border:1px solid var(--wb-error-border)">
                                        Only safe behind a trusted reverse proxy that sets this header after authenticating the user. If the app is directly reachable from the internet, anyone can bypass auth by sending this header.
                                    </div>
                                </div>
                            </template>
                            <button @click="void saveForwardAuth()"
                                :disabled="forwardAuthSaveStatus === 'saving'"
                                aria-live="polite"
                                class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer disabled:opacity-50 wb-btn"
                                style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                :class="forwardAuthSaveStatus === 'saved' ? 'test-ok' : forwardAuthSaveStatus === 'error' ? 'test-error' : ''"
                                x-text="forwardAuthSaveStatus === 'saving' ? 'Saving\u2026' : forwardAuthSaveStatus === 'saved' ? 'Saved \u2713' : forwardAuthSaveStatus === 'error' ? 'Error \u2717' : 'Save'">
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Success state: show comments -->
        <template x-if="data?.status === 'Watching'">
            <main>
                <div class="wb-surface p-4 rounded-xl mb-6 shadow-md wb-border border comment-card">
                    <h2 class="text-xl font-bold mb-1"
                        x-text="data?.metadata?.episodeTitle ? data.title + ' - ' + data.metadata.episodeTitle : data?.title"></h2>
                    <p class="text-sm wb-text-muted">Aired: <span
                            x-text="formatDate(data?.metadata?.releaseDate)"></span>
                    </p>
                </div>

                <!-- Mode toggle & source filters (only when there are thoughts) -->
                <template x-if="(data?.allThoughts || []).length > 0">
                    <div class="flex gap-2 mb-6 wb-surface p-1 rounded-lg wb-border border comment-card"
                        style="animation-delay:0.05s">
                        <button x-show="showTimeMachine" @click="mode = 'time'"
                            :class="mode === 'time' ? 'wb-on-accent shadow' : 'wb-text-muted'"
                            :style="mode === 'time' ? 'background-color: var(--wb-accent)' : ''"
                            class="flex gap-1.5 items-center justify-center flex-1 py-2 rounded-md text-sm font-medium cursor-pointer wb-btn">
                            <span class="flex hide-on-mobile">Time Machine</span>
                            <ion-icon class="show-on-mobile" name="hourglass-sharp" aria-hidden="true"></ion-icon>
                            <span x-text="'(' + timeMachineCount + ')'" class="text-xs font-normal"></span>
                        </button>
                        <button @click="mode = 'all'" :class="mode === 'all' ? 'wb-on-accent shadow' : 'wb-text-muted'"
                            :style="mode === 'all' ? 'background-color: var(--wb-accent)' : ''"
                            class="flex gap-1.5 items-center justify-center flex-1 py-2 rounded-md text-sm font-medium cursor-pointer wb-btn">
                            <span class="flex hide-on-mobile">All Comments</span>
                            <ion-icon class="show-on-mobile" name="chatbubbles-sharp" aria-hidden="true"></ion-icon>
                            <span x-text="'(' + allThoughtsCount + ')'" class="text-xs font-normal"></span>
                        </button>
                        <a x-show="data?.metadata?.seasonNumber != null"
                            :href="'https://www.google.com/search?q=' + encodeURIComponent(data.title + ' S' + String(data.metadata.seasonNumber).padStart(2,'0') + 'E' + String(data.metadata.episodeNumber).padStart(2,'0') + ' reddit')"
                            target="_blank" rel="noopener noreferrer"
                            class="flex-1 py-2 rounded-md text-sm font-medium text-center reddit-link cursor-pointer wb-btn flex items-center justify-center gap-1.5"><ion-icon
                                name="logo-reddit" aria-hidden="true"></ion-icon> Reddit <ion-icon name="search-sharp"
                                aria-hidden="true"></ion-icon></a>
                    </div>
                </template>

                <!-- No discussions found -->
                <template x-if="(data?.allThoughts || []).length === 0">
                    <div class="py-16 text-center comment-card" style="animation-delay:0.05s">
                        <p class="wb-text-muted text-base mb-2">No discussions found.</p>
                        <p class="text-xs wb-text-faint">Nothing has been posted about this episode yet, or the sources haven't indexed it.</p>
                    </div>
                </template>

                <!-- Source filter pills (only when thoughts exist) -->
                <div x-show="availableSources.length > 1" class="flex gap-2 mb-4 justify-center comment-card"
                    style="animation-delay:0.1s">
                    <template x-for="src in availableSources" :key="src">
                        <button x-show="sourceCount(src) > 0" @click="toggleSource(src)"
                            :class="sourceActive(src) ? 'filter-' + src.toLowerCase() : 'filter-inactive'"
                            class="px-3 py-1 rounded-full text-xs font-bold uppercase wb-border border cursor-pointer wb-btn">
                            <span x-text="src"></span>
                            <span x-text="'(' + sourceCount(src) + ')'" class="font-normal"></span>
                        </button>
                    </template>
                </div>

                <!-- Thread grouping toggle -->
                <div x-show="hasThreadGroups" class="flex justify-center mb-4">
                    <button @click="handleThreadToggle()"
                        :class="groupByThread ? 'filter-reddit' : 'filter-inactive'"
                        class="px-5 py-1.5 rounded-full text-xs font-bold uppercase wb-border border cursor-pointer flex items-center gap-1.5 wb-btn">
                        <span
                            x-text="(groupByThread ? '📁 Grouped by thread' : '📁 Group by thread') + ' (' + threadCount + ')'"></span>
                    </button>
                </div>

                <!-- Comments list -->
                <div class="pb-8" :class="groupByThread ? 'space-y-6' : 'space-y-4'">
                    <template x-for="(group, gi) in renderGroups" :key="gi">
                        <div :class="groupByThread && group.title ? 'thread-group' : ''"
                            :style="groupByThread ? 'animation-delay:' + Math.min(gi * 0.08, 0.6) + 's' : ''">
                            <template x-if="groupByThread && group.title">
                                <div>
                                    <a :href="group.url" target="_blank" rel="noopener noreferrer"
                                        class="block text-xs thread-title mb-1 truncate leading-tight font-semibold"
                                        x-text="group.title"></a>
                                    <div x-show="group.body"
                                        class="text-xs wb-text-muted leading-relaxed mb-2 wb-md"
                                        x-html="renderMarkdown(group.body || '')"></div>
                                </div>
                            </template>
                            <div
                                :class="groupByThread && group.title ? 'ml-2 border-l-2 reply-border pl-3 space-y-3' : (groupByThread ? 'space-y-3' : '')">
                                <template x-for="(thought, ci) in group.thoughts" :key="thought.id">
                                    <div class="wb-surface p-4 rounded-xl shadow wb-border border relative group comment-card"
                                        :style="'animation-delay:' + Math.min((groupByThread ? ci : gi) * 0.04, 0.6) + 's'">
                                        <div class="flex items-start mb-2 gap-2">
                                            <div class="flex-1 min-w-0"
                                                x-show="!groupByThread && thought.postTitle">
                                                <a :href="thought.postUrl" target="_blank"
                                                    rel="noopener noreferrer"
                                                    class="text-[11px] thread-title truncate leading-tight block"
                                                    x-text="thought.postTitle"></a>
                                            </div>
                                            <div class="flex gap-1"
                                                :class="groupByThread || !thought.postTitle ? 'ml-auto' : 'shrink-0'">
                                                <a x-show="thought.source === 'Bluesky'" :href="thought.url"
                                                    target="_blank" rel="noopener noreferrer"
                                                    class="text-[10px] badge-bluesky px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                                    title="View original post"><svg xmlns="http://www.w3.org/2000/svg"
                                                        viewBox="0 0 360 320"
                                                        class="inline-block w-[1em] h-[1em] align-[-0.1em]"
                                                        aria-hidden="true" fill="currentColor">
                                                        <path
                                                            d="M180 142c-16.3-34.8-60.2-99.7-101.5-127.8C50.8-9.5 23.8.4 12.5 7.2-6.8 18.5 5.4 56.7 22 74c22 23 45.8 32.8 79.3 33.5-31.4 5.8-62.1 22.7-79.8 41.7C6.2 166.6 0 177.5 0 188.6c0 28 39.5 58.1 72.5 48.1C133 218 163.5 159.5 180 130c16.5 29.5 47 88 107.5 106.7 33 10 72.5-20.1 72.5-48.1 0-11.1-6.2-22-21.5-39.4-17.7-19-48.4-35.9-79.8-41.7 33.5-.7 57.3-10.5 79.3-33.5 16.6-17.3 28.8-55.5 9.5-66.8C336.2.4 309.2-9.5 281.5 14.2 240.2 42.3 196.3 107.2 180 142z" />
                                                    </svg> BlueSky <ion-icon name="open-sharp"
                                                        aria-hidden="true"></ion-icon></a>
                                                <a x-show="thought.source === 'Reddit'" :href="thought.url"
                                                    target="_blank" rel="noopener noreferrer"
                                                    class="text-[10px] badge-reddit px-1.5 py-0.5 rounded font-bold uppercase transition-colors"
                                                    title="View on Reddit"><ion-icon name="logo-reddit"
                                                        aria-hidden="true"></ion-icon> Reddit <ion-icon
                                                        name="open-sharp" aria-hidden="true"></ion-icon></a>
                                                <span x-show="thought.source === 'Trakt'"
                                                    class="text-[10px] badge-trakt px-1.5 py-0.5 rounded font-bold uppercase">Trakt</span>
                                            </div>
                                        </div>

                                        <div class="wb-text-secondary text-sm leading-relaxed mb-3 wb-md"
                                            x-html="renderMarkdown(thought.content)"></div>

                                        <template x-if="thought.images && thought.images.length > 0">
                                            <div class="grid gap-2 mb-3"
                                                :class="thought.images.length > 1 ? 'grid-cols-2' : 'grid-cols-1'">
                                                <template x-for="img in thought.images" :key="img.url">
                                                    <div @click="lightboxImg = img.url"
                                                        @keydown.enter="lightboxImg = img.url" tabindex="0"
                                                        role="button" aria-label="View full image"
                                                        class="block overflow-hidden rounded-lg wb-border border cursor-pointer"
                                                        style="background-color: var(--wb-bg);">
                                                        <img src="" :src="img.url" alt="" :alt="img.alt || 'Image from post'"
                                                            class="w-full h-auto object-cover hover:scale-110 transition-transform duration-300"
                                                            loading="lazy">
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <div class="flex justify-between items-center text-xs wb-text-faint">
                                            <span class="font-medium wb-text-muted"
                                                x-text="'@' + thought.author"></span>
                                            <div class="flex items-center gap-3">
                                                <span x-show="thought.score != null && thought.score !== 0"
                                                    class="wb-text-faint"
                                                    x-text="'&#9650; ' + formatScore(thought.score)"></span>
                                                <span x-text="formatDate(thought.createdAt)"></span>
                                            </div>
                                        </div>

                                        <!-- Level 1 replies -->
                                        <template x-if="thought.replies && thought.replies.length > 0">
                                            <div class="mt-3 border-l-2 reply-border pl-3 space-y-3">
                                                <template x-for="reply in thought.replies" :key="reply.id">
                                                    <div>
                                                        <div class="reply-bg p-3 rounded-lg">
                                                            <div class="wb-text-secondary text-sm leading-relaxed mb-2 wb-md"
                                                                x-html="renderMarkdown(reply.content)"></div>
                                                            <div
                                                                class="flex justify-between items-center text-xs wb-text-faint">
                                                                <span class="font-medium wb-text-muted"
                                                                    x-text="'@' + reply.author"></span>
                                                                <div class="flex items-center gap-3">
                                                                    <span
                                                                        x-show="reply.score != null && reply.score !== 0"
                                                                        class="wb-text-faint"
                                                                        x-text="'&#9650; ' + formatScore(reply.score)"></span>
                                                                    <span
                                                                        x-text="formatDate(reply.createdAt)"></span>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <!-- Level 2 replies -->
                                                        <template x-if="reply.replies && reply.replies.length > 0">
                                                            <div
                                                                class="mt-2 ml-3 border-l-2 reply-border pl-3 space-y-2">
                                                                <template x-for="subreply in reply.replies"
                                                                    :key="subreply.id">
                                                                    <div>
                                                                        <div class="reply-bg p-3 rounded-lg">
                                                                            <div class="wb-text-secondary text-sm leading-relaxed mb-2 wb-md"
                                                                                x-html="renderMarkdown(subreply.content)">
                                                                            </div>
                                                                            <div
                                                                                class="flex justify-between items-center text-xs wb-text-faint">
                                                                                <span class="font-medium wb-text-muted"
                                                                                    x-text="'@' + subreply.author"></span>
                                                                                <div class="flex items-center gap-3">
                                                                                    <span
                                                                                        x-show="subreply.score != null && subreply.score !== 0"
                                                                                        class="wb-text-faint"
                                                                                        x-text="'&#9650; ' + formatScore(subreply.score)"></span>
                                                                                    <span
                                                                                        x-text="formatDate(subreply.createdAt)"></span>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                        <template
                                                                            x-if="subreply.replies && subreply.replies.length > 0">
                                                                            <a :href="subreply.url" target="_blank"
                                                                                rel="noopener noreferrer"
                                                                                class="block mt-1 ml-3 text-xs wb-text-faint hover:wb-text-muted transition-colors"
                                                                                x-text="'&#8627; ' + countAllReplies(subreply) + ' more ' + (countAllReplies(subreply) === 1 ? 'reply' : 'replies') + ' in thread'"></a>
                                                                        </template>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Per-filter empty state (thoughts exist but filter hides all) -->
                    <template x-if="(data?.allThoughts || []).length > 0 && activeThoughts.length === 0">
                        <div class="py-12 text-center">
                            <p class="wb-text-faint">No comments match the current filter.</p>
                        </div>
                    </template>
                </div>
            </main>
        </template>

        <!-- Error state -->
        <template x-if="data?.status === 'Error'">
            <main class="text-center py-20 px-6">
                <p class="wb-error-text text-lg mb-2">An error occurred.</p>
                <p class="text-xs wb-text-faint">Check your configuration and try syncing again.</p>
            </main>
        </template>

        <!-- Idle state -->
        <template x-if="data?.status === 'Idle'">
            <main class="text-center py-20 px-6">
                <p class="wb-text-muted text-lg mb-2">Nothing playing.</p>
                <p class="text-xs wb-text-faint">The dashboard will update automatically when you start playback.</p>
            </main>
        </template>

        <!-- Image lightbox overlay -->
        <div x-show="lightboxImg" x-transition.opacity.duration.200ms @click="lightboxImg = null"
            @keydown.escape.window="lightboxImg = null" role="dialog" aria-label="Image viewer" aria-modal="true"
            class="fixed inset-0 z-50 flex items-center justify-center p-4 cursor-pointer"
            style="background-color: rgba(0,0,0,0.85);" x-cloak>
            <img src="" :src="lightboxImg" @click.stop alt="Enlarged image"
                class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl cursor-default">
        </div>
    </div>

    <script src="/app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
