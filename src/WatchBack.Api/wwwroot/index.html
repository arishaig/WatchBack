<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>WatchBack</title>
    <link href="/icons/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180">
    <link href="/icons/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png">
    <link href="/icons/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png">
    <link href="/favicon.ico" rel="icon" type="image/x-icon">
    <link href="/site.webmanifest" rel="manifest">
    <link href="/css/app.bundle.css" rel="stylesheet">
    <script src="/js/reconnecting-eventsource.min.js"></script>
</head>

<!-- suppress HtmlUnknownTag, JSUnresolvedVariable, JSUnresolvedFunction, JSUnusedLocalSymbols, JSIgnoredPromiseFromCall, JSCommaOperator, JSUnreachableCode, SpellCheckingInspection, HtmlFormInputWithoutLabel, RequiredAttributes -->
<body class="antialiased font-sans p-4" x-data="app()">

<!-- ─── Shared provider-fields template (cloned by x-providerfields directive) ─── -->
<template id="provider-fields">
    <div class="space-y-3">
        <template x-if="integration.fields.length === 0 && _pfMode !== 'config'">
            <p class="text-xs wb-text-faint" x-text="t('Wizard_NoConfigNeeded')"></p>
        </template>
        <template :key="_pfPrefix + field.key" x-for="field in integration.fields">
            <div x-data="{ showSecret: false }">
                <div class="flex justify-between mb-1">
                    <label :class="_pfMode === 'config' ? 'wb-text-muted' : 'wb-text-faint'"
                           :for="_pfPrefix + field.key"
                           class="text-xs font-medium"
                           x-text="field.label">
                    </label>
                    <span class="flex items-center gap-2" x-show="_pfMode === 'config'">
                        <span class="text-xs wb-text-faint"
                              x-show="field.type === 'password' && field.hasValue && !configEdits[field.key]"
                              x-text="t('Config_Set')">
                        </span>
                        <button :title="field.envValue ? t('Config_ResetTo', field.envValue) : t('Config_ClearOverride')"
                                @click="void resetConfigKeys([field.key])"
                                class="text-xs wb-text-faint hover:wb-text-muted cursor-pointer leading-none"
                                type="button"
                                x-show="field.isOverridden">
                            ↺
                        </button>
                    </span>
                </div>
                <div class="relative">
                    <input :class="[field.type === 'password' ? 'pr-9' : '', _pfMode === 'config' ? 'wb-surface transition-colors' : 'wb-surface-alt']"
                           :id="_pfPrefix + field.key"
                           :placeholder="field.type === 'password' && field.hasValue ? t('Config_Unchanged') : field.placeholder"
                           :type="field.type"
                           autocomplete="off"
                           class="w-full wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border"
                           x-model="configEdits[field.key]"
                           x-ref="inp">
                    <button :aria-label="showSecret ? t('Aria_HideValue') : t('Aria_ShowValue')"
                            :aria-pressed="_pfMode === 'config' ? showSecret : undefined"
                            @click="showSecret = !showSecret; $refs.inp.type = showSecret ? 'text' : 'password'; if (showSecret && !configEdits[field.key] && field.hasValue) fetch('/api/config/reveal/' + field.key, {method:'POST'}).then(r => r.ok ? r.json() : null).then(d => { if (d?.value) configEdits[field.key] = d.value; })"
                            class="wb-eye-btn"
                            type="button"
                            x-show="field.type === 'password'">
                        <ion-icon :name="showSecret ? 'eye-off-sharp' : 'eye-sharp'" aria-hidden="true"></ion-icon>
                    </button>
                </div>
            </div>
        </template>
        <button :class="[
                    testResults[key]?.status === 'ok' ? 'test-ok' : testResults[key]?.status === 'error' ? 'test-error' : '',
                    _pfMode === 'config' ? 'wb-text-muted py-2.5' : 'wb-text-secondary py-2'
                ]"
                :disabled="_pfTestDisabled"
                @click="void testService(key)"
                aria-live="polite"
                class="w-full rounded-lg text-xs font-medium wb-border border wb-surface
                       cursor-pointer disabled:opacity-50 wb-btn
                       hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                x-text="testResults[key]?.status === 'testing' ? t('Common_Testing') : testResults[key]?.message || t('Config_TestConnection')">
        </button>
    </div>
</template>

<!-- Loading state (full-screen, shown during initial load) -->
<div class="wb-overlay" style="background-color:var(--wb-bg,#1a1a2e);z-index:100;"
     x-show="!initialized && authState === 'checking'">
    <div class="wb-spinner" role="status">
        <span class="sr-only" x-text="t('Common_Loading')"></span>
    </div>
</div>

<!-- SSE sync progress bar -->
<div :aria-label="t('Aria_SyncProgress')" :aria-valuemax="syncProgress?.total"
     :aria-valuenow="syncProgress?.completed"
     :style="configData?.preferences?.segmentedProgressBar ? 'height:5px' : 'height:5px;background:color-mix(in srgb, var(--wb-accent) 20%, transparent)'"
     aria-atomic="true"
     aria-live="polite"
     aria-valuemin="0" class="fixed top-0 left-0 right-0 z-[150]"
     role="progressbar" style="height:5px"
     x-cloak
     x-show="showSyncBar && syncProgress && syncProgress.total > 0" x-transition:enter="transition-opacity duration-150"
     x-transition:enter-end="opacity-100"
     x-transition:enter-start="opacity-0" x-transition:leave="transition-opacity duration-300"
     x-transition:leave-end="opacity-0" x-transition:leave-start="opacity-100">
    <!-- Plain bar (default) -->
    <template x-if="!configData?.preferences?.segmentedProgressBar">
        <div :style="`width:${syncProgress && syncProgress.total > 0 ? Math.round(syncProgress.completed / syncProgress.total * 100) : 0}%;background:var(--wb-accent);filter:drop-shadow(0 3px 10px var(--wb-accent))`"
             class="wb-segment wb-segments-glow h-full">
        </div>
    </template>
    <!-- Segmented bar: one colored slice per provider, sqrt-weighted so small providers stay visible -->
    <template x-if="configData?.preferences?.segmentedProgressBar && syncSegments.length > 0">
        <div :style="`filter: drop-shadow(0 3px 10px ${syncSegments[syncSegments.length - 1].color})`"
             class="h-full flex wb-segments-glow">
            <template :key="seg.name" x-for="seg in syncSegments">
                <div :style="`width:${seg.total > 0 ? (seg.completed / Math.sqrt(seg.total)) / syncSegments.reduce((s, t) => s + Math.sqrt(t.total), 0) * 100 : 0}%;background:${seg.color}`"
                     class="wb-segment h-full flex-none">
                </div>
            </template>
        </div>
    </template>
</div>

<!-- Login -->
<div class="fixed inset-0 z-[200] flex items-center justify-center p-4" style="background-color: var(--wb-bg);"
     role="dialog" aria-modal="true" aria-labelledby="login-dialog-title"
     x-cloak
     x-effect="authState === 'login' && $nextTick(() => document.getElementById('login-username')?.focus())"
     x-show="authState === 'login'">
    <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
        <div class="flex items-center justify-center gap-3 mb-8">
            <img alt="WatchBack Logo" class="w-10 h-10 object-contain wb-logo" src="/watchback.png">
            <h1 class="text-2xl font-bold wb-accent-text" id="login-dialog-title">WatchBack</h1>
        </div>
        <form @submit.prevent="void login()">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-medium wb-text-muted block mb-1" for="login-username"
                           x-text="t('Auth_Username')"></label>
                    <input :placeholder="needsOnboarding ? 'watchback' : ''" autocomplete="username"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           id="login-username"
                           type="text" x-model="loginUsername">
                </div>
                <div>
                    <label class="text-xs font-medium wb-text-muted block mb-1" for="login-password"
                           x-text="t('Auth_Password')"></label>
                    <input autocomplete="current-password"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           id="login-password"
                           type="password"
                           x-model="loginPassword">
                </div>
                <div class="text-xs text-center py-1" style="color:var(--wb-error-text)" x-show="loginError"
                     x-text="loginError">
                </div>
                <button :disabled="loginLoading" class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer
                               wb-btn disabled:opacity-50
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                        class="wb-bg-accent"
                        type="submit"
                        x-text="loginLoading ? t('Auth_SigningIn') : t('Auth_SignIn')">
                </button>
            </div>
        </form>
        <div class="mt-6 space-y-4" x-show="needsOnboarding">
            <!-- Theme picker -->
            <div>
                <label class="text-xs font-medium wb-text-faint block mb-1" x-text="t('Auth_Theme')"></label>
                <div class="wb-select-wrap">
                    <select :aria-label="t('Auth_Theme')"
                            @change="theme = $event.target.value; applyTheme(theme); localStorage.setItem('wb_theme', theme)"
                            class="wb-select w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-1.5 text-xs border">
                        <template :key="th.id" x-for="th in themes">
                            <option :selected="theme === th.id" :value="th.id" x-text="th.label"></option>
                        </template>
                    </select>
                </div>
            </div>
            <!-- Docker log hint -->
            <div class="text-xs wb-text-faint space-y-1.5">
                <p x-text="t('Auth_InitialCredentials')"></p>
                <code class="block wb-surface-alt wb-border border rounded px-2.5 py-2 wb-text-muted font-mono text-[11px] select-all">
                    docker
                    logs &lt;container-name&gt;
                </code>
            </div>
        </div>
    </div>
</div>

<!-- Onboarding -->
<div class="fixed inset-0 z-[200] flex items-center justify-center p-4" style="background-color: var(--wb-bg);"
     role="dialog" aria-modal="true" aria-labelledby="onboarding-dialog-title"
     x-cloak
     x-effect="authState === 'onboarding' && $nextTick(() => $el.querySelector('input,button')?.focus())"
     x-show="authState === 'onboarding'">
    <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
        <div class="flex items-center justify-center gap-3 mb-4">
            <img alt="WatchBack Logo" class="w-8 h-8 object-contain wb-logo" src="/watchback.png">
            <h1 class="text-xl font-bold wb-accent-text" id="onboarding-dialog-title" x-text="t('Setup_Title')"></h1>
        </div>
        <p class="text-xs wb-text-muted text-center mb-6" x-text="t('Setup_Subtitle')"></p>
        <form @submit.prevent="void setupAccount()">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-medium wb-text-muted block mb-1" for="setup-username"
                           x-text="t('Setup_NewUsername')"></label>
                    <input :placeholder="t('Setup_ChooseUsername')" autocomplete="username"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           id="setup-username"
                           type="text" x-model="setupUsername">
                </div>
                <div>
                    <label class="text-xs font-medium wb-text-muted block mb-1" for="setup-password"
                           x-text="t('Setup_NewPassword')"></label>
                    <input :placeholder="t('Setup_ChoosePassword')" @input="evaluatePasswordStrength(setupPassword)"
                           autocomplete="new-password"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           id="setup-password"
                           type="password" x-model="setupPassword">
                    <!-- Password strength meter -->
                    <div class="mt-2" x-cloak x-show="passwordStrength">
                        <div class="h-1.5 rounded-full overflow-hidden" style="background-color:var(--wb-border)">
                            <div :style="`width:${passwordStrength?.width};background-color:${passwordStrength?.color}`"
                                 class="h-full rounded-full transition-all duration-300">
                            </div>
                        </div>
                        <div class="flex justify-between items-start mt-1">
                            <span :style="`color:${passwordStrength?.color}`" class="text-[11px] font-medium"
                                  x-text="passwordStrength?.label">
                            </span>
                        </div>
                        <p class="text-[11px] wb-text-muted mt-0.5" x-show="passwordStrength?.warning"
                           x-text="passwordStrength?.warning">
                        </p>
                        <p class="text-[11px] wb-text-faint mt-0.5" x-show="passwordStrength?.suggestions?.length"
                           x-text="passwordStrength?.suggestions?.[0]">
                        </p>
                    </div>
                </div>
                <div class="text-xs text-center py-1" style="color:var(--wb-error-text)" x-show="setupError"
                     x-text="setupError">
                </div>
                <button :disabled="setupLoading" class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer
                               wb-btn disabled:opacity-50
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                        class="wb-bg-accent"
                        type="submit"
                        x-text="setupLoading ? t('Common_Saving') : t('Setup_Complete')">
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Password change (hash upgrade) -->
<div class="fixed inset-0 z-[200] flex items-center justify-center p-4" style="background-color: var(--wb-bg);"
     role="dialog" aria-modal="true" aria-labelledby="changepw-dialog-title"
     x-cloak
     x-effect="authState === 'changePassword' && $nextTick(() => $el.querySelector('input,button')?.focus())"
     x-show="authState === 'changePassword'">
    <div class="wb-surface wb-border border rounded-xl p-8 w-full shadow-2xl" style="max-width:24rem">
        <div class="flex items-center justify-center gap-3 mb-4">
            <img alt="WatchBack Logo" class="w-8 h-8 object-contain wb-logo" src="/watchback.png">
            <h1 class="text-xl font-bold wb-accent-text" id="changepw-dialog-title" x-text="t('PasswordUpdate_Title')"></h1>
        </div>
        <p class="text-xs wb-text-muted text-center mb-6" x-text="t('PasswordUpdate_Message')"></p>
        <form @submit.prevent="void changePassword()">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-medium wb-text-muted block mb-1" for="chpw-current"
                           x-text="t('PasswordUpdate_CurrentPassword')"></label>
                    <input :placeholder="t('PasswordUpdate_CurrentPassword')" autocomplete="current-password"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           id="chpw-current"
                           type="password" x-model="changePwCurrent">
                </div>
                <div>
                    <label class="text-xs font-medium wb-text-muted block mb-1" for="chpw-new"
                           x-text="t('Setup_NewPassword')"></label>
                    <input :placeholder="t('Setup_ChoosePassword')" @input="evaluatePasswordStrength(changePwNew)"
                           autocomplete="new-password"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           id="chpw-new"
                           type="password" x-model="changePwNew">
                    <!-- Password strength meter -->
                    <div class="mt-2" x-cloak x-show="passwordStrength">
                        <div class="h-1.5 rounded-full overflow-hidden" style="background-color:var(--wb-border)">
                            <div :style="`width:${passwordStrength?.width};background-color:${passwordStrength?.color}`"
                                 class="h-full rounded-full transition-all duration-300">
                            </div>
                        </div>
                        <div class="flex justify-between items-start mt-1">
                            <span :style="`color:${passwordStrength?.color}`" class="text-[11px] font-medium"
                                  x-text="passwordStrength?.label">
                            </span>
                        </div>
                        <p class="text-[11px] wb-text-muted mt-0.5" x-show="passwordStrength?.warning"
                           x-text="passwordStrength?.warning">
                        </p>
                        <p class="text-[11px] wb-text-faint mt-0.5" x-show="passwordStrength?.suggestions?.length"
                           x-text="passwordStrength?.suggestions?.[0]">
                        </p>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-medium wb-text-muted block mb-1" for="chpw-confirm"
                           x-text="t('PasswordUpdate_ConfirmPassword')"></label>
                    <input :placeholder="t('PasswordUpdate_ReEnter')" autocomplete="new-password"
                           class="w-full wb-surface-alt wb-border wb-text-secondary rounded-lg px-3 py-2.5 text-sm border"
                           id="chpw-confirm"
                           type="password" x-model="changePwConfirm">
                </div>
                <div class="text-xs text-center py-1" style="color:var(--wb-error-text)" x-show="changePwError"
                     x-text="changePwError">
                </div>
                <button :disabled="changePwLoading" class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent cursor-pointer
                               wb-btn disabled:opacity-50
                               hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                        class="wb-bg-accent"
                        type="submit"
                        x-text="changePwLoading ? t('Common_Saving') : t('PasswordUpdate_Update')">
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ─── New providers notification ─── -->
<div x-cloak x-show="newProvidersActive && configData"
     role="dialog" aria-modal="true"
     :aria-label="t('NewProviders_Title')"
     @keydown.escape.window="dismissNewProviders()"
     x-effect="(newProvidersActive && configData) && $nextTick(() => $el.querySelector('button')?.focus())"
     class="fixed inset-0 z-[200] flex items-center justify-center p-4 overflow-y-auto"
     style="background-color: var(--wb-bg);">
    <div class="wb-surface wb-border border rounded-xl p-6 sm:p-8 w-full shadow-2xl" style="max-width:32rem">
        <h2 class="text-lg font-bold wb-accent-text mb-1" x-text="t('NewProviders_Title')"></h2>
        <p class="text-sm wb-text-secondary mb-5"
           x-text="t('NewProviders_Body', newProviderKeys.length)"></p>

        <div class="space-y-3">
            <template x-for="[key, integration] in Object.entries(configData?.integrations || {})
                             .filter(([k]) => newProviderKeys.includes(k))"
                      :key="'np-' + key">
                <div class="wizard-provider-card wb-surface"
                     :class="{ 'selected': newProviderSelected.has(key) }"
                     :style="'--card-accent: ' + integration.brandColor"
                     @click="newProviderToggle(key)">
                    <div class="flex items-center gap-3">
                        <span class="integration-logo" :style="'color: ' + integration.brandColor"
                              x-html="sanitizeSvg(integration.logoSvg)"></span>
                        <span class="text-sm font-semibold wb-text-secondary" x-text="integration.name"></span>
                        <span class="ml-auto text-xs wb-accent-text font-medium"
                              x-show="newProviderSelected.has(key)">&#10003;</span>
                    </div>
                    <div @click.stop class="mt-4"
                         x-providerfields="{ mode: 'wizard', prefix: 'np-' }"
                         x-show="newProviderSelected.has(key)">
                    </div>
                </div>
            </template>
        </div>

        <div class="flex gap-3 mt-6">
            <button @click="dismissNewProviders()"
                    class="flex-1 py-2.5 rounded-lg text-sm font-medium wb-border border wb-surface wb-text-secondary
                           cursor-pointer wb-btn hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                    x-text="t('NewProviders_Skip')"></button>
            <button @click="saveAndDismissNewProviders()"
                    :disabled="newProviderSaving"
                    class="flex-1 py-2.5 rounded-lg text-sm font-semibold wb-on-accent wb-bg-accent cursor-pointer
                           disabled:opacity-50 wb-btn hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                    x-text="newProviderSaving ? t('Common_Saving') : t('NewProviders_SaveAndDone')"></button>
        </div>
    </div>
</div>

<!-- ─── Onboarding wizard ─── -->
<div :aria-label="t('Wizard_Welcome')" @keydown.escape.window="wizardSkip()"
     aria-modal="true"
     class="fixed inset-0 z-[200] flex items-center justify-center p-4 overflow-y-auto" role="dialog"
     style="background-color: var(--wb-bg);"
     x-cloak
     x-effect="(wizardActive && configData) && $nextTick(() => $el.querySelector('button')?.focus())"
     x-show="wizardActive && configData">
    <div class="wb-surface wb-border border rounded-xl p-6 sm:p-8 w-full shadow-2xl" style="max-width:32rem">

        <!-- Step indicator -->
        <div class="flex items-center justify-between mb-6">
            <span class="text-xs wb-text-faint" x-text="t('Wizard_StepOf', wizardStep + 1, 4)"></span>
            <div class="flex gap-1.5">
                <template :key="i" x-for="i in 4">
                    <div :class="i - 1 <= wizardStep ? 'wb-bg-accent' : ''"
                         :style="'width:' + (i - 1 <= wizardStep ? '1.5rem' : '0.5rem') + ';' + (i - 1 > wizardStep ? 'background-color:var(--wb-border)' : '')"
                         class="h-1 rounded-full transition-all duration-300">
                    </div>
                </template>
            </div>
        </div>

        <!-- Step 0: Welcome -->
        <div class="wizard-step-enter" x-show="wizardStep === 0">
            <div class="flex items-center justify-center gap-3 mb-4">
                <img alt="WatchBack Logo" class="w-10 h-10 object-contain wb-logo" src="/watchback.png">
                <h1 class="text-xl font-bold wb-accent-text" x-text="t('Wizard_Welcome')"></h1>
            </div>
            <p class="text-sm wb-text-secondary text-center mb-8 leading-relaxed" x-text="t('Wizard_WelcomeBody')"></p>
            <button @click="wizardNext()"
                    class="w-full py-2.5 rounded-lg text-sm font-semibold wb-on-accent wb-bg-accent cursor-pointer
                           wb-btn hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                    x-text="t('Wizard_GetStarted')">
            </button>
            <button @click="wizardSkip()"
                    class="w-full mt-3 py-2 text-xs wb-text-faint cursor-pointer hover:wb-text-secondary transition-colors"
                    x-text="t('Wizard_SkipSetup')">
            </button>
        </div>

        <!-- Step 1: Watch Provider -->
        <div class="wizard-step-enter" x-show="wizardStep === 1">
            <h2 class="text-lg font-bold wb-text mb-1" x-text="t('Wizard_PickWatchProvider')"></h2>
            <p class="text-xs wb-text-faint mb-5" x-text="t('Wizard_PickWatchProviderHint')"></p>

            <div class="space-y-3">
                <template
                        :key="'wz-w-' + key"
                        x-for="[key, integration] in Object.entries(configData?.integrations || {}).filter(([_, i]) => i.providerTypes?.includes('watchState'))">
                    <div :class="{ 'selected': wizardSelectedWatch === key }"
                         :style="'--card-accent: ' + integration.brandColor"
                         @click="wizardSelectWatch(key)"
                         class="wizard-provider-card wb-surface">
                        <!-- Card header -->
                        <div class="flex items-center gap-3">
                            <span :style="'color: ' + integration.brandColor" class="integration-logo"
                                  x-html="sanitizeSvg(integration.logoSvg)">
                            </span>
                            <span class="text-sm font-semibold wb-text-secondary" x-text="integration.name"></span>
                            <span class="ml-auto text-xs wb-accent-text font-medium"
                                  x-show="wizardSelectedWatch === key">
                                &#10003;
                            </span>
                        </div>
                        <!-- Expanded config fields (when selected) -->

                        </div>

                            </label>
                        </div>

                        <button :class="prefSaveStatus === 'saved' ? 'test-ok' : prefSaveStatus === 'error' ? 'test-error' : 'wb-text-muted'"

                        </button>
                    </div>
                </div>

                <!-- ═══════════════════ Danger zone ═══════════════════ -->

                    <button :aria-expanded="!collapsedSections.dangerZone"

                                       x-text="t('DangerZone_ResetPasswordTitle')"></p>
                                    <p class="text-xs wb-text-faint mt-1 leading-relaxed"
                                       x-text="t('DangerZone_ResetPasswordHelp')"></p>
                                </div>
                                <button :class="resetPasswordStatus === 'ok' ? 'test-ok' : resetPasswordStatus === 'error' ? 'test-error' : ''"
                                        :disabled="resetPasswordStatus === 'loading'"

                                        class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer

                        <!-- Clear cache card -->

                                    class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer
                                           disabled:opacity-50 wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                    x-text="clearCacheStatus === 'loading' ? t('Common_Clearing') : clearCacheStatus === 'ok' ? t('Common_Cleared') : clearCacheStatus === 'error' ? t('Common_Error') : t('DangerZone_ClearCache')">
                            </button>
                        </div>

                        <!-- Restart card -->
                        <div class="rounded-lg p-3 flex flex-col gap-3 wb-border border">
                            <div>
                                <p class="text-xs font-semibold wb-text-secondary" x-text="t('DangerZone_Restart')"></p>
                                <p class="text-xs wb-text-faint mt-1 leading-relaxed"
                                   x-text="t('DangerZone_RestartHelp')"></p>
                            </div>
                            <button @click="void restart()"
                                    aria-live="polite"
                                    class="mt-auto w-full py-2 rounded-lg text-xs
                                           font-medium cursor-pointer wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"

                            </button>
                        </div>

                        <!-- Forward auth card -->
                        <div class="rounded-lg p-3 flex flex-col gap-3 wb-border border">
                            <div>
                                <p class="text-xs font-semibold wb-text-secondary"
                                   x-text="t('DangerZone_ForwardAuth')"></p>
                                <p class="text-xs wb-text-faint mt-1 leading-relaxed"
                                   x-text="t('DangerZone_ForwardAuthHelp')"></p>
                            </div>
                            <label class="switch-container">
                                <input :aria-label="t('DangerZone_EnableForwardAuth')" :checked="forwardAuthEnabled"
                                       @change="forwardAuthEnabled = $event.target.checked"
                                       class="switch-input"
                                       id="forward-auth-toggle"
                                       type="checkbox">
                                <span class="switch-slider"></span>
                            </label>
                            <template x-if="forwardAuthEnabled">
                                <div class="space-y-2">
                                    <div>
                                        <label class="text-xs font-medium wb-text-muted block mb-1"
                                               for="forward-auth-header"
                                               x-text="t('DangerZone_HeaderName')">
                                        </label>
                                        <input class="w-full wb-surface wb-border wb-text-secondary rounded-lg px-3 py-2 text-sm border"

                                    </div>
                                    <div>
                                        <label class="text-xs font-medium wb-text-muted block mb-1"

                                        <p class="text-xs wb-text-faint mt-1"
                                           x-text="t('DangerZone_TrustedHostHelp')"></p>
                                    </div>
                                    <div class="rounded-lg px-3 py-2 text-xs leading-relaxed"
                                         style="background:var(--wb-error-bg);color:var(--wb-error-text);border:1px solid var(--wb-error-border)">

                            </template>
                            <button :class="forwardAuthSaveStatus === 'saved' ? 'test-ok' : forwardAuthSaveStatus === 'error' ? 'test-error' : ''"

                                    class="mt-auto w-full py-2 rounded-lg text-xs font-medium cursor-pointer
                                           disabled:opacity-50 wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    style="border:1px solid var(--wb-error-border);color:var(--wb-error-text)"
                                    x-text="forwardAuthSaveStatus === 'saving' ? t('Common_Saving') : forwardAuthSaveStatus === 'saved' ? t('Common_Saved') : forwardAuthSaveStatus === 'error' ? t('Common_Error') : t('Common_Save')">

            <!-- ─── Diagnostics tab ─── -->

                <!-- Last sync status -->
                <div class="mb-5">
                    <h2 class="text-sm font-semibold wb-text-secondary mb-3" x-text="t('Diagnostics_LastSync')"></h2>
                    <template x-if="syncHistory">
                        <div class="wb-surface rounded-xl p-3 wb-border border space-y-2">
                            <div class="flex items-center justify-between">
                    <span class="text-xs wb-text-muted"
                          x-text="formatRelativeTime(syncHistory.timestamp)">
                    </span>
                                <!-- Decorative dot (aria-hidden) + accessible status text -->
                                <span class="flex items-center gap-1.5 text-xs wb-text-secondary font-medium">
                        <span :style="syncHistory.status === 'Watching' ? 'background:var(--wb-success-text)' : syncHistory.status === 'Error' ? 'background:var(--wb-error-text)' : 'background:var(--wb-text-faint)'"
                              aria-hidden="true"
                              class="inline-block w-1.5 h-1.5 rounded-full shrink-0">
                        </span>
                        <span x-text="t('SyncStatus_' + syncHistory.status)"></span>
                    </span>
                            </div>
                            <p class="text-sm wb-text-secondary font-medium" x-show="syncHistory.title"
                               x-text="syncHistory.title">
                            </p>
                            <template x-if="(syncHistory.sources || []).length > 0">
                                <div class="space-y-1 pt-1">
                                    <template :key="src.source" x-for="src in syncHistory.sources">
                                        <div class="flex items-center justify-between text-xs">
                                            <span class="wb-text-muted" x-text="src.source"></span>
                                            <span class="wb-text-muted"
                                                  x-text="t('Diagnostics_Found', src.thoughtCount)"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="!syncHistory">
                        <p class="text-xs wb-text-muted" x-text="t('Diagnostics_NoSyncData')"></p>
                    </template>
                </div>

                <!-- App version -->
                <p class="text-xs wb-text-muted mb-5" x-show="appVersion">
                    <span x-text="t('Diagnostics_Version')"></span> <span class="font-mono" x-text="appVersion"></span>
                </p>

                <!-- Sync history -->
                <div class="mb-5">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-sm font-semibold wb-text-secondary" x-text="t('Diagnostics_SyncHistory')"></h2>
                        <button @click="void clearSyncHistory()" class="px-3 py-1.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                       wb-text-muted cursor-pointer wb-btn
                                       hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                type="button"
                                x-show="syncHistoryEntries.length > 0"
                                x-text="t('Common_Clear')">
                        </button>
                    </div>
                    <template x-if="syncHistoryEntries.length === 0">
                        <p class="text-xs wb-text-muted" x-text="t('Diagnostics_NoSyncHistory')"></p>
                    </template>
                    <template x-if="syncHistoryEntries.length > 0">
                        <div>
                            <!-- Timeline strip: one block per run, width proportional to sync count -->
                            <div aria-hidden="true" class="flex gap-px h-3 rounded-lg overflow-hidden mb-3">
                                <template :key="i" x-for="(entry, i) in collapsedSyncHistory.slice().reverse()">
                                    <div :style="(entry.status === 'Watching' ? 'background:var(--wb-success-text);opacity:0.75' : entry.status === 'Error' ? 'background:var(--wb-error-text)' : 'background:var(--wb-text-faint);opacity:0.4') + ';flex-grow:' + entry.count"
                                         :title="(entry.title ? entry.status + ': ' + entry.title : entry.status) + (entry.count > 1 ? ' ×' + entry.count : '') + (entry.avgDurationMs != null ? ' (' + (entry.avgDurationMs / 1000).toFixed(1) + 's avg)' : '')"
                                         class="min-w-[2px]">
                                    </div>
                                </template>
                            </div>
                            <!-- Collapsed table: consecutive identical runs merged into one row -->
                            <div class="wb-surface wb-border border rounded-xl overflow-hidden">
                                <div class="overflow-y-auto" style="max-height:16rem;">
                                    <table class="w-full text-xs">
                                        <thead class="wb-surface-alt sticky top-0">
                                        <tr class="border-b wb-border">
                                            <th class="text-left px-3 py-2 wb-text-muted font-medium" x-text="t('Diagnostics_ColTime')"></th>
                                            <th class="text-left px-3 py-2 wb-text-muted font-medium" x-text="t('Diagnostics_ColStatus')"></th>
                                            <th class="text-left px-3 py-2 wb-text-muted font-medium" x-text="t('Diagnostics_ColTitle')"></th>
                                            <th class="text-right px-3 py-2 wb-text-muted font-medium" x-text="t('Diagnostics_ColThoughts')"></th>
                                            <th class="text-right px-3 py-2 wb-text-muted font-medium" x-text="t('Diagnostics_ColDuration')"></th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <template :key="i" x-for="(entry, i) in collapsedSyncHistory">
                                            <tr class="border-b wb-border last:border-b-0">
                                                <td class="px-3 py-2 wb-text-muted whitespace-nowrap"
                                                    x-text="formatRelativeTime(entry.timestamp)">
                                                </td>
                                                <td class="px-3 py-2 whitespace-nowrap">
                                                    <span class="flex items-center gap-1.5">
                                                        <span :style="entry.status === 'Watching' ? 'background:var(--wb-success-text)' : entry.status === 'Error' ? 'background:var(--wb-error-text)' : 'background:var(--wb-text-faint)'"
                                                              aria-hidden="true"
                                                              class="inline-block w-1.5 h-1.5 rounded-full shrink-0">
                                                        </span>
                                                        <span class="wb-text-secondary" x-text="t('SyncStatus_' + entry.status)"></span>
                                                        <span class="wb-text-faint tabular-nums"
                                                              x-show="entry.count > 1"
                                                              x-text="'×' + entry.count">
                                                        </span>
                                                    </span>
                                                </td>
                                                <td class="px-3 py-2 wb-text-secondary truncate" style="max-width:12rem;"
                                                    x-text="entry.title || '—'">
                                                </td>
                                                <td class="px-3 py-2 wb-text-muted text-right tabular-nums"
                                                    x-text="entry.thoughtCount">
                                                </td>
                                                <td class="px-3 py-2 wb-text-muted text-right tabular-nums whitespace-nowrap"
                                                    x-text="entry.avgDurationMs != null ? (entry.avgDurationMs / 1000).toFixed(1) + 's' : '—'">
                                                </td>
                                            </tr>
                                        </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Log viewer -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-sm font-semibold wb-text-secondary"
                            x-text="t('Diagnostics_ApplicationLogs')"></h2>
                        <div class="flex items-center gap-3">
                            <div class="wb-select-wrap">
                                <select :aria-label="t('Aria_MinimumLogLevel')"
                                        class="wb-select wb-surface-alt wb-border wb-text-secondary rounded-lg px-2 py-1 text-xs border"
                                        x-model="logLevel">
                                    <option value="All" x-text="t('Diagnostics_All')"></option>
                                    <option value="Debug" x-text="t('Diagnostics_DebugPlus')"></option>
                                    <option value="Information" x-text="t('Diagnostics_InfoPlus')"></option>
                                    <option value="Warning" x-text="t('Diagnostics_WarningPlus')"></option>
                                    <option value="Error" x-text="t('Diagnostics_ErrorPlus')"></option>
                                </select>
                            </div>
                            <button @click="void copyLogs()" aria-live="polite"
                                    class="px-3 py-1.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                           wb-text-muted cursor-pointer wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    type="button"
                                    x-text="copyLogsStatus === 'copied' ? t('Common_Copied') : copyLogsStatus === 'error' ? t('Common_Error') : t('Common_Copy')">
                            </button>
                            <button @click="void clearLogs()" class="px-3 py-1.5 rounded-lg text-xs font-medium wb-border border wb-surface-alt
                                           wb-text-muted cursor-pointer wb-btn
                                           hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                                    type="button"
                                    x-text="t('Common_Clear')">
                            </button>
                        </div>
                    </div>

                    <div class="wb-surface wb-border border rounded-xl font-mono overflow-y-auto"
                         id="log-container"
                         style="height:20rem;font-size:11px;line-height:1.5;">
                        <template x-if="filteredLogs.length === 0">
                            <p class="p-3 wb-text-muted text-xs" x-text="t('Diagnostics_NoLogs')"></p>
                        </template>
                        <template :key="i" x-for="(entry, i) in filteredLogs">
                            <div :class="i < filteredLogs.length - 1 ? 'border-b wb-border' : ''"
                                 class="px-3 py-1 flex gap-2 items-start">
                    <span class="wb-text-muted shrink-0 tabular-nums"
                          x-text="formatLogTime(entry.timestamp)">
                    </span>
                                <span :class="logLevelClass(entry.level)" class="shrink-0 font-bold w-8 text-center"
                                      x-text="logLevelAbbr(entry.level)">
                    </span>
                                <div class="flex-1 min-w-0 break-words">
                                    <span class="wb-text-muted">[<span x-text="entry.category"></span>]</span>
                                    <span class="wb-text-secondary" x-text="' ' + entry.message"></span>
                                    <div class="wb-text-muted mt-0.5 break-words"
                                         x-show="entry.exceptionText"
                                         x-text="entry.exceptionText">
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

            </div><!-- /diagnostics tab -->

        </div>
    </aside>

    <!-- ════════════════ Manual media search ════════════════ -->
    <div :aria-label="t('Dashboard_MediaSearch')" class="mb-6" role="search" x-show="showSearchBox">

        <!-- Manual override active indicator -->
        <template x-if="data?.watchProvider === 'Manual'">
            <div class="mb-3 px-3 py-2.5 rounded-xl wb-surface wb-border border text-xs space-y-2">
                <div class="flex items-center justify-between gap-3">
                <span class="wb-text-muted leading-snug">
                    <span x-text="t('Dashboard_ManualOverride')"></span> <strong class="wb-text-secondary"
                                                                                 x-text="data.title"></strong>
                </span>
                    <button :title="t('Dashboard_ClearManualState')" @click="clearManualWatchState()"
                            class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium
                                   wb-surface-alt wb-border border wb-text-muted hover:wb-error-text cursor-pointer
                                   wb-btn transition-colors
                                   hover:scale-[1.01] active:scale-95 transition-all duration-200 active:duration-75 transform-gpu"
                            type="button">
                        <ion-icon aria-hidden="true" class="text-base" name="close-circle-outline"></ion-icon>
                        <span x-text="t('Common_Clear')"></span>
                    </button>
                </div>
